

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Theme Preview - 精修预览版</title>
<style>
:root {--bg: #030508;
--neon: #00e5ff;
--neon-dim: rgba(0, 229, 255, 0.7);
--card-bg: rgba(10, 15, 25,0.15);
--text: #e0e6ed;
}
body,html {
margin: 0; padding: 0; height: 100%;
background: var(--bg); color: var(--text);
font-family: 'Segoe UI', system-ui, sans-serif;
overflow: hidden;
}
.geo-wrapper {
position: fixed; top: 50%; left: 50%; width: 0; height: 0;
perspective: 1800px;
perspective-origin: 50% 50%;
transform-style: preserve-3d;
z-index: 0; pointer-events: none;}
.core {
position: absolute;
transform-style: preserve-3d;
transition: transform 1.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.24s ease, filter 0.24s ease;
animation: slowSpin 35s linear infinite;
}
.core.is-fading-to-metrics {
--metrics-fade-duration: 0.26s;
--metrics-fade-ease: cubic-bezier(0.22, 1, 0.36, 1);
animation-play-state: paused;
transition-property: opacity, filter !important;
transition-duration: var(--metrics-fade-duration) !important;
transition-timing-function: var(--metrics-fade-ease) !important;
}
.core.is-fading-to-metrics .face,
.core.is-fading-to-metrics .lock-layer,
.core.is-fading-to-metrics .gyro-layer,
.core.is-fading-to-metrics .view-orbit-cube,
.core.is-fading-to-metrics .face::before,
.core.is-fading-to-metrics .face::after,
.core.is-fading-to-metrics .orbit-face,
.core.is-fading-to-metrics .orbit-face::before,
.core.is-fading-to-metrics .orbit-face::after {
transition-duration: var(--metrics-fade-duration) !important;
transition-timing-function: var(--metrics-fade-ease) !important;
}
  

.core.is-fading-to-metrics .face,
.core.is-fading-to-metrics .lock-layer,
.core.is-fading-to-metrics .gyro-layer {
transition-property: opacity, filter, box-shadow, border-color, background !important;
filter: brightness(0.28) saturate(0.52);
}

.core.is-fading-to-metrics .face {
opacity: 0.08 !important;
}
.core.is-fading-to-metrics .face::before,
.core.is-fading-to-metrics .face::after {
transition-property: opacity, filter, background, box-shadow, border-radius, clip-path !important;
filter: brightness(0.2) saturate(0.5);
opacity: 0 !important;
}

.core.is-fading-to-metrics .view-orbit-cube {
transition-property: opacity, filter !important;
transition-delay: 0s !important;
}

.core.is-fading-to-metrics .orbit-face,
.core.is-fading-to-metrics .orbit-face::before,
.core.is-fading-to-metrics .orbit-face::after {
transition-property: opacity !important;
}

.core.is-fading-to-metrics .view-orbit-cube,
.core.is-fading-to-metrics .lock-layer,
.core.is-fading-to-metrics .gyro-layer {
opacity: 0 !important;
}
.face {
position: absolute;
width: 340px; height:340px;
margin-left: -170px; margin-top: -170px;
box-sizing: border-box;
overflow: visible;
transform-origin: center center;
transform-style: preserve-3d;
backface-visibility: visible;
-webkit-backface-visibility: visible;
will-change: transform;
border: 7px solid rgba(0, 229, 255, 0.58);
background: linear-gradient(145deg, rgba(0, 229, 255, 0.085), rgba(0, 229,255, 0.03) 58%, rgba(255, 255, 255, 0.018));
box-shadow:
  inset 0 0 24px rgba(0, 229, 255, 0.075),
  inset 0 0 52px rgba(255, 255, 255, 0.016),
  0 0 12px rgba(0, 229, 255, 0.09);
outline: 1px solid rgba(255, 255, 255, 0.03);
filter: drop-shadow(0 0 7px rgba(0, 229, 255, 0.07));
transition:

  transform 1.2s cubic-bezier(0.16, 1, 0.3, 1),
  border-color 0.8s ease,
  border-width 0.8s ease,
  background 0.8s ease,
  box-shadow 0.8s ease,
  border-radius 0.8s ease,
  clip-path 0.8s ease,
  opacity 0.8s ease,
  filter 0.8s ease;
}
.face.aux {
opacity: 0 !important;
pointer-events: none;
}

--metrics-border: rgba(196, 118, 255, 0.92);
--metrics-outline: rgba(255, 255, 255, 0.10);

--metrics-sweep-outer-b: rgba(255, 255, 255, 0.38);
--metrics-sweep-mid-a: rgba(214, 172, 255, 0.15);
--metrics-sweep-mid-b: rgba(255, 255, 255, 0.30);

--metrics-metal-b: rgba(88, 200, 255, 0.18);
--metrics-metal-c: rgba(8, 26, 76, 0.46);
--metrics-metal-d: rgba(255, 255, 255, 0.10);
--metrics-sweep-outer-a: rgba(176, 228, 255, 0.22);
--metrics-sweep-outer-b: rgba(255, 255, 255, 0.46);
--metrics-sweep-mid-a: rgba(152, 212, 255, 0.19);
--metrics-sweep-mid-b: rgba(240, 250, 255, 0.38);

#geometry[data-metrics-theme="cyan"] {
--metrics-border: rgba(64, 255, 208, 0.96);
--metrics-outline: rgba(255, 255, 255, 0.06);
--metrics-inner-glow: rgba(102, 255, 228, 0.22);
--metrics-outer-glow: rgba(32, 226, 182, 0.34);
--metrics-drop: rgba(20, 174, 138, 0.30);
--metrics-metal-a: rgba(255, 255, 255, 0.30);
--metrics-metal-b: rgba(82, 255, 220, 0.16);
--metrics-metal-c: rgba(8, 52, 46, 0.44);
--metrics-metal-d: rgba(255, 255, 255, 0.10);
--metrics-sweep-outer-a: rgba(176, 255, 236, 0.22);
--metrics-sweep-outer-b: rgba(255, 255, 255, 0.46);
--metrics-sweep-mid-a: rgba(150, 255, 226, 0.19);
--metrics-sweep-mid-b: rgba(238, 255, 250, 0.38);
--metrics-sweep-inner-a: rgba(126, 246, 214, 0.16);
--metrics-sweep-inner-b: rgba(226, 255, 244, 0.30);
}
.lock-layer,
.gyro-layer {
position: absolute;
left: 0;
top: 0;
width: 0;
height: 0;
transform-style: preserve-3d;
pointer-events: none;
opacity: 0;
transition: opacity 0.45s ease, filter 0.45s ease;
}
.lock-layer {
filter:
  drop-shadow(0 0 18px rgba(214, 170, 96, 0.14))
  drop-shadow(0 0 34px rgba(214, 170, 96, 0.08));
}
.lock-bar {
position: absolute;
left: 0;
top: 0;
transform-style: preserve-3d;
transform-origin: center center;
--w: 420px;
--h: 92px;
--d: 92px;
--hw: 210px;
--hh: 46px;
--hd: 46px;
--nhw: -210px;
--nhh: -46px;
--nhd: -46px;
}
.lock-bar .lock-surface {
position: absolute;
left: 0;
top: 0;
box-sizing: border-box;
transform-style: preserve-3d;
backface-visibility: visible;
-webkit-backface-visibility: visible;
}
.lock-bar .front,
.lock-bar .back {
width: var(--w);
height: var(--h);
margin-left: var(--nhw);
margin-top: var(--nhh);
border: 5px solid rgba(236, 194, 112, 0.90);
border-radius: 10px;
background:
  linear-gradient(180deg, rgba(255, 245, 214, 0.055), rgba(255, 255, 255, 0.008) 18%, rgba(0, 0, 0, 0.01) 100%),
  linear-gradient(90deg, rgba(238, 198, 122, 0.028), rgba(108, 72, 22, 0.018));
box-shadow:
  inset 0 0 10px rgba(255, 236, 188, 0.035),
  inset 0 0 22px rgba(236, 194, 112, 0.028),
  0 0 10px rgba(236, 194, 112, 0.10);
}
.lock-bar .front {
transform: translateZ(var(--hd));
opacity: 0.96;
}
.lock-bar .back {
transform: rotateY(180deg) translateZ(var(--hd));
opacity: 0.38;
}
.lock-bar .right,
.lock-bar .left {
width: var(--d);
height: var(--h);
margin-left: var(--nhd);
margin-top: var(--nhh);
border: 4px solid rgba(220, 176, 98, 0.62);
border-radius: 8px;
background: linear-gradient(180deg, rgba(255, 232, 184, 0.018), rgba(84, 56, 16, 0.010));
box-shadow:
  inset 0 0 8px rgba(236, 194, 112, 0.020),
  0 0 8px rgba(236, 194, 112, 0.06);
opacity: 0.72;
}
.lock-bar .right {
transform: rotateY(90deg) translateZ(var(--hw));
}
.lock-bar .left {
transform: rotateY(-90deg) translateZ(var(--hw));
}
.lock-bar .top,
.lock-bar .bottom {
width: var(--w);
height: var(--d);
margin-left: var(--nhw);
margin-top: var(--nhd);
border: 4px solid rgba(228, 184, 106, 0.68);
border-radius: 8px;
background: linear-gradient(180deg, rgba(255, 238, 196, 0.020), rgba(96, 64, 20, 0.010));
box-shadow:
  inset 0 0 8px rgba(236, 194, 112, 0.022),
  0 0 8px rgba(236, 194, 112, 0.06);
opacity: 0.78;
}
.lock-bar .top {
transform: rotateX(90deg) translateZ(var(--hh));
}
.lock-bar .bottom {
transform: rotateX(-90deg) translateZ(var(--hh));
}
.lock-bar.bar-x {
transform: translate3d(0, 0, 92px) rotateY(16deg) rotateX(-10deg);
}
.lock-bar.bar-y {
transform: translate3d(92px, 0, 0) rotateZ(90deg) rotateY(-16deg) rotateX(8deg);
}
.lock-bar.bar-z {
transform: translate3d(0, -92px, 0) rotateY(90deg) rotateZ(14deg) rotateX(10deg);
}
.gyro-layer {
filter: drop-shadow(0 0 18px rgba(206, 170, 255, 0.2));
animation: gyroBody 34s linear infinite;
}
.gyro-ring {
position: absolute;
left: 0;
top: 0;
width: 0;
height: 0;
transform-style: preserve-3d;
}
.gyro-ring::before,
.gyro-ring::after {
content: '';
position: absolute;
left: calc(var(--size) * -0.5);
top: calc(var(--size) * -0.5);
width: var(--size);
height: var(--size);
border-radius: 50%;
box-sizing: border-box;
}
.gyro-ring::before {
border: var(--line) solid rgba(206, 170, 255, 0.42);
box-shadow: inset 0 0 18px rgba(206, 170, 255, 0.08), 0 0 18px rgba(206, 170, 255, 0.1);
opacity: 0.96;
}
.gyro-ring::after {
background: conic-gradient(
  from 0deg,
  rgba(255, 255, 255, 0) 0deg,
  rgba(255, 255, 255, 0.03) 150deg,
  rgba(255, 255, 255, 0.98) 270deg,
  rgba(255, 255, 255, 0.16) 334deg,
  rgba(255, 255, 255, 0) 360deg
);
-webkit-mask: radial-gradient(circle, transparent calc(50% - var(--line)), #000 calc(50% - var(--line) + 1px) calc(50% - 1px), transparent 50%);
mask: radial-gradient(circle, transparent calc(50% - var(--line)), #000 calc(50% - var(--line) + 1px) calc(50% - 1px), transparent 50%);
filter: blur(0.7px);
opacity: 0.98;
}
.gyro-ring.ring-a {
--size: 640px;
--line: 16px;
}
.gyro-ring.ring-b {
--size: 520px;
--line: 14px;
}
.gyro-ring.ring-c {
--size: 392px;
--line: 12px;
}

.face::before,
.face::after {
content: '';

position: absolute;
inset: 0;
pointer-events: none;
box-sizing: border-box;
border-radius: inherit;
clip-path: inherit;
transition:
  transform 1.2s cubic-bezier(0.16, 1, 0.3, 1),
  background 0.6s ease,
  opacity 0.6s ease,
  border-radius 0.6s ease,

  clip-path 0.6s ease,
  box-shadow 0.6s ease,
  filter 0.6s ease;
}
.face::before {
transform: translateZ(8px);
background: linear-gradient(145deg, rgba(255, 255, 255, 0.038), transparent 44%, rgba(0, 229, 255, 0.014));
opacity: 0.72;
}
.face::after {
transform: translateZ(-8px);
background: linear-gradient(160deg, rgba(0, 24, 30, 0.09), rgba(0, 0, 0, 0.018));
box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
opacity: 0.42;
}

/* 形态一：规整立方 (隐忍) */
.core.state-idle .face-front { transform: translateZ(170px); }
.core.state-idle .face-back { transform: rotateY(180deg) translateZ(170px); }
.core.state-idle .face-right { transform: rotateY(90deg) translateZ(170px); }
.core.state-idle .face-left { transform: rotateY(-90deg) translateZ(170px); }
.core.state-idle .face-top { transform: rotateX(90deg) translateZ(170px); }
.core.state-idle .face-bottom { transform: rotateX(-90deg) translateZ(170px); }
.core.state-idle .face-aux-a { transform: rotateY(90deg) translateZ(170px); }
.core.state-idle .face-aux-b { transform: rotateX(90deg) translateZ(170px); }
/* 形态二：锐利棱锥 (攻击) */
.core.state-pyramid .face {
border-width: 5px;
border-color: rgba(255, 92, 112, 0.72);
border-radius: 10px;
clip-path: polygon(12% 0%, 88% 0%, 100% 12%, 100% 88%, 88% 100%, 12% 100%, 0% 88%, 0% 12%);
background: linear-gradient(145deg, rgba(255, 92, 112, 0.11), rgba(255, 92, 112, 0.032) 58%, rgba(255, 255, 255, 0.016));
box-shadow: inset 0 0 22px rgba(255, 92, 112, 0.08), 0 0 16px rgba(255, 92, 112, 0.12);
filter: drop-shadow(0 0 10px rgba(255, 92, 112, 0.09));
}
.core.state-pyramid .face::before {
background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), transparent 42%, rgba(255, 92, 112, 0.018));
}
.core.state-pyramid .face::after {
background: linear-gradient(160deg, rgba(38, 4, 10, 0.11), rgba(18, 4, 6, 0.024));
}
.core.state-pyramid .face-front { transform: translateZ(154px) rotateZ(42deg); }
.core.state-pyramid .face-back { transform: rotateY(180deg) translateZ(154px) rotateZ(-42deg); }
.core.state-pyramid .face-right { transform: rotateY(90deg) translateZ(154px) rotateZ(42deg); }
.core.state-pyramid .face-left { transform: rotateY(-90deg) translateZ(154px) rotateZ(-42deg); }
.core.state-pyramid .face-top { transform: rotateX(90deg) translateZ(154px) rotateZ(42deg); }
.core.state-pyramid .face-bottom { transform: rotateX(-90deg) translateZ(154px) rotateZ(-42deg); }
.core.state-pyramid .face-aux-a { transform: rotateY(90deg) translateZ(170px); }
.core.state-pyramid .face-aux-b { transform: rotateX(90deg) translateZ(170px); }
/* 形态三：金色散架构建态 (创造) */
.core.state-create {
animation: slowSpin 35s linear infinite;
transform-style: preserve-3d;
}
.core.state-create .lock-layer,
.core.state-create .gyro-layer {
opacity: 0;
}
.core.state-create .face {
width: 340px;
height: 340px;
margin-left: -170px;
margin-top: -170px;
border-width: 6px;
border-color: rgba(236, 194, 112, 0.76);
border-radius: 10px;
clip-path: none;
background: linear-gradient(145deg, rgba(236, 194, 112, 0.09), rgba(236, 194, 112, 0.03) 58%, rgba(255, 255, 255, 0.016));
box-shadow: inset 0 0 22px rgba(236, 194, 112, 0.08), 0 0 14px rgba(236, 194, 112, 0.11);
filter: drop-shadow(0 0 8px rgba(236, 194, 112, 0.08));
opacity: 0.94;
}
.core.state-create .face::before {
background: linear-gradient(145deg, rgba(255, 250, 232, 0.046), transparent 42%, rgba(236, 194, 112, 0.018));
opacity: 0.74;
}
.core.state-create .face::after {
background: linear-gradient(160deg, rgba(58, 34, 6, 0.09), rgba(0, 0, 0, 0.02));
opacity: 0.38;
}
.core.state-create .face-front { transform: translateZ(308px) scale(0.92); opacity: 0.98; }
.core.state-create .face-back { transform: rotateY(180deg) translateZ(308px) scale(0.92); opacity: 0.54; }
.core.state-create .face-right { transform: rotateY(90deg) translateZ(308px) scale(0.92); opacity: 0.90; }
.core.state-create .face-left { transform: rotateY(-90deg) translateZ(308px) scale(0.92); opacity: 0.82; }
.core.state-create .face-top { transform: rotateX(90deg) translateZ(308px) scale(0.92); opacity: 0.92; }
.core.state-create .face-bottom { transform: rotateX(-90deg) translateZ(308px) scale(0.92); opacity: 0.82; }
.core.state-create .face-aux-a { transform: rotateY(90deg) translateZ(308px) scale(0.92); opacity: 0; }
.core.state-create .face-aux-b { transform: rotateX(90deg) translateZ(308px) scale(0.92); opacity: 0; }
/* 形态四：深蓝复制立方阵列态 (查看) */
.core.state-view {
transform-style: preserve-3d;
}
.core.state-view .lock-layer,
.core.state-view .gyro-layer {
opacity: 0;
}
.core.state-view .face {
width: 340px;
height: 340px;
margin-left: -170px;
margin-top: -170px;
border-width: 4px;
border-color: rgba(72, 132, 232, 0.9);
border-radius: 4px;
outline: none;
clip-path: none;
background: linear-gradient(180deg, rgba(14, 30, 72, 0.96), rgba(8, 18, 42, 0.98));
box-shadow: inset 0 0 20px rgba(64, 126, 228, 0.15), 0 0 20px rgba(20, 72, 170, 0.2);
filter: drop-shadow(0 0 12px rgba(10, 40, 104, 0.2));
opacity: 0.98;
}
.core.state-view .face::before {
background: none;
opacity: 0;
}
.core.state-view .face::after {
background: linear-gradient(180deg, rgba(4, 10, 24, 0), rgba(4, 10, 24, 0.18));
opacity: 0.2;
}
.core.state-view .face-front { transform: translateZ(85px) scale(0.5); opacity: 0.98; border-color: rgba(78, 148, 255, 0.92); }
.core.state-view .face-back { transform: rotateY(180deg) translateZ(85px) scale(0.5); opacity: 0.26; border-color: rgba(32, 72, 138, 0.38); }
.core.state-view .face-right { transform: rotateY(90deg) translateZ(85px) scale(0.5); opacity: 0.88; border-color: rgba(56, 118, 222, 0.68); }
.core.state-view .face-left { transform: rotateY(-90deg) translateZ(85px) scale(0.5); opacity: 0.78; border-color: rgba(50, 106, 204, 0.58); }
.core.state-view .face-top { transform: rotateX(90deg) translateZ(85px) scale(0.5); opacity: 0.84; border-color: rgba(54, 114, 216, 0.64); }
.core.state-view .face-bottom { transform: rotateX(-90deg) translateZ(85px) scale(0.5); opacity: 0.72; border-color: rgba(44, 96, 188, 0.52); }
.core.state-view .face-aux-a { transform: rotateY(90deg) translateZ(85px) scale(0.5); opacity: 0 !important; }
.core.state-view .face-aux-b { transform: rotateX(90deg) translateZ(85px) scale(0.5); opacity: 0 !important; }


.view-orbit-cube {

  position: absolute;
  left: 0; top: 0; width: 0; height: 0;
  transform-style: preserve-3d;
  pointer-events: none;
  opacity: 0;
  transform: translate3d(0, 0, 0) scale(0.18);
  transition: opacity 0.6s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  will-change: transform, opacity;
}
.view-orbit-cube.pos-z { transform: translateZ(85px) scale(0.18); }
.view-orbit-cube.neg-z { transform: rotateY(180deg) translateZ(85px) scale(0.18); }
.view-orbit-cube.pos-x { transform: rotateY(90deg) translateZ(85px) scale(0.18); }
.view-orbit-cube.neg-x { transform: rotateY(-90deg) translateZ(85px) scale(0.18); }
.view-orbit-cube.pos-y { transform: rotateX(90deg) translateZ(85px) scale(0.18); }
.view-orbit-cube.neg-y { transform: rotateX(-90deg) translateZ(85px) scale(0.18); }

/* 轨道立方体：单面基础样式 */
.orbit-face {
  position: absolute;
  width: 170px;
  height: 170px;
  margin-left: -85px;
  margin-top: -85px;
  box-sizing: border-box;
  transform-style: preserve-3d;
  backface-visibility: visible;
  -webkit-backface-visibility: visible;
  border: 2px solid rgba(60, 118, 214, 0.85);
  border-radius: 2px;
  background: linear-gradient(180deg, rgba(20, 45, 100, 0.94), rgba(10, 25, 60, 0.98));
  /* 使用 box-shadow 代替 filter 以防止 3D 拍扁效应 */
  box-shadow: 
    inset 0 0 12px rgba(56, 112, 208, 0.2), 
    0 0 15px rgba(18, 66, 154, 0.2);
  opacity: 0.92;
  transition: opacity 0.8s ease;
}

/* 延迟步进：确保分步展开感 */
.core.state-view .view-orbit-cube.pos-z { transition-delay: 0.1s; }
.core.state-view .view-orbit-cube.neg-z { transition-delay: 0.2s; }
.core.state-view .view-orbit-cube.pos-x { transition-delay: 0.3s; }
.core.state-view .view-orbit-cube.neg-x { transition-delay: 0.4s; }
.core.state-view .view-orbit-cube.pos-y { transition-delay: 0.5s; }
.core.state-view .view-orbit-cube.neg-y { transition-delay: 0.6s; }

/* 轨道立方体：6面空间定位 (强制 3D) */
.orbit-face.orbit-front { transform: translateZ(85px) !important; }
.orbit-face.orbit-back { transform: rotateY(180deg) translateZ(85px) !important; }
.orbit-face.orbit-right { transform: rotateY(90deg) translateZ(85px) !important; }
.orbit-face.orbit-left { transform: rotateY(-90deg) translateZ(85px) !important; }
.orbit-face.orbit-top { transform: rotateX(90deg) translateZ(85px) !important; }

<script>
const CORE_BASE_CLASS = 'core';
const STATE_CLASS_PREFIX = 'state-';
const TRANSITION_CLASS = 'is-transitioning';
const METRICS_FADE_CLASS = 'is-fading-to-metrics';
const METRICS_ENTER_BRIDGE_DURATION = 130;
const METRICS_EXIT_BRIDGE_DURATION = 340;



function getStateClassName(geometry) {
  return Array.from(geometry.classList).find(name => name.startsWith(STATE_CLASS_PREFIX)) || `${STATE_CLASS_PREFIX}idle`;
}

function clearGeometryTimers(geometry) {
  if (geometry._transitionTimer) {
    clearTimeout(geometry._transitionTimer);
    geometry._transitionTimer = null;
  }
  if (geometry._phaseTimer) {
    clearTimeout(geometry._phaseTimer);
    geometry._phaseTimer = null;
  }
}

function setCoreStateClass(geometry, stateName, { transitioning = false, fadingToMetrics = false } = {}) {
  Array.from(geometry.classList)
    .filter(name => name.startsWith(STATE_CLASS_PREFIX))
    .forEach(name => geometry.classList.remove(name));

  geometry.classList.add(CORE_BASE_CLASS, `${STATE_CLASS_PREFIX}${stateName}`);
  geometry.classList.toggle(TRANSITION_CLASS, transitioning);
  geometry.classList.toggle(METRICS_FADE_CLASS, fadingToMetrics);
}

function finishTransition(geometry, nextState) {
  setCoreStateClass(geometry, nextState, { transitioning: false, fadingToMetrics: false });
  geometry.dataset.targetState = nextState;
  geometry._transitionTimer = null;
  geometry._phaseTimer = null;
}

function clearSaveTimers(geometry) {
  if (geometry._saveReturnTimer) {
    clearTimeout(geometry._saveReturnTimer);
    geometry._saveReturnTimer = null;
  }
  if (geometry._saveUnlockTimer) {
    clearTimeout(geometry._saveUnlockTimer);
    geometry._saveUnlockTimer = null;
  }
}

function setActiveSidebarButton(selector, activeButton) {
  document.querySelectorAll(selector).forEach(button => button.classList.remove('active'));
  if (activeButton) activeButton.classList.add('active');
}

function isGeometrySaving(geometry) {
  return !geometry || geometry.dataset.saving === '1';
}

function getTargetState(geometry) {
  return geometry.dataset.targetState || getStateName(geometry);
}

function getStateName(geometry) {
  return getStateClassName(geometry).replace(STATE_CLASS_PREFIX, '');
}

function applyTransitionState(geometry, nextState, duration = 1200) {
  if (!geometry) return;

  const currentStateClass = getStateClassName(geometry);

  const currentState = currentStateClass.replace('state-', '');
  const targetState = geometry.dataset.targetState || currentState;
  const normalizedCurrentState = currentState === 'metrics-exit' ? 'metrics' : currentState;

    if ((normalizedCurrentState === nextState && !geometry.classList.contains('is-transitioning')) || targetState === nextState) {
    return;
  }

  geometry.dataset.targetState = nextState;
  clearGeometryTimers(geometry);

  geometry.classList.remove(METRICS_FADE_CLASS);

    const enterMetrics = nextState === 'metrics' && normalizedCurrentState !== 'metrics';
  const exitMetrics = normalizedCurrentState === 'metrics' && nextState !== 'metrics';
  const metricsBridgeDuration = enterMetrics
    ? METRICS_ENTER_BRIDGE_DURATION
    : METRICS_EXIT_BRIDGE_DURATION;

  if (enterMetrics) {

    geometry.classList.add(METRICS_FADE_CLASS);
    geometry.classList.remove(TRANSITION_CLASS);
    geometry._phaseTimer = setTimeout(() => {

      requestAnimationFrame(() => {
        setCoreStateClass(geometry, 'metrics', { transitioning: true, fadingToMetrics: false });
        geometry._transitionTimer = setTimeout(() => {
          finishTransition(geometry, nextState);
        }, Math.max(320, duration - metricsBridgeDuration));
      });
    }, metricsBridgeDuration);

    return;
  }

  if (exitMetrics) {
    setCoreStateClass(geometry, 'metrics-exit', { transitioning: true, fadingToMetrics: false });

    geometry._phaseTimer = setTimeout(() => {
      requestAnimationFrame(() => {
        setCoreStateClass(geometry, nextState, { transitioning: true, fadingToMetrics: false });
        geometry._transitionTimer = setTimeout(() => {
          finishTransition(geometry, nextState);
        }, Math.max(0, duration - metricsBridgeDuration));
      });
    }, metricsBridgeDuration);

    return;
  }

  setCoreStateClass(geometry, currentState, { transitioning: true, fadingToMetrics: false });
  requestAnimationFrame(() => {
    setCoreStateClass(geometry, nextState, { transitioning: true, fadingToMetrics: false });
    geometry._transitionTimer = setTimeout(() => {
      finishTransition(geometry, nextState);
    }, duration);
  });


}

function switchState(state, btn) {
  const geometry = document.getElementById('geometry');
  if (isGeometrySaving(geometry)) return;

  const activeState = getTargetState(geometry);
  if (activeState === state) return;

  const transitionDuration = state === 'metrics' ? 620 : 1200;
  applyTransitionState(geometry, state, transitionDuration);
  setActiveSidebarButton('.sidebar .btn[data-state]', btn);
}

function setMetricsTheme(theme, btn) {
  const geometry = document.getElementById('geometry');
  if (!geometry) return;

  geometry.dataset.metricsTheme = theme;
  setActiveSidebarButton('.sidebar .btn[data-metrics-theme]', btn);

  if (isGeometrySaving(geometry)) return;

  const activeState = getTargetState(geometry);


  if (activeState !== 'metrics') {
    const metricsBtn = document.querySelector('.sidebar .btn[data-state="metrics"]');
    switchState('metrics', metricsBtn);
  }
}

function triggerSave() {
  const geometry = document.getElementById('geometry');
  if (isGeometrySaving(geometry)) return;

  const previousState = getTargetState(geometry);
  if (previousState === 'save') return;

  geometry.dataset.saving = '1';
  applyTransitionState(geometry, 'save', 110);
  clearSaveTimers(geometry);

  geometry._saveReturnTimer = setTimeout(() => {
    applyTransitionState(geometry, previousState, 110);
    geometry._saveUnlockTimer = setTimeout(() => {
      geometry.dataset.saving = '0';
      geometry._saveReturnTimer = null;
      geometry._saveUnlockTimer = null;
    }, 180);
  }, 2350);
}

</script>
