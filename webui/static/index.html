<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>罗德岛协议中枢</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-soft: #111111;
      --bg-deep: #070707;
      --panel: rgba(255,255,255,0.03);
      --panel-strong: rgba(255,255,255,0.05);
      --line: rgba(196, 205, 214, 0.18);
      --line-strong: rgba(196, 205, 214, 0.34);
      --text: #f5f7fa;
      --muted: rgba(245,247,250,0.58);
      --dim: rgba(245,247,250,0.34);
      --accent: #8fb9c7;
      --accent-2: #6f8790;
      --orange: #d07a3f;
      --danger: #d26464;
      --good: #9bc88a;
      --shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
      --ease: cubic-bezier(0.25, 1, 0.5, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      background:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
        radial-gradient(circle at 20% 20%, rgba(143,185,199,0.06), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(208,122,63,0.04), transparent 24%),
        linear-gradient(180deg, #0d0d0d 0%, #090909 100%);
      background-size: 24px 24px, 24px 24px, auto, auto, auto;
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Source Han Sans SC", sans-serif;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image:
        radial-gradient(rgba(255,255,255,0.9) 0.45px, transparent 0.65px);
      background-size: 5px 5px;
      mix-blend-mode: screen;
    }
    button, input, textarea, select {
      font: inherit;
      color: inherit;
      border-radius: 0;
    }
    input::placeholder, textarea::placeholder { color: rgba(245,247,250,0.25); }
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 272px minmax(0, 1fr);
    }
    .side {
      position: relative;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      padding: 16px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
    }
    .cross::before, .cross::after, .panel::before, .panel::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      border: 1px solid var(--line-strong);
      background: var(--bg-deep);
    }
    .cross::before, .panel::before { left: -4px; top: -4px; }
    .cross::after, .panel::after { right: -4px; bottom: -4px; }
    .brand, .nav-block, .profile-brief, .topbar, .panel, .dialog-card {
      position: relative;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      box-shadow: var(--shadow);
    }
    .brand {
      padding: 18px 16px 14px;
      overflow: hidden;
    }
    .brand::before {
      content: "[ ROD ISLAND PROTOCOL ]";
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 9px;
      letter-spacing: 1.8px;
      color: var(--dim);
    }
    .brand-big {
      font-size: 54px;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 18px;
      text-transform: uppercase;
    }
    .brand-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 10px;
      color: var(--muted);
    }
    .meta-chip {
      border: 1px solid var(--line);
      padding: 3px 6px;
      background: rgba(255,255,255,0.02);
    }
    .nav-block { padding: 12px; }
    .nav-title, .section-kicker, .tiny-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--dim);
      margin-bottom: 10px;
    }
    .nav-list { display: grid; gap: 8px; }
    .nav-btn, .ghost-btn, .solid-btn, .danger-btn, .mini-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: transparent;
      cursor: pointer;
      transition: transform 0.18s var(--ease), background 0.18s var(--ease), color 0.18s var(--ease), border-color 0.18s var(--ease);
      text-align: left;
    }
    .nav-btn {
      position: relative;
      padding: 12px 14px;
      font-size: 12px;
      letter-spacing: 1px;
      background: rgba(255,255,255,0.015);
      overflow: hidden;
    }
    .nav-btn::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 0;
      background: linear-gradient(90deg, rgba(143,185,199,0.18), transparent);
      transition: width 0.18s var(--ease);
    }
    .nav-btn:hover::before, .nav-btn.active::before { width: 100%; }
    .nav-btn:hover, .nav-btn.active {
      color: #0a0a0a;
      background: var(--accent);
      border-color: var(--accent);
      transform: translateX(4px);
    }
    .nav-btn small {
      display: block;
      margin-top: 4px;
      opacity: 0.72;
      font-size: 9px;
      letter-spacing: 1px;
    }
    .profile-brief {
      align-self: end;
      padding: 14px;
      display: grid;
      gap: 8px;
    }
    .profile-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
    }
    .main {
      padding: 16px;
      display: grid;
      gap: 16px;
    }
    .topbar {
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      align-items: end;
    }
    .headline {
      font-size: clamp(52px, 9vw, 108px);
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .headline-sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
      max-width: 760px;
    }
    .topbar-right {
      display: grid;
      gap: 10px;
      justify-items: end;
    }
    .status-box {
      width: 100%;
      border: 1px solid var(--line);
      padding: 10px 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 0 100%);
    }
    .status-item b { display: block; font-size: 18px; color: var(--accent); }
    .status-item span { font-size: 10px; letter-spacing: 1px; color: var(--dim); }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
    }
    .page { display: none; }
    .page.active { display: grid; gap: 16px; }
    .page-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 16px;
    }
    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-7 { grid-column: span 7; }
    .span-6 { grid-column: span 6; }
    .span-5 { grid-column: span 5; }
    .span-4 { grid-column: span 4; }
    .span-3 { grid-column: span 3; }
    .panel {
      padding: 14px;
      overflow: hidden;
    }
    .panel.breakout { transform: translateX(10px); }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }
    .panel-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .panel-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.7;
    }
    .tool-row, .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ghost-btn, .solid-btn, .danger-btn, .mini-btn {
      padding: 9px 12px;
      font-size: 11px;
      letter-spacing: 1px;
      background: rgba(255,255,255,0.015);
    }
    .solid-btn {
      background: var(--accent);
      color: #060606;
      border-color: var(--accent);
      font-weight: 800;
    }
    .danger-btn {
      color: var(--danger);
      border-color: rgba(210,100,100,0.5);
    }
    .ghost-btn:hover, .solid-btn:hover, .danger-btn:hover, .mini-btn:hover {
      transform: translateY(-2px);
      background: var(--text);
      color: #090909;
      border-color: var(--text);
    }
    .mini-btn {
      padding: 6px 8px;
      font-size: 10px;
    }
    .kpi-grid, .stat-grid, .profile-grid, .card-grid, .image-grid, .range-grid, .group-grid {
      display: grid;
      gap: 12px;
    }
    .kpi-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .profile-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .image-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .range-grid, .group-grid { grid-template-columns: 1fr; }
    .metric, .stat-card, .profile-card, .archive-card, .image-card, .range-card, .group-card, .holder-card {
      position: relative;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.015);
      padding: 12px;
    }
    .metric-value {
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .metric-label, .stat-card p, .profile-card p, .archive-meta, .group-card p, .holder-card p {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
    }
    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .field-grid.triple { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .field-grid.quad { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .field {
      display: grid;
      gap: 6px;
    }
    .field label {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--dim);
    }
    .input, .textarea, .select {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }
    .textarea { min-height: 96px; resize: vertical; }
    .input:focus, .textarea:focus, .select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(143,185,199,0.16) inset;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--line);
      padding: 10px 12px;
      background: rgba(255,255,255,0.015);
      gap: 12px;
    }
    .toggle {
      width: 52px;
      height: 22px;
      border: 1px solid var(--line-strong);
      position: relative;
      cursor: pointer;
      background: #0f0f0f;
    }
    .toggle::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: var(--text);
      transition: transform 0.16s steps(2);
    }
    .toggle.on { background: var(--accent); border-color: var(--accent); }
    .toggle.on::before { transform: translateX(30px); background: #080808; }
    .pill-list, .tag-list, .bound-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .pill, .tag, .bound-item {
      border: 1px solid var(--line);
      padding: 3px 6px;
      font-size: 10px;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
    }
    .profile-card.active, .archive-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(143,185,199,0.15) inset;
    }
    .profile-card h3, .archive-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 10px;
      line-height: 1.1;
    }
    .archive-card {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }
    .archive-thumb {
      width: 96px;
      height: 96px;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(143,185,199,0.08), rgba(255,255,255,0.02));
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
      display: grid;
      place-items: center;
      color: var(--dim);
      font-size: 11px;
    }
    .archive-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .archive-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .rank-list {
      display: grid;
      gap: 8px;
    }
    .rank-item {
      border: 1px solid var(--line);
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.015);
    }
    .rank-no {
      font-size: 18px;
      font-weight: 900;
      color: var(--accent);
      text-align: center;
    }
    .empty {
      border: 1px dashed var(--line-strong);
      padding: 18px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      min-width: 280px;
      max-width: 420px;
      padding: 12px 14px;
      border: 1px solid var(--line-strong);
      background: rgba(10,10,10,0.96);
      color: var(--text);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
      z-index: 40;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.good { border-color: rgba(155,200,138,0.45); }
    .toast.bad { border-color: rgba(210,100,100,0.45); }
    .dialog {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }
    .dialog.show { display: flex; }
    .dialog-card {
      width: min(920px, 100%);
      max-height: 88vh;
      overflow: auto;
      padding: 14px;
      background: #0d0d0d;
    }
    .dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .dialog-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
    }
    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 14px;
    }
    .helper {
      font-size: 10px;
      color: var(--dim);
      line-height: 1.8;
    }
    .mono { font-family: Consolas, monospace; }
    .hidden { display: none !important; }

    @media (max-width: 1280px) {
      .topbar { grid-template-columns: 1fr; }
      .kpi-grid, .profile-grid, .card-grid, .image-grid, .field-grid.triple, .field-grid.quad { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .span-8, .span-7, .span-6, .span-5, .span-4, .span-3 { grid-column: span 12; }
      .split { grid-template-columns: 1fr; }
    }
    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      .side { border-right: none; border-bottom: 1px solid var(--line); }
      .kpi-grid, .stat-grid, .profile-grid, .card-grid, .image-grid, .field-grid, .field-grid.triple, .field-grid.quad { grid-template-columns: 1fr; }
      .archive-card { grid-template-columns: 1fr; }
      .archive-thumb { width: 100%; height: 180px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side cross">
      <section class="brand cross">
        <div class="brand-big">罗德岛<br>协议中枢</div>
        <div class="brand-meta">
          <span class="meta-chip">Ver. 5.4.0</span>
          <span class="meta-chip">[ 插件核心 ]</span>
          <span class="meta-chip">ARC-09 / 7F-A1</span>
        </div>
      </section>

      <section class="nav-block">
        <div class="nav-title">[ 导航矩阵 ]</div>
        <div class="nav-list">
          <button class="nav-btn active" data-page="overview">总览档案<small>核心状态 / 快捷调度</small></button>
          <button class="nav-btn" data-page="profiles">方案管理<small>方案切换 / 群绑定</small></button>
          <button class="nav-btn" data-page="access">访问控制<small>黑白名单 / 群准入</small></button>
          <button class="nav-btn" data-page="runtime">运行配置<small>系统开关 / 权重参数</small></button>
          <button class="nav-btn" data-page="signin">签到配置<small>运势区间 / 文本池</small></button>
          <button class="nav-btn" data-page="fate">命运牌档案<small>命运池 / 图像绑定</small></button>
          <button class="nav-btn" data-page="cards">功能牌档案<small>功能池 / 缺图检测</small></button>
          <button class="nav-btn" data-page="stats">数据统计<small>用户 / 群组 / 持牌排行</small></button>
        </div>
      </section>

      <section class="profile-brief">
        <div class="tiny-label">[ 当前方案 ]</div>
        <div class="profile-name" id="currentProfileName">默认配置</div>
        <div class="helper">绑定方案切换后，所有接口请求都将自动附带当前方案参数。</div>
      </section>
    </aside>

    <main class="main">
      <section class="topbar cross">
        <div>
          <div class="section-kicker">[ TERRA INTERNAL ARCHIVE / WEB UI ]</div>
          <div class="headline" id="headline">总览档案</div>
          <div class="headline-sub" id="headlineSub">深色工业档案式插件控制台。所有功能围绕当前方案展开，包括配置调度、牌池管理、签到文本、群访问控制与统计。</div>
        </div>
        <div class="topbar-right">
          <div class="status-box">
            <div class="status-item"><b id="quickProfiles">0</b><span>方案数量</span></div>
            <div class="status-item"><b id="quickGroups">0</b><span>群组数量</span></div>
            <div class="status-item"><b id="quickUsers">0</b><span>用户数量</span></div>
          </div>
          <div class="tool-row">
            <button class="solid-btn" id="reloadAllBtn">[ 重新载入 ]</button>
            <button class="ghost-btn" id="openCreateProfileBtn">[ 新建方案 ]</button>
          </div>
        </div>
      </section>

      <section class="layout">
        <div class="page active" id="page-overview"></div>
        <div class="page" id="page-profiles"></div>
        <div class="page" id="page-access"></div>
        <div class="page" id="page-runtime"></div>
        <div class="page" id="page-signin"></div>
        <div class="page" id="page-fate"></div>
        <div class="page" id="page-cards"></div>
        <div class="page" id="page-stats"></div>
      </section>
    </main>
  </div>

  <div class="dialog" id="editorDialog">
    <div class="dialog-card cross">
      <div class="dialog-head">
        <div>
          <div class="tiny-label">[ 档案编辑器 ]</div>
          <div class="dialog-title" id="dialogTitle">编辑器</div>
        </div>
        <button class="ghost-btn" id="dialogCloseBtn">[ 关闭 ]</button>
      </div>
      <div id="dialogBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      currentProfile: 'default',
      profiles: [],
      runtimeConfig: {},
      groupAccess: { mode: 'off', blacklist: [], whitelist: [] },
      signInTexts: { good_things: [], bad_things: [], luck_ranges: [] },
      fateCards: [],
      funcCards: [],
      fateImages: [],
      images: [],
      stats: { total_groups: 0, total_users: 0, card_holders: {}, groups: [] },
      missingImages: [],
      activePage: 'overview',
      dialogMode: '',
      dialogIndex: -1,
    };

    const $ = (s, root = document) => root.querySelector(s);
    const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));
    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    const pageMeta = {
      overview: ['总览档案', '当前方案的核心态势、资源异常、快捷操作与全局概览。'],
      profiles: ['方案管理', '管理配置方案、绑定群组、切换工作上下文。'],
      access: ['访问控制', '对群聊准入模式执行黑名单或白名单级别管制。'],
      runtime: ['运行配置', '调整系统总开关、抽取参数、稀有度权重与决斗逻辑。'],
      signin: ['签到配置', '编辑运势区间、好坏事件文本池及签到文案。'],
      fate: ['命运牌档案', '维护命运牌池、金币影响值与图像资源绑定。'],

    function toast(message, type = 'good') {
      const el = $('#toast');
      el.className = `toast show ${type}`;
      el.textContent = message;
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => el.className = 'toast', 2400);
    }

    function apiUrl(path) {
      const divider = path.includes('?') ? '&' : '?';
      return `${path}${divider}profile=${encodeURIComponent(state.currentProfile || 'default')}`;
    }

    async function apiGet(path) {
      const res = await fetch(apiUrl(path));
      return await res.json();
    }

    async function apiPost(path, body) {
      const res = await fetch(apiUrl(path), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      return await res.json();
    }

    async function apiDelete(path) {
      const res = await fetch(apiUrl(path), { method: 'DELETE' });
      return await res.json();
    }

    function setHeadline(page) {
      state.activePage = page;
      const meta = pageMeta[page] || pageMeta.overview;
      $('#headline').textContent = meta[0];
      $('#headlineSub').textContent = meta[1];
      $$('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.page === page));
      $$('.page').forEach(pageEl => pageEl.classList.toggle('active', pageEl.id === `page-${page}`));
    }

    function getProfileName(profileId = state.currentProfile) {
      return state.profiles.find(item => item.profile_id === profileId)?.display_name || profileId || '默认配置';
    }

    function updateCurrentProfileUI() {
      $('#currentProfileName').textContent = getProfileName();
      $('#quickProfiles').textContent = String(state.profiles.length || 0);
      $('#quickGroups').textContent = String(state.stats.total_groups || 0);
      $('#quickUsers').textContent = String(state.stats.total_users || 0);

    function ensureRuntimeShape() {
      const cfg = state.runtimeConfig || {};
      cfg.webui_settings ||= { enable: true, port: 4399 };
      cfg.fate_cards_settings ||= { enable: true, daily_draw_limit: 3 };
      cfg.func_cards_settings ||= {
        enable: true,
        enable_dice_cards: true,
        enable_public_duel_mode: false,
        public_duel_daily_limit: 3,
        public_duel_min_stake: 10,
        public_duel_max_stake: 200,
        enable_rarity_dedup: true,
        rarity_mode: 'default',
        custom_rarity_weights: { rarity_1: 30, rarity_2: 30, rarity_3: 28, rarity_4: 11, rarity_5: 1 },
        economy_settings: { draw_probability: 5, free_daily_draw: 1, draw_cost: 20, pity_threshold: 10 },
      };
      cfg.func_cards_settings.custom_rarity_weights ||= { rarity_1: 30, rarity_2: 30, rarity_3: 28, rarity_4: 11, rarity_5: 1 };
      cfg.func_cards_settings.economy_settings ||= { draw_probability: 5, free_daily_draw: 1, draw_cost: 20, pity_threshold: 10 };
      state.runtimeConfig = cfg;
    }

    function setDeepValue(obj, path, value) {
      const keys = path.split('.');
      let cursor = obj;
      for (let i = 0; i < keys.length - 1; i++) {
        cursor[keys[i]] ||= {};
        cursor = cursor[keys[i]];
      }
      cursor[keys[keys.length - 1]] = value;
    }

    function getDeepValue(obj, path) {
      return path.split('.').reduce((acc, key) => acc?.[key], obj);
    }

    async function loadProfiles() {
      const res = await apiGet('/api/profile_overview');
      if (res.ok) state.profiles = res.profiles || [];
      if (!state.profiles.some(item => item.profile_id === state.currentProfile) && state.profiles[0]) {
        state.currentProfile = state.profiles[0].profile_id;
      }
    }

    async function loadRuntime() {
      const res = await apiGet('/api/runtime_config');
      if (res.ok) state.runtimeConfig = res.config || {};
      ensureRuntimeShape();
    }

    async function loadGroupAccess() {
      const res = await apiGet('/api/group_access');
      if (res.ok) state.groupAccess = res.config || { mode: 'off', blacklist: [], whitelist: [] };
    }

    async function loadSignInTexts() {
      const res = await apiGet('/api/sign_in_texts');
      if (res.ok) state.signInTexts = res.texts || { good_things: [], bad_things: [], luck_ranges: [] };
      state.signInTexts.good_things ||= [];
      state.signInTexts.bad_things ||= [];
      state.signInTexts.luck_ranges ||= [];
    }

    async function loadFateCards() {
      const [cardsRes, imagesRes] = await Promise.all([apiGet('/api/fate_cards'), apiGet('/api/fate_images')]);
      if (cardsRes.ok) state.fateCards = cardsRes.cards || [];
      if (imagesRes.ok) state.fateImages = imagesRes.images || [];
    }

    async function loadFuncCards() {
      const [cardsRes, imagesRes, missingRes] = await Promise.all([apiGet('/api/func_cards'), apiGet('/api/images'), apiGet('/api/check_missing_images')]);
      if (cardsRes.ok) state.funcCards = cardsRes.cards || [];
      if (imagesRes.ok) state.images = imagesRes.files || [];
      if (missingRes.ok) state.missingImages = missingRes.missing || [];
    }

    async function loadStats() {
      const res = await apiGet('/api/user_stats');
      if (res.ok) state.stats = res.stats || { total_groups: 0, total_users: 0, card_holders: {}, groups: [] };
    }

    async function loadEverything() {
      try {
        await loadProfiles();
        await Promise.all([loadRuntime(), loadGroupAccess(), loadSignInTexts(), loadFateCards(), loadFuncCards(), loadStats()]);
        updateCurrentProfileUI();
        renderAll();
      } catch (error) {
        console.error(error);
        toast('载入数据失败，请检查后端接口状态。', 'bad');
      }
    }

      renderAll();
      toast(`已切换到方案：${getProfileName(profileId)}`);

    async function renameProfile(profileId) {
      const current = state.profiles.find(item => item.profile_id === profileId);
      const name = window.prompt('请输入新的方案名称', current?.display_name || profileId);
      if (!name) return;
      const res = await apiPost('/api/profile_meta', { profile_id: profileId, display_name: name, cover_image: '' });
      if (res.ok) {
        await loadProfiles();
        updateCurrentProfileUI();
        renderProfiles();
        renderOverview();
        toast('方案名称已更新。');
      } else {
        toast(res.error || '重命名失败。', 'bad');
      }
    }

      const gid = window.prompt('请输入要绑定的群号');
      if (!gid) return;
      if (!/^\d+$/.test(gid)) return toast('群号格式无效。', 'bad');
      const res = await apiPost('/api/profile_bind_group', { profile_id: profileId, group_id: gid });
      if (res.ok) {
        await loadProfiles();
        await loadStats();
        updateCurrentProfileUI();
        renderProfiles();
        renderOverview();
        renderStats();
        toast('群号绑定完成。');
      } else {
        toast(res.error || '绑定失败。', 'bad');
      }
    }

      if (!window.confirm(`确认解绑群号 ${gid} 吗？`)) return;
      const res = await apiPost('/api/profile_unbind_group', { profile_id: profileId, group_id: gid });
      if (res.ok) {
        await loadProfiles();
        await loadStats();
        updateCurrentProfileUI();
        renderProfiles();
        renderOverview();
        renderStats();

      state.groupAccess.whitelist = ($('#whitelistInput')?.value || '').split(/\r?\n/).map(v => v.trim()).filter(Boolean);

    function toggleRuntime(path, el) {
      ensureRuntimeShape();
      const next = !getDeepValue(state.runtimeConfig, path);
      setDeepValue(state.runtimeConfig, path, next);
      el.classList.toggle('on', next);
    }

    function setRuntimeValue(path, value) {
      ensureRuntimeShape();
      const finalValue = value === '' ? '' : (isNaN(value) || String(value).trim() === '' ? value : Number(value));
      setDeepValue(state.runtimeConfig, path, finalValue);
    }

    async function saveRuntimeConfig() {
      const res = await apiPost('/api/runtime_config', { config: state.runtimeConfig });
      if (res.ok) toast('运行配置已保存。');
      else toast(res.error || '保存失败。', 'bad');
    }

    function setRangeField(index, key, value) {
      state.signInTexts.luck_ranges[index][key] = value;
    }

    function setRangeComments(index, value) {
      state.signInTexts.luck_ranges[index].comments = value.split(/\r?\n/).map(v => v.trim()).filter(Boolean);
    }

    function addLuckRange() {
      state.signInTexts.luck_ranges.push({ label: '新区间', min: 1, max: 100, gold_delta: 0, comments: [] });
      renderSignin();

      state.signInTexts.luck_ranges.splice(index, 1);
      renderSignin();

      state.signInTexts.good_things = ($('#goodThingsInput')?.value || '').split(/\r?\n/).map(v => v.trim()).filter(Boolean);
      state.signInTexts.bad_things = ($('#badThingsInput')?.value || '').split(/\r?\n/).map(v => v.trim()).filter(Boolean);

      else toast(res.error || '保存失败。', 'bad');

      if (!window.confirm('确认删除该命运牌吗？')) return;
      state.fateCards.splice(index, 1);
      renderFate();

      const payload = {
        card_name: $('#funcName')?.value?.trim() || '未命名功能牌',
        rarity: Number($('#funcRarity')?.value || 1),
        tags: ($('#funcTags')?.value || '').split(',').map(v => v.trim()).filter(Boolean),
        filename: $('#funcFilename')?.value?.trim() || '',
        description: $('#funcDesc')?.value?.trim() || '',
      };
      if (state.dialogIndex >= 0) state.funcCards[state.dialogIndex] = payload;
      else state.funcCards.push(payload);
      closeDialog();
      renderCards();
      await saveFuncCards(false);
      await refreshMissingImages(false);
      renderOverview();

    async function saveFuncCards(showToast = true) {
      const res = await apiPost('/api/func_cards', { cards: state.funcCards });
      if (res.ok) { if (showToast) toast('功能牌池已保存。'); }
      else toast(res.error || '保存失败。', 'bad');
    }

    async function deleteFuncCard(index) {
      if (!window.confirm('确认删除该功能牌吗？')) return;
      state.funcCards.splice(index, 1);
      renderCards();
      await saveFuncCards(false);
      await refreshMissingImages(false);
      renderOverview();
      toast('功能牌已删除。');
    }

    async function batchAddCards() {
      const raw = window.prompt('按每行一张的格式输入：卡牌名,稀有度,标签1|标签2');
      if (!raw) return;
      raw.split(/\r?\n/).map(line => line.trim()).filter(Boolean).forEach(line => {
        const [name, rarity, tags] = line.split(',').map(item => item?.trim() || '');
        if (!name) return;
        state.funcCards.push({
          card_name: name,
          rarity: Number(rarity || 1),
          tags: (tags || '').split('|').map(v => v.trim()).filter(Boolean),
          filename: '',
          description: '',
        });
      });
      renderCards();
      await saveFuncCards(false);
      toast('批量添加完成。');
    }

    async function uploadFuncImages() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.onchange = async () => {
        const form = new FormData();
        [...input.files].forEach(file => form.append('files', file));
        const res = await fetch(`/api/upload_image?profile=${encodeURIComponent(state.currentProfile)}`, { method: 'POST', body: form });
        const data = await res.json();
        if (data.ok) {
          toast(`功能牌图片上传成功：${(data.uploaded || []).join(' / ') || '完成'}`);
          await loadFuncCards();
          renderCards();
          renderOverview();
        } else toast(data.error || '上传失败。', 'bad');
      };
      input.click();
    }

    async function uploadFateImages() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.onchange = async () => {
        const form = new FormData();
        [...input.files].forEach(file => form.append('files', file));
        const res = await fetch(`/api/upload_fate_image?profile=${encodeURIComponent(state.currentProfile)}`, { method: 'POST', body: form });
        const data = await res.json();
        if (data.ok) {
          toast(`命运牌图片上传成功：${(data.uploaded || []).join(' / ') || '完成'}`);
          await loadFateCards();
          renderFate();
          renderOverview();
        } else toast(data.error || '上传失败。', 'bad');
      };
      input.click();
    }

    async function deleteFuncImage(file) {
      if (!window.confirm(`确认删除图片 ${file} 吗？`)) return;
      const res = await apiDelete(`/api/images/${encodeURIComponent(file)}`);
      if (res.ok) {
        await loadFuncCards();
        renderCards();
        renderOverview();
        toast('图片资源已删除。');
      } else toast(res.error || '删除失败。', 'bad');
    }

    async function refreshMissingImages(showToast = true) {
      const res = await apiGet('/api/check_missing_images');
      if (res.ok) state.missingImages = res.missing || [];
      if (showToast) toast('缺图扫描已完成。');
    }

    async function refreshCardsAndOverview() {
      await loadFuncCards();
      renderCards();
      renderOverview();
      toast('功能牌与资源状态已刷新。');
    }

    function switchPage(page) {
      setHeadline(page);
    }

    function bindStaticEvents() {
      $$('.nav-btn').forEach(btn => btn.addEventListener('click', () => switchPage(btn.dataset.page)));
      $('#reloadAllBtn').addEventListener('click', loadEverything);
      $('#openCreateProfileBtn').addEventListener('click', openCreateProfileDialog);
      $('#dialogCloseBtn').addEventListener('click', closeDialog);
      $('#editorDialog').addEventListener('click', (event) => {
        if (event.target.id === 'editorDialog') closeDialog();
      });
    }

    window.switchPage = switchPage;
    window.useProfile = useProfile;
    window.renameProfile = renameProfile;
    window.promptBindGroup = promptBindGroup;
    window.unbindGroup = unbindGroup;
    window.openCreateProfileDialog = openCreateProfileDialog;
    window.createProfileConfirm = createProfileConfirm;
    window.saveGroupAccess = saveGroupAccess;
    window.toggleRuntime = toggleRuntime;
    window.setRuntimeValue = setRuntimeValue;
    window.saveRuntimeConfig = saveRuntimeConfig;
    window.addLuckRange = addLuckRange;
    window.removeLuckRange = removeLuckRange;
    window.setRangeField = setRangeField;
    window.setRangeComments = setRangeComments;
    window.saveSignInTexts = saveSignInTexts;
    window.openFateEditor = openFateEditor;
    window.saveFateEditor = saveFateEditor;
    window.deleteFateCard = deleteFateCard;
    window.saveFateCards = saveFateCards;
    window.openFuncEditor = openFuncEditor;
    window.saveFuncEditor = saveFuncEditor;
    window.deleteFuncCard = deleteFuncCard;
    window.saveFuncCards = saveFuncCards;
    window.batchAddCards = batchAddCards;
    window.uploadFuncImages = uploadFuncImages;
    window.uploadFateImages = uploadFateImages;
    window.deleteFuncImage = deleteFuncImage;
    window.refreshCardsAndOverview = refreshCardsAndOverview;
    window.pickDialogImage = pickDialogImage;

    document.addEventListener('DOMContentLoaded', async () => {
      bindStaticEvents();
      await loadEverything();
    });
  </script>
</body>
</html>
