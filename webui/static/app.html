/* ================= 新增：HUD与雷达几何体样式 ================= */
.ark-geometry-core {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

/* 首屏状态下的雷达位置（偏右） */
.home-splash .ark-geometry-core .ark-hud-stage {
  right: -15vw;
  top: 50%;
  transform: translateY(-50%);
}

/* 身份验证页状态下的雷达位置（偏左，漏出另一半） */
.home-auth-shell .ark-geometry-core {
  /* 降低一点层级，不遮挡左侧的文字 */
  z-index: 0;
  opacity: 0.82; /* 调亮暗面雷达，但略低于纯黑色满亮度 */
}
.home-auth-shell .ark-geometry-core .ark-hud-stage {
  left: -20vw;
  top: 50%;
  transform: translateY(-50%);
}

/* 通用雷达容器场 */
.ark-hud-stage {
  position: absolute;
  width: 100vh;
  height: 100vh;
  max-width: 1200px;
  max-height: 1200px;
  border-radius: 50%;
  /* 转场时透明度和缩放的平滑过渡。恢复原版时间 */
  transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
}

.home-showcase.auth-alert .home-auth-shell .ark-hud-stage::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 38%;
  height: 38%;
  border-radius: 50% !important;
  border: 2px solid rgba(255, 51, 51, 0.72);
  box-shadow:
    0 0 24px rgba(255, 51, 51, 0.45),
    inset 0 0 18px rgba(255, 51, 51, 0.2);
  transform: translate(-50%, -50%) scale(0.28);
  pointer-events: none;
  opacity: 0;
  animation: ark-auth-alert-pulse 1.04s ease-out 1;
}

@keyframes ark-auth-alert-pulse {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.28);
  }
  18% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(2.18);
  }
}

/* ----- 阶段状态控制：消失与显现 ----- */
/* 首页状态：验证页雷达缩小并透明隐藏 */
.home-showcase.stage-intro .home-auth-shell .ark-hud-stage {
  opacity: 0;
  transform: translateY(-50%) scale(0.85);
}
/* 首页状态：首页雷达常驻 */
.home-showcase.stage-intro .home-splash .ark-hud-stage {
  opacity: 1;
  transform: translateY(-50%) scale(1);
}

/* 验证页状态：首页雷达放大并透明隐藏 */
.home-showcase.stage-auth .home-splash .ark-hud-stage,
.home-showcase.stage-ready .home-splash .ark-hud-stage,
.home-showcase.intro-collapse .home-splash .ark-hud-stage {
  opacity: 0;
  transform: translateY(-50%) scale(1.15);
}

/* 当从验证页返回首页时：首页雷达平滑复原，不再突兀跳出 */
.home-showcase.return-home .home-splash .ark-hud-stage {
  opacity: 1;
  transform: translateY(-50%) scale(1);
  transition:
    opacity 0.26s ease 0.04s,
    transform 0.46s cubic-bezier(0.19, 1, 0.22, 1);
}
/* 验证页状态：验证页雷达恢复原大小并显现 */
.home-showcase.stage-auth .home-auth-shell .ark-hud-stage,
.home-showcase.stage-ready .home-auth-shell .ark-hud-stage,
.home-showcase.intro-collapse .home-auth-shell .ark-hud-stage {
  opacity: 1;
  transform: translateY(-50%) scale(1);
}

/* 
 * 单次强力阻尼启动：极速接管，然后无缝衔接至极慢的无限匀速旋转。
 * 使用极其夸张的贝塞尔曲线 (0.0, 1.0, 0.05, 1.0) 营造“瞬间飞速，随后被生生刹住”的机能感。
 */

/* ----- 对于逆时针的齿轮刻度圈 ----- */
.home-showcase.intro-collapse .home-auth-shell .ark-ring-ticks-rotor,
.home-showcase.stage-auth .home-auth-shell .ark-ring-ticks-rotor {
  /* 利用负数 delay (-0.4s) 让动画提前开始，页面亮起时直接进入狂暴刹车阶段 */
  animation: ark-startup-burst-rev 2.8s cubic-bezier(0.0, 1.0, 0.05, 1.0) -0.4s 1;
}

/* 逆时针强阻尼爆发 */
@keyframes ark-startup-burst-rev {
  0% { transform: translate(-50%, -50%) rotate(240deg); }
  100% { transform: translate(-50%, -50%) rotate(0deg); }
}

/* 返回首页时使用叠层残影做柔和减速，不打断底层连续旋转 */
@keyframes ark-return-home-burst-rev {
  0% { transform: translate(-50%, -50%) rotate(40deg); }
  100% { transform: translate(-50%, -50%) rotate(0deg); }
}

/* 极细但高亮延伸十字基准线 */
.ark-cross-v, .ark-cross-h {
  position: absolute;
  background: rgba(26, 158, 94, 0.6);
  box-shadow: 0 0 12px rgba(26, 158, 94, 0.4);
}
.ark-cross-v {
  left: 50%;
  top: -30vh;
  bottom: -30vh;
  width: 1px;
  transform: translateX(-50%);
  background: linear-gradient(to bottom, transparent, rgba(26, 158, 94, 0.6) 15%, rgba(26, 158, 94, 0.6) 85%, transparent);
}
.ark-cross-h {
  top: 50%;
  left: -40vw;
  right: 10vw;
  height: 1px;
  transform: translateY(-50%);
  background: linear-gradient(to right, transparent, rgba(26, 158, 94, 0.6) 15%, rgba(26, 158, 94, 0.6) 85%, transparent);
}

/* 雷达环层级（增粗增强可见度） */
.ark-ring-outer, .ark-ring-mid, .ark-ring-inner, .ark-ring-ticks-rotor {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50% !important;
}

.ark-ring-outer {
  width: 100%;
  height: 100%;
  border: 2px solid rgba(230, 237, 233, 0.15);
  border-left-color: rgba(26, 158, 94, 0.6);
  border-bottom-color: rgba(26, 158, 94, 0.3);
  box-shadow: inset 0 3px 0 0 rgba(26, 158, 94, 0.35), -6px 0 16px rgba(26, 158, 94, 0.2);
  animation: ark-spin-v-slow 50s linear infinite;
}

/* 动态追踪目标锁定框 */
.ark-track-target {
  position: absolute;
  width: 12px; height: 12px;
  border: 1px solid rgba(26, 158, 94, 0.6);
  background: rgba(26, 158, 94, 0.15);
  box-shadow: 0 0 12px rgba(26, 158, 94, 0.3);
  z-index: 5;
}
.ark-track-target::after {
  content: 'OBJ.01';
  position: absolute; top: -14px; left: 14px;
  font-family: var(--font-headline); font-size: 9px; font-weight: 800; color: rgba(26, 158, 94, 0.8);
  white-space: nowrap;
}
.t1 { top: 35%; left: 65%; animation: ark-float-t1 7s ease-in-out infinite alternate; }
.t2 { bottom: 28%; right: 68%; animation: ark-float-t2 9s ease-in-out infinite alternate-reverse; }
.t2::after { content: 'OBJ.02'; color: rgba(230, 237, 233, 0.7); }
.t-alert {
  top: 46%;
  left: 56%;
  border-color: rgba(255, 51, 51, 0.9);
  background: rgba(255, 51, 51, 0.22);
  box-shadow: 0 0 16px rgba(255, 51, 51, 0.56);
  opacity: 0;
  transform: translate(8px, -6px) scale(0.7);
}
.t-alert::after {
  content: 'ERR.01';
  color: rgba(255, 88, 88, 0.95);
  text-shadow: 0 0 10px rgba(255, 51, 51, 0.72);
}
.t-alert::before {
  content: '';
  position: absolute;
  inset: -8px;
  border: 1px solid rgba(255, 51, 51, 0.42);
  opacity: 0;
}
.home-showcase.auth-alert .home-auth-shell .t-alert {
  animation:
    ark-alert-target-pop 0.46s cubic-bezier(0.16, 1, 0.3, 1) forwards,
    ark-alert-target-float 2.8s ease-in-out 0.46s infinite alternate;
}
.home-showcase.auth-alert .home-auth-shell .t-alert::before {
  animation: ark-alert-target-lock 1s ease-out infinite;
}

@keyframes ark-float-t1 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(-30px, 15px); }
}
@keyframes ark-float-t2 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(20px, -25px); }
}
@keyframes ark-alert-target-pop {
  0% { opacity: 0; transform: translate(18px, -14px) scale(0.45); }
  72% { opacity: 1; transform: translate(0, 0) scale(1.08); }
  100% { opacity: 1; transform: translate(0, 0) scale(1); }
}
@keyframes ark-alert-target-float {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 1; transform: translate(-16px, 10px) scale(1); }
}
@keyframes ark-alert-target-lock {
  0% { opacity: 0.9; transform: scale(0.72); }
  100% { opacity: 0; transform: scale(1.45); }
}

/* 伴随外环旋转的发光节点，体现精密感 */
.ark-orbit-node, .ark-orbit-node-opp {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--accent);
  left: 50%;
  transform: translateX(-50%);
}
.ark-orbit-node { top: -4px; }
.ark-orbit-node-opp { bottom: -4px; background: rgba(230, 237, 233, 0.8); box-shadow: 0 0 8px rgba(230, 237, 233, 0.5); }

/* 极密仪表刻度圈：用渐变遮罩做出精密的齿轮刻度 */
.ark-ring-ticks-rotor {
  width: 82%;
  height: 82%;
}

.home-showcase.return-home .home-splash .ark-ring-ticks-rotor {
  animation: ark-return-home-burst-rev 0.82s cubic-bezier(0.18, 0.86, 0.28, 1) 1;
}

.ark-ring-ticks {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  border-radius: 50% !important;
  transform: translate(-50%, -50%);
  background: repeating-conic-gradient(from 0deg, rgba(230, 237, 233, 0.25) 0deg 0.5deg, transparent 0.5deg 2deg);
  -webkit-mask: radial-gradient(circle, transparent 66%, #000 66.5%, #000 68%, transparent 68.5%);
  mask: radial-gradient(circle, transparent 66%, #000 66.5%, #000 68%, transparent 68.5%);
  animation: ark-spin-v-slow-rev 180s linear infinite;
  animation-delay: var(--radar-ticks-delay, 0s);
}
/* 不对称的高亮刻度微光段 */
.ark-ring-ticks::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: repeating-conic-gradient(from 0deg, rgba(26, 158, 94, 0.9) 0deg 0.5deg, transparent 0.5deg 2deg);
  -webkit-mask: conic-gradient(from 0deg, transparent 0deg, #000 15deg 35deg, transparent 50deg, transparent 190deg, #000 200deg 215deg, transparent 230deg);
  mask: conic-gradient(from 0deg, transparent 0deg, #000 15deg 35deg, transparent 50deg, transparent 190deg, #000 200deg 215deg, transparent 230deg);
}

/* 中环：稍微调低一点透明度，强化主次 */
.ark-ring-mid {
  width: 60%;
  height: 60%;
  border: 2px dashed rgba(26, 158, 94, 0.2);
  animation: ark-spin-v-slow-rev 35s linear infinite;
}

/* 内环：粗重的不对称边框，非常明显的旋转标志 */
.ark-ring-inner {
  width: 32%;
  height: 32%;
  border: 3px solid transparent;
  border-top-color: rgba(26, 158, 94, 0.7);
  border-right-color: rgba(230, 237, 233, 0.5);
  animation: ark-spin-v-slow 16s linear infinite;
}

/* 核心准星节点 */
.ark-core-node {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 16px var(--accent);
}

}
.ark-core-cross-v {
  left: 50%; top: -16px; bottom: -16px; width: 1px;
  transform: translateX(-50%);
}

.ark-core-node::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 80px;
  height: 80px;
  border: 1px solid var(--accent);
  border-radius: 50%;

  animation: ark-pulse-ring 2.5s ease-out infinite;

.home-showcase.auth-alert .home-auth-shell .ark-core-node {

.home-showcase.auth-alert .home-auth-shell .ark-core-cross-h,
.home-showcase.auth-alert .home-auth-shell .ark-core-cross-v {

}

.home-showcase.auth-alert .home-auth-shell .ark-core-node::after {

  animation: ark-auth-core-alert-pulse 1.04s ease-out forwards;
}

@keyframes ark-auth-core-alert-pulse {
  0% {
    width: 8px;
    height: 8px;
    opacity: 0.92;

/* 极简刻度参数：增大字体，增加对比度 */

/* 右下角信息组：更清晰醒目 */
.ark-hud-metrics {
  position: absolute;
  right: 18%;
  bottom: 22%;
  font-family: var(--font-headline);
  font-size: 11px;
  line-height: 2;
  color: rgba(230, 237, 233, 0.55);

}
.ark-hud-metrics .ark-highlight {

        { min: 31, max: 70, label: '平运', comments: ['平稳推进，适合清任务。'] },

      { text: '林地回响', gold: 120, filename: 'fate_02.png' }
    ],

      { card_name: '突击协议', type: 'attack', rarity: 4, filename: 'func_01.png', description: '对目标造成额外压制。', tags: ['steal:100'] },
      { card_name: '复苏模块', type: 'heal', rarity: 3, filename: 'func_02.png', description: '为目标提供恢复。', tags: ['cleanse'] },
      { card_name: '护盾框架', type: 'defense', rarity: 2, filename: 'func_03.png', description: '为单位挂载护盾。', tags: ['add_shield'] }
    ],
    images: ['func_01.png', 'func_02.png', 'func_03.png', 'func_04.png'],
    titles: [
      {
        name: '森林旅人',
        description: '在武陵雾林中完成初次探索。',
        conditions: [{ type: 'sign_in_total', value: 7 }],
        effects: [{ type: 'func_draw_prob', value: 5 }]
      }
    ],
    title_catalog: null,
    stats: {
      total_groups: 2,
      total_users: 48,
      card_holders: {
        '博士A': 12,
        '博士B': 9,
        '博士C': 7
      },
      groups: [
        { group_id: '123456789', group_name: '武陵一群', users: 26 },
        { group_id: '987654321', group_name: '武陵二群', users: 22 }
      ]
    }
  };

  function clone(v) {
    return JSON.parse(JSON.stringify(v));
  }

  function jsonResponse(data) {
    return Promise.resolve(new Response(JSON.stringify(data), {
      status: 200,
      headers: { 'Content-Type': 'application/json; charset=utf-8' }
    }));
  }

  const originalFetch = window.fetch.bind(window);
  window.fetch = function (input, init) {
    const url = typeof input === 'string' ? input : input.url;
    if (!url.includes('/api/')) return originalFetch(input, init);

    const parsed = new URL(url, 'http://local.test');
    const path = parsed.pathname;
    const method = (init && init.method ? init.method : 'GET').toUpperCase();
    let body = {};
    if (init && init.body && typeof init.body === 'string') {
      try { body = JSON.parse(init.body); } catch (_) {}
    }

        if (method === 'GET' && path === '/api/profile_overview') return jsonResponse({ ok: true, profiles: clone(store.profiles) });
    if (method === 'GET' && path === '/api/runtime_config') return jsonResponse({ ok: true, config: clone(store.runtime_config) });
    if (method === 'GET' && path === '/api/group_access') return jsonResponse({ ok: true, config: clone(store.group_access) });
    if (method === 'GET' && path === '/api/sign_in_texts') return jsonResponse({ ok: true, texts: clone(store.sign_in_texts) });
    if (method === 'GET' && path === '/api/fate_cards') return jsonResponse({ ok: true, cards: clone(store.fate_cards) });
    if (method === 'GET' && path === '/api/fate_images') return jsonResponse({ ok: true, images: clone(store.fate_images) });
    if (method === 'GET' && path === '/api/func_cards') return jsonResponse({ ok: true, cards: clone(store.func_cards) });
    if (method === 'GET' && path === '/api/images') return jsonResponse({ ok: true, files: clone(store.images) });
    if (method === 'GET' && path === '/api/titles') return jsonResponse({ ok: true, titles: clone(store.titles), catalog: store.title_catalog });
    if (method === 'GET' && path === '/api/user_stats') return jsonResponse({ ok: true, stats: clone(store.stats) });

    if (method === 'POST' && path === '/api/runtime_config') { store.runtime_config = clone(body.config || {}); return jsonResponse({ ok: true }); }
    if (method === 'POST' && path === '/api/group_access') { store.group_access = clone(body.config || {}); return jsonResponse({ ok: true }); }
    if (method === 'POST' && path === '/api/sign_in_texts') { store.sign_in_texts = clone(body.texts || {}); return jsonResponse({ ok: true }); }
    if (method === 'POST' && path === '/api/fate_cards') { store.fate_cards = clone(body.cards || []); return jsonResponse({ ok: true }); }
    if (method === 'POST' && path === '/api/func_cards') { store.func_cards = clone(body.cards || []); return jsonResponse({ ok: true }); }
    if (method === 'POST' && path === '/api/titles') { store.titles = clone(body.titles || []); return jsonResponse({ ok: true }); }

    if (method === 'POST' && path === '/api/profiles') {
      const name = body.name || '新方案';
      const id = 'profile_' + Date.now();
      store.profiles.push({ profile_id: id, display_name: name, groups: [], is_default: false });
      return jsonResponse({ ok: true, profile_id: id });
    }
    if (method === 'POST' && path === '/api/profile_meta') {
      const item = store.profiles.find(p => p.profile_id === body.profile_id);
      if (item) { item.display_name = body.display_name || item.display_name; item.desc = body.desc || ''; item.tags = body.tags || []; }
      return jsonResponse({ ok: true });
    }
    if (method === 'POST' && path === '/api/profile_remove') {
      store.profiles = store.profiles.filter(p => p.profile_id !== body.profile_id);
      return jsonResponse({ ok: true, fallback_profile: 'default' });
    }
    if (method === 'POST' && path === '/api/profile_bind_group') {
      const item = store.profiles.find(p => p.profile_id === body.profile_id);
      if (item && body.group_id && !item.groups.includes(body.group_id)) item.groups.push(body.group_id);
      return jsonResponse({ ok: true });
    }
    if (method === 'POST' && path === '/api/profile_unbind_group') {
      const item = store.profiles.find(p => p.profile_id === body.profile_id);
      if (item) item.groups = item.groups.filter(g => g !== body.group_id);
      return jsonResponse({ ok: true });
    }

    if (path === '/api/upload_image' || path === '/api/upload_fate_image') return jsonResponse({ ok: true, files: [] });
    return jsonResponse({ ok: true });
  };
})();
</script>

async function submitHomeAccess() {
  const password = ($('#homeInlinePassword')?.value || $('#homeAccessCode')?.value || state.homePasswordDraft || '').trim();
  if (!password) {
    state.homeAuthTerminalState = 'error';
    state.homeAuthTerminalMessage = 'FATAL: Empty credential payload provided.';
    renderHome();
    setTimeout(() => $('#homeInlinePassword')?.focus(), 30);
    showToast('请输入访问口令。', true);
    return;
  }
  state.homePasswordDraft = password;
  const keepErrorUntilResolved = state.homeAuthTerminalState === 'error';
  if (!keepErrorUntilResolved) {
    state.homeAuthTerminalState = 'verifying';
    state.homeAuthTerminalMessage = 'validation request pushed to backend verifier';
    renderHome();
  }
  try {
    const loginRes = await apiPost('/api/access/verify', { password });
    state.identity = loginRes.identity || { type: 'anonymous', permissions: {} };
    state.homeAccessVerified = true;
    state.homeStage = 'ready';
    state.homePasswordDraft = '';
    state.homeAuthTerminalState = 'success';
    state.homeAuthTerminalMessage = 'welcome back // access channel aligned';
    await loadAll();
    renderHome();
    $('#homeInlineInitBtn')?.focus();
    showToast('权限验证通过，已解锁初始化入口。');
  } catch (e) {
    state.homeAccessVerified = false;
    state.homeStage = 'auth';
    state.homeAuthTerminalState = 'error';
    state.homeAuthTerminalMessage = e?.message || 'Authentication protocol rejected the request.';
    renderHome();
    setTimeout(() => $('#homeInlinePassword')?.focus(), 30);
    showToast(e?.message || '访问口令验证失败。', true);
  }
}

function getImagePools(kind) {
  return kind === 'fate'

    : { local: state.funcLocalImages || [], lazy: state.funcLazyImages || [], all: state.images || [] };
}

function imageExists(kind, filename) {
  if (!filename) return false;
  return getImagePools(kind).all.includes(filename);
}

function getCardImageUrl(kind, filename) {
  if (!filename) return '';
  const safe = encodeURIComponent(filename);
  const profile = encodeURIComponent(state.currentProfile);
  return kind === 'fate' ? `/fate_assets/${safe}?profile=${profile}` : `/assets/${safe}?profile=${profile}`;
}

function getUnusedImageFiles(kind) {
  const cards = kind === 'fate' ? state.fateCards : state.funcCards;
  const used = new Set(cards.map(card => card.filename).filter(Boolean));
  return getImagePools(kind).all.filter(file => !used.has(file));
}

function isDeletePending(kind, index) {

}

function isAssetDeletePending(kind, file) {

}

function stopLazyProgress() {
  if (state.lazyProgress.timer) {
    clearInterval(state.lazyProgress.timer);
    state.lazyProgress.timer = null;
  }
}

function setLazyProgress(percent, label) {
  ensureLazyProgressHud();
  const hud = $('#lazyProgressHud');
  const bar = $('#lazyProgressBar');
  const text = $('#lazyProgressText');
  const title = $('#lazyProgressLabel');
  if (!hud || !bar || !text || !title) return;
  hud.style.display = 'block';
  title.textContent = label || '懒狗模式生成中';
  const value = Math.max(0, Math.min(100, Number(percent || 0)));
  bar.style.width = `${value}%`;
  text.textContent = value >= 100 ? '100% 已完成' : `${Math.floor(value)}%`;
}

function startLazyProgress(kind, count, imageMode) {
  stopLazyProgress();
  state.lazyProgress.active = true;
  state.lazyProgress.percent = 1;
  const slowFactor = imageMode === 'remote' ? 22 : imageMode === 'local' ? 13 : 8;
  const step = Math.max(0.16, 96 / Math.max(34, count * slowFactor));
  setLazyProgress(1, kind === 'fate' ? '命运牌正在生成...' : '功能牌正在生成...');
  state.lazyProgress.timer = setInterval(() => {
    state.lazyProgress.percent = Math.min(99, state.lazyProgress.percent + step);
    setLazyProgress(state.lazyProgress.percent, kind === 'fate' ? '命运牌正在生成...' : '功能牌正在生成...');
  }, 420);
}

function finishLazyProgress(success = true) {
  stopLazyProgress();
  if (!$('#lazyProgressHud')) return;
  if (success) {
    setLazyProgress(100, '生成完成');
    setTimeout(() => {
      const hud = $('#lazyProgressHud');
      if (hud) hud.style.display = 'none';
    }, 700);
    return;
  }
  const hud = $('#lazyProgressHud');
  if (hud) hud.style.display = 'none';
}

function apiUrl(path) {
  return `${path}${path.includes('?') ? '&' : '?'}profile=${encodeURIComponent(state.currentProfile || 'default')}`;
}
const requestJson = async (path, options = {}) => {
  const response = await fetch(apiUrl(path), options);
  const text = await response.text();
  const contentType = response.headers.get('content-type') || '';

  if (!contentType.includes('application/json')) {
    const preview = text.slice(0, 120).replace(/\s+/g, ' ');
    throw new Error(`接口未返回 JSON: ${path} [${response.status}] ${preview}`);
  }

  const data = JSON.parse(text);
  if (!response.ok) {
    if (response.status === 401 && data?.code === 'auth_required') {
      showHomeAuthView('当前登录态已失效，请重新输入访问口令。');
    }
    throw new Error(data?.error || `请求失败: ${path} [${response.status}]`);
  }
  return data;
};
const apiGet = (path) => requestJson(path);

const apiPost = (path, body) => requestJson(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
const apiDelete = (path) => requestJson(path, { method: 'DELETE' });

function setDeep(obj, path, value) {
  const keys = path.split('.');
  let t = obj;
  for (let i = 0; i < keys.length - 1; i++) {
    t[keys[i]] ||= {};
    t = t[keys[i]];
  }
  t[keys[keys.length - 1]] = value;
}
function getDeep(obj, path) { return path.split('.').reduce((a, k) => a?.[k], obj); }

    if (stateRes.ok) {
      state.identity = stateRes.identity || { type: 'anonymous', permissions: {} };
      if (Array.isArray(stateRes.roles)) state.visitorRoles = stateRes.roles;
    }
    const draftsRes = await apiGet('/api/visitor/drafts');
    if (draftsRes.ok) state.visitorDrafts = draftsRes.drafts || [];
    if (state.identity.type === 'admin') {
      const [rolesRes, keysRes, tunnelRes] = await Promise.all([
        apiGet('/api/visitor/roles'),
        apiGet('/api/visitor/keys'),
        apiGet('/api/visitor/tunnel'),
      ]);
      if (rolesRes.ok) state.visitorRoles = rolesRes.roles || [];
      if (keysRes.ok) state.visitorKeys = keysRes.keys || [];
      if (tunnelRes.ok) {
        state.visitorTunnel = tunnelRes;
        state.visitorInstallTask = tunnelRes.install_task || {};
        if (isCloudflaredInstallBusy(state.visitorInstallTask) && state.visitorInstallTask.task_id) {
          setTimeout(() => pollCloudflaredInstall(state.visitorInstallTask.task_id), 0);
        }
        if (tunnelRes.detected && !state.visitorCloudflaredNoticeShown) {
          state.visitorCloudflaredNoticeShown = true;
          showToast('cloudflared 检测正常，可以使用托管临时地址。');
        }
      }
    }
  } catch (e) {
    console.warn('loadVisitor failed:', e);
  }
}


async function loadAll(showMessage = false) {
  try {
    if (state.identity.type === 'visitor') {
      state.profiles = [{ profile_id: state.currentProfile || 'default', display_name: '当前方案', groups: [], is_default: true }];
      await Promise.all([loadRuntime(), loadSignin(), loadFate(), loadCards(), loadTitles()]);
    } else {
      await loadProfiles();
      await refreshActiveProfileData();
    }
    await loadVisitor();
    renderAll();
    if (showMessage) showToast('载入成功');
  } catch (e) {
    console.error(e);
    showToast('载入失败，请检查后端接口。', true);
  }
}

async function syncHomeAccessStatus() {
  try {
    const res = await apiGet('/api/access/status');
    state.homeAccessVerified = !!res.verified;
    state.identity = res.identity || { type: 'anonymous', permissions: {} };
    if (state.homeAccessVerified) {
      await loadAll();
      state.homeStage = 'ready';
    } else {
      state.homeStage = 'intro';
    }
  } catch (e) {
    console.warn('syncHomeAccessStatus failed:', e);
    state.homeAccessVerified = false;
    state.homeStage = 'intro';
  }
}

const rarityWeightPalette = [
  { key: 'rarity_1', label: '普通', color: '#6f7d8e' },
  { key: 'rarity_2', label: '稀有', color: '#58a7ff' },
  { key: 'rarity_3', label: '史诗', color: '#9f6cff' },
  { key: 'rarity_4', label: '传说', color: '#ffbf5f' },
  { key: 'rarity_5', label: '神话', color: '#ff7078' },
];
const funcTypePalette = {
  attack: { label: '攻击', color: '#ff8d78' },
  heal: { label: '辅助', color: '#69dec1' },
  defense: { label: '防御', color: '#6f96ff' },
};
function buildRarityWeightPreview() {
  const weights = state.runtimeConfig?.func_cards_settings?.custom_rarity_weights || {};
  const items = rarityWeightPalette.map(item => {
    const value = Math.max(0, Number(weights[item.key] || 0));
    return { ...item, value };
  });
  const total = items.reduce((sum, item) => sum + item.value, 0);
  let cursor = 0;
  const segments = total > 0
    ? items.map(item => {
      const ratio = item.value / total;
      const start = cursor * 100;
      cursor += ratio;
      const end = cursor * 100;
      return `${item.color} ${start.toFixed(2)}% ${end.toFixed(2)}%`;
    })
    : ['rgba(255,255,255,.08) 0% 100%'];
  const previewItems = items.map(item => ({
    ...item,
    percent: total > 0 ? ((item.value / total) * 100) : 0,
  }));
  return {
    total,
    ringBackground: `conic-gradient(${segments.join(', ')})`,
    items: previewItems,
  };
}
function updateRarityChart() {
  const container = $('#weightAnalyzer');
  if (!container) return;
  const preview = buildRarityWeightPreview();
  
  const legendHtml = preview.items.map(item => `
    <div class="rarity-legend-item">
      <div class="rarity-dot-wrap">
        <span class="rarity-dot" style="--dot-color:${item.color}"></span>
        <span>${item.label}</span>
      </div>
      <span class="rarity-pct">${item.percent.toFixed(1)}%</span>
    </div>
  `).join('');

  container.innerHTML = `
    <div class="rarity-ring" style="background:${preview.ringBackground};">
      <div class="rarity-ring-center"><div><b>${preview.total}</b><span>权重总和</span></div></div>
    </div>
    <div class="rarity-legend">${legendHtml}</div>
  `;
}
function buildFuncTypeDistribution() {
  const items = Object.entries(funcTypePalette).map(([key, meta]) => {
    const count = state.funcCards.filter(card => (card.type || 'attack') === key).length;
    return { key, ...meta, count };
  });
  const total = items.reduce((sum, item) => sum + item.count, 0);
  let cursor = 0;
  const segments = total > 0
    ? items.filter(item => item.count > 0).map(item => {
      const ratio = item.count / total;
      const start = cursor * 100;
      cursor += ratio;
      const end = cursor * 100;
      return `${item.color} ${start.toFixed(2)}% ${end.toFixed(2)}%`;
    })
    : ['rgba(255,255,255,.08) 0% 100%'];
  return {
    total,
    ringBackground: `conic-gradient(${segments.join(', ')})`,
    items: items.map(item => ({
      ...item,
      percent: total > 0 ? ((item.count / total) * 100) : 0,
    })),
  };
}

function getPanelSectionSettings(sectionId) {
  ensureRuntime();
  const defaults = getDefaultPanelSectionSettings();
  return { ...(defaults[sectionId] || {}), ...(state.runtimeConfig.ui_settings.panel_section_settings?.[sectionId] || {}) };
}

function selectPanelSection(id) {
  if (!getPanelSections().some(section => section.id === id)) return;
  state.panelConfigSelectedId = id;
  renderPanelConfig();
}

function togglePanelSectionEnabled(id) {
  const section = getPanelSections().find(item => item.id === id);
  if (!section) return;
  const def = getPanelSectionDef(id);
  if (def.required) return showToast('基础资料区块不能关闭。', true);
  section.enabled = !section.enabled;
  renderPanelConfig();
}

function setPanelSectionField(id, field, value) {
  const section = getPanelSections().find(item => item.id === id);
  if (!section) return;
  const def = getPanelSectionDef(id);
  const next = String(value ?? '').trim();
  section[field] = next || def[field] || section[field];
  renderPanelConfig();
}

function setPanelSectionSetting(sectionId, field, value) {
  ensureRuntime();
  const defaults = getDefaultPanelSectionSettings();
  state.runtimeConfig.ui_settings.panel_section_settings ||= getDefaultPanelSectionSettings();
  state.runtimeConfig.ui_settings.panel_section_settings[sectionId] ||= {};
  const base = defaults[sectionId] || {};
  const baseValue = base[field];
  let next = value;
  if (typeof baseValue === 'number') next = Number(value || baseValue || 0);
  if (typeof baseValue === 'boolean') next = !!value;
  state.runtimeConfig.ui_settings.panel_section_settings[sectionId][field] = next === '' ? baseValue : next;
  renderPanelConfig();
}

function setPanelSectionFlag(sectionId, field, checked) {
  setPanelSectionSetting(sectionId, field, !!checked);
}

function titleConditionDict() {
  return Object.fromEntries((state.titleCatalog?.conditions || []).map(item => [item.key, item]));
}

function titleEffectDict() {
  return Object.fromEntries((state.titleCatalog?.effects || []).map(item => [item.key, item]));
}

function titleConditionName(key) {
  return titleConditionDict()[key]?.name || key || '未设定条件';
}

function titleEffectName(key) {
  return titleEffectDict()[key]?.name || key || '未设定效果';
}

function titleOperatorName(op) {
  return ({ '>=': '大于等于', '>': '大于', '==': '等于', '<=': '小于等于', '<': '小于' })[op] || op || '>=';
}

function titleItem(title, i) {
  const condText = (title.conditions || []).map(c => `${titleConditionName(c.type)} ${titleOperatorName(c.operator)} ${c.value}`).join('；') || '无条件';
  const effText = (title.effects || []).map(e => `${titleEffectName(e.type)} ${Number(e.value || 0) >= 0 ? '+' : ''}${e.value}`).join('；') || '无效果';
  const deleting = isTitleDeletePending(i);
  return `
    <article class="archive-card title-card${deleting ? ' delete-pending' : ''}">
      <div class="archive-body">
        <div class="archive-title">${esc(title.name || title.id || '未命名称号')}</div>
        <div class="archive-meta">
          <span class="badge light">${esc(title.category || '未分类')}</span>
          <span class="badge ${title.allow_loss ? 'title-badge-strong' : ''}">${title.allow_loss ? '条件失效可撤销' : '永久保留'}</span>
        </div>
        <div class="archive-tag-row"><div class="archive-scroll-chip">条件：${esc(condText)}</div></div>
        <div class="archive-tag-row"><div class="archive-scroll-chip">效果：${esc(effText)}</div></div>
        <div class="archive-desc">${esc(title.desc || '当前还没有描述。')}</div>
        <div class="archive-actions">
          <button class="btn-strong" onclick="openTitleEditor(${i})"><span class="btn-text">编辑</span></button>
          <button class="${deleting ? 'btn' : 'btn-green'}" onclick="${deleting ? `cancelTitleDelete(${i})` : `duplicateTitle(${i})`}"><span class="btn-text">${deleting ? '取消' : '复制'}</span></button>
          <button class="btn-danger" onclick="${deleting ? `confirmDeleteTitle(${i})` : `requestTitleDelete(${i})`}"><span class="btn-text">${deleting ? '确认' : '删除'}</span></button>
        </div>
      </div>
    </article>`;
}

function createEmptyTitleDraft() {
  const firstCond = state.titleCatalog?.conditions?.[0]?.key || 'sign_in_total';
  const firstEffect = state.titleCatalog?.effects?.[0]?.key || 'func_draw_prob';
  return {
    id: '',
    name: '',
    category: '未分类',
    desc: '',
    allow_loss: false,
    conditions: [{ type: firstCond, operator: '>=', value: 1 }],
    effects: [{ type: firstEffect, value: 5 }],
  };
}

function cloneTitleDraft(source) {
  const draft = JSON.parse(JSON.stringify(source || createEmptyTitleDraft()));
  draft.conditions = Array.isArray(draft.conditions) && draft.conditions.length ? draft.conditions : [{ type: state.titleCatalog?.conditions?.[0]?.key || 'sign_in_total', operator: '>=', value: 1 }];
  draft.effects = Array.isArray(draft.effects) && draft.effects.length ? draft.effects : [{ type: state.titleCatalog?.effects?.[0]?.key || 'func_draw_prob', value: 5 }];
  return draft;
}

function slugifyTitleId(text) {
  return String(text || '')
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '_')
    .replace(/^_+|_+$/g, '') || `title_${Date.now()}`;
}

  wrap.innerHTML = state.titleDraft.conditions.map((cond, idx) => `

function setTitleCatalogGroupFilter(kind, index, value) {

}

function openTitleCatalogPicker(kind, index) {
  const isCondition = kind === 'condition';
  const title = isCondition ? '选择获取条件' : '选择佩戴效果';
  const note = isCondition
    ? '默认会展示全部条件。你可以先看完整表，再按前面的类别筛选。'
    : '默认会展示全部效果。你可以先看完整表，再按前面的类别筛选。';

  openDialog(title, `
    <div>
      <div class="panel-note" style="margin-bottom:12px;">${note}</div>
      <div class="field" style="margin-bottom:12px;max-width:260px;">
        <label>类别筛选</label>
        <select class="input" onchange="setTitleCatalogGroupFilter('${kind}', ${index}, this.value)">
          ${groups.map(group => `<option value="${esc(group)}">${esc(group)}</option>`).join('')}
        </select>
      </div>
      <div id="titleCatalogPickerList"></div>
      <div class="row" style="margin-top:14px;"><button class="btn" type="button" onclick="returnToTitleEditor()"><span class="btn-text">返回编辑器</span></button></div>
    </div>`);

}



function chooseTitleCatalogItem(kind, index, key) {
  if (!state.titleDraft) return;
  if (kind === 'condition' && state.titleDraft.conditions[index]) {
    state.titleDraft.conditions[index].type = key;
  }
  if (kind === 'effect' && state.titleDraft.effects[index]) {
    state.titleDraft.effects[index].type = key;
  }
  returnToTitleEditor();
}

function returnToTitleEditor() {
  if (!state.titleDraft) return;
  openDialog(state.editingTitleIndex >= 0 ? '编辑称号' : '新增称号', titleEditorHtml(), 'editor');
  renderTitleEditorConditions();
  renderTitleEditorEffects();
}

function titleEditorHtml() {
  return `

      </div>
      <div class="field"><label>称号分类</label><input class="input" value="${esc(state.titleDraft?.category || '未分类')}" oninput="setTitleBasicField('category', this.value)"></div>

      <div class="panel-note">玩家佩戴该称号后，以下效果会在玩法结算中生效。效果项很多时，点按钮单独弹出选择界面。</div>
      <div id="titleEffectList"></div>
      <div class="row" style="margin-top:10px;"><button class="btn" type="button" onclick="addTitleEffect()"><span class="btn-text">新增效果</span></button></div>

    </div>`;
}

function addTitleCondition() {
  if (!state.titleDraft) return;
  state.titleDraft.conditions.push({ type: state.titleCatalog?.conditions?.[0]?.key || 'sign_in_total', operator: '>=', value: 1 });
  renderTitleEditorConditions();
}


function removeTitleCondition(index) {
  if (!state.titleDraft) return;
  state.titleDraft.conditions.splice(index, 1);
  if (!state.titleDraft.conditions.length) addTitleCondition();
  else renderTitleEditorConditions();
}

function setTitleConditionField(index, field, value) {
  if (!state.titleDraft?.conditions?.[index]) return;
  state.titleDraft.conditions[index][field] = field === 'value' ? Number(value || 0) : value;
}

function addTitleEffect() {
  if (!state.titleDraft) return;
  state.titleDraft.effects.push({ type: state.titleCatalog?.effects?.[0]?.key || 'func_draw_prob', value: 5 });
  renderTitleEditorEffects();
}

function removeTitleEffect(index) {
  if (!state.titleDraft) return;
  state.titleDraft.effects.splice(index, 1);
  if (!state.titleDraft.effects.length) addTitleEffect();
  else renderTitleEditorEffects();
}

function setTitleEffectField(index, field, value) {
  if (!state.titleDraft?.effects?.[index]) return;
  state.titleDraft.effects[index][field] = field === 'value' ? Number(value || 0) : value;
}

function openTitleEditor(index) {
  state.editingTitleIndex = index;
  state.titleDraft = cloneTitleDraft(index >= 0 ? state.titles[index] : createEmptyTitleDraft());
  if (!state.titleDraft.id) state.titleDraft.id = slugifyTitleId(state.titleDraft.name || 'title');
  openDialog(index >= 0 ? '编辑称号' : '新增称号', titleEditorHtml(), 'editor');
  renderTitleEditorConditions();
  renderTitleEditorEffects();
}


async function saveTitleEditor() {
  if (!state.titleDraft) return;
  const payload = cloneTitleDraft(state.titleDraft);
  payload.name = String(payload.name || '').trim();
  payload.id = slugifyTitleId(payload.id || payload.name || 'title');
  payload.category = String(payload.category || '未分类').trim() || '未分类';
  payload.desc = String(payload.desc || '').trim();
  payload.conditions = (payload.conditions || []).filter(item => item?.type).map(item => ({ type: item.type, operator: item.operator || '>=', value: Number(item.value || 0) }));
  payload.effects = (payload.effects || []).filter(item => item?.type).map(item => ({ type: item.type, value: Number(item.value || 0) }));

  if (!payload.name) return showToast('称号名称不能为空。', true);
  if (!payload.conditions.length) return showToast('至少需要一条获取条件。', true);
  if (!payload.effects.length) return showToast('至少需要一条佩戴效果。', true);

    const duplicated = state.titles.some((item, idx) => idx !== state.editingTitleIndex && item.name === payload.name);
  if (duplicated) return showToast('称号名称重复，请调整。', true);



  if (state.editingTitleIndex >= 0) state.titles[state.editingTitleIndex] = payload;
  else state.titles.push(payload);

  closeDialog();
  renderTitles();
  await saveTitles(false);
  showToast('称号已保存。');
}

async function saveTitles(show = true) {
  const res = await apiPost('/api/titles', { titles: state.titles });
  if (res.ok) { if (show) showToast('称号配置已保存。'); }
  else if (show) showToast(res.error || '保存失败。', true);
  return res;
}

async function confirmDeleteTitle(i) {
  if (!isTitleDeletePending(i)) return;
  state.pendingTitleDelete = -1;
  state.titles.splice(i, 1);
  renderTitles();
  await saveTitles(false);
  showToast('称号已删除。');
}

async function duplicateTitle(i) {
  const original = state.titles[i];
  if (!original) return;
  const copy = JSON.parse(JSON.stringify(original));
  copy.id = `${copy.id || 'new_title'}_copy`;
  state.titles.splice(i + 1, 0, copy);
  renderTitles();
  await saveTitles(false);
  showToast('称号已复制。');
}

function buildFuncRarityDistribution() {
  const total = state.funcCards.length || 0;
  return Object.entries(rarityLabelMap).map(([level, label]) => {
    const rarity = Number(level);
    const count = state.funcCards.filter(card => Number(card.rarity || 1) === rarity).length;
    const palette = rarityWeightPalette.find(item => item.key === `rarity_${rarity}`);
    return {
      rarity,
      label,
      count,
      percent: total ? (count / total) * 100 : 0,
      color: palette?.color || '#6f7d8e',
    };
  });
}

function triggerSystemMorph() {
  if (!state.homeAccessVerified) {
    beginHomeLoginFlow();
    return;
  }
  const showcase = document.querySelector('.home-showcase');
  if (!showcase) {
    setTopView('config');
    return;
  }
  if (uiTransitionState.isMorphingToConfig) return;
  uiTransitionState.isMorphingToConfig = true;
  clearHomeMorphTimer(false);

  // 1. 准备真实的底层界面（因为层级调整了，此时它们覆盖在原页面上方）
  state.topView = 'config';
  syncTopViewButtons('config');
  $('.glass-top').style.display = 'flex';
  $('.glass-side').style.display = 'flex';
  $('#configPages').style.display = 'block';
  $('#statsPages').style.display = 'none';
  $('.toolbar-actions').style.display = 'flex';
  $('.shard-header').style.display = 'flex';
  setPage(state.activePage);

  const appLayout = $('.app-layout');
  appLayout.classList.add('ui-shell-pre-enter');
  appLayout.classList.add('ui-shell-body-hold');
  appLayout.classList.add('ui-shell-side-hold');
  appLayout.classList.remove('ui-shell-enter');

  createHomeSidebarFlight(showcase);

  // 2. 旧页面触发变形让位
  showcase.classList.add('morph-active');

  // 3. 同时唤醒真实的界面元素！
  // 真正的黑条顶栏会优雅地从天而降！数据内容也会随着旧白板的透明透射出来！
  uiTransitionState.homeShellEnterTimer = setTimeout(() => {
    appLayout.classList.remove('ui-shell-pre-enter');
    appLayout.classList.add('ui-shell-enter');
    uiTransitionState.homeShellEnterTimer = null;
  }, 160);

  // 4. 等黑白骨架快推到位，再放白区头部和正文，避免被黑块压住
  uiTransitionState.homeBodyRevealTimer = setTimeout(() => {
    appLayout.classList.remove('ui-shell-body-hold');
    uiTransitionState.homeBodyRevealTimer = null;
  }, 235);

  // 5. 动画落定后，无痕移除旧节点，再交给真实侧栏接手
  uiTransitionState.homeMorphTimer = setTimeout(() => {
    $('#homePages').style.display = 'none';
    showcase.classList.remove('morph-active');
    removeHomeSidebarFlight();
    appLayout.classList.remove('ui-shell-side-hold');
    uiTransitionState.homeMorphTimer = null;
    uiTransitionState.isMorphingToConfig = false;
  }, 455);
}

function permissionChips(perms = {}) {
  const defs = [
    ['can_view', '查看'],
    ['can_create_func_card', '新增功能牌'],
    ['can_edit_func_card', '修改功能牌'],
    ['can_delete_func_card', '删除功能牌'],

    ['can_use_lazy_batch_cards', '懒狗批量'],
    ['can_use_lazy_batch_images', '批量图片'],
    ['can_edit_runtime', '运行配置'],
    ['can_edit_signin', '签到配置'],
    ['can_edit_titles', '称号配置'],
  ];
  const chips = defs.filter(([key]) => perms[key]).map(([, label]) => `<span class="badge">${label}</span>`);
  chips.push(`<span class="badge ${perms.requires_review === false ? 'light' : ''}">${perms.requires_review === false ? '免审核' : '需要审核'}</span>`);
  chips.push(`<span class="badge light">单次 ${Number(perms.max_cards_per_submit || 0)} 项</span>`);
  chips.push(`<span class="badge light">图片 ${Number(perms.max_images_per_submit || 0)} 张</span>`);
  return chips.join('');
}

function visitorTime(ts) {
  const n = Number(ts || 0);
  if (!n) return '未知时间';
  return new Date(n * 1000).toLocaleString();
}

function isCloudflaredInstallBusy(task = {}) {
  return ['queued', 'downloading', 'installing'].includes(task.status);
}

function jsArg(value) {

function renderCloudflaredProgress(task = {}) {
  if (!task.status) return '';
  const pct = Math.max(0, Math.min(100, Number(task.percent || 0)));
  const installLogs = (task.logs || []).slice(-12).join('\n');
  const removed = Array.isArray(task.removed_files) && task.removed_files.length
    ? `<div class="visitor-step-note">已清理：${esc(task.removed_files.join('，'))}</div>`
    : '';
  return `
    <div id="cloudflaredInstallProgress" class="visitor-progress-box">
      <div class="row between"><span id="cloudflaredInstallLabel" class="muted">${esc(formatCloudflaredTaskLabel(task))}</span><b id="cloudflaredInstallPct">${pct.toFixed(1)}%</b></div>
      <div class="visitor-progress-track"><div id="cloudflaredInstallBar" class="visitor-progress-bar" style="width:${pct}%;"></div></div>
      ${removed}
      <pre id="cloudflaredInstallLog" class="visitor-terminal">${esc(installLogs || '等待安装任务输出...')}</pre>
    </div>`;
}

function cloudflaredDownloadPreview(tunnel = {}) {
  const cfg = tunnel.config || {};
  const manual = tunnel.manual || {};
  const source = $('#cloudflaredDownloadSource')?.value || cfg.cloudflared_download_source || 'official';
  const template = $('#cloudflaredDownloadTemplate')?.value?.trim() || cfg.cloudflared_download_url_template || '';
  const officialUrl = manual.official_download_url || tunnel.official_download_url || '';
  const asset = manual.asset || tunnel.download_asset || '';
  if (source !== 'custom' || !template) return officialUrl || tunnel.download_url || manual.current_download_url || '';
  try {
    if (template.includes('{url}') || template.includes('{asset}')) {
      return template.split('{url}').join(officialUrl).split('{asset}').join(asset);
    }
    if (template.endsWith('/')) return template + asset;
    return template;
  } catch (_) {
    return officialUrl;
  }
}

async function installCloudflared(force = false, clean = false) {
  const currentTask = state.visitorInstallTask || {};
  if (isCloudflaredInstallBusy(currentTask)) {
    showToast('cloudflared 正在安装中，已为你刷新下载状态。');
    if (currentTask.task_id) await pollCloudflaredInstall(currentTask.task_id);
    else await refreshCloudflaredInstall();
    return;
  }
  const body = readVisitorTunnelForm();
  if (body.cloudflared_download_source === 'custom' && !body.cloudflared_download_url_template) {
    return showToast('自定义下载源需要填写 URL 模板。', true);
  }
  const actionText = clean ? '清除旧安装和下载残留后重新安装 cloudflared' : (force ? '重新下载并替换插件托管目录里的 cloudflared' : '下载 cloudflared 到插件数据目录');
  if (!confirm(`将${actionText}，不会安装系统服务或修改 PATH。继续吗？`)) return;
  const start = await apiPost('/api/visitor/cloudflared/install/start', {
    force,
    clean,
    ...body
  });
  if (!start.ok) return showToast(start.error || '无法启动安装任务。', true);
  state.visitorInstallTask = { task_id: start.task_id, status: start.already_installed ? 'done' : 'queued', percent: start.already_installed ? 100 : 0, logs: [] };
  await loadVisitor();
  state.visitorInstallTask = { ...(state.visitorInstallTask || {}), task_id: start.task_id, status: start.already_installed ? 'done' : 'queued', percent: start.already_installed ? 100 : 0 };
  renderVisitor();
  showToast(start.already_running ? '已有下载任务在运行，正在接管进度。' : '正在下载 cloudflared，进度会显示在页面中。');
  await pollCloudflaredInstall(start.task_id);
}

function formatCloudflaredTaskLabel(task = {}) {
  const total = Number(task.total || 0);
  const downloaded = Number(task.downloaded || 0);
  const mb = n => (n / 1024 / 1024).toFixed(1);
  if (!task.status) return '尚未开始安装';
  if (task.status === 'done') return `安装完成 ${task.version || task.path || ''}`;
  if (task.status === 'error') return `安装失败：${task.error || ''}${task.error_hint ? '；' + task.error_hint : ''}`;
  if (task.status === 'cancelled') return `已取消：${task.error_hint || task.error || ''}`;
  const sizeText = total ? `${mb(downloaded)}MB / ${mb(total)}MB` : (downloaded ? `已下载 ${mb(downloaded)}MB` : '等待数据');
  return `${task.status} ${sizeText}${task.source ? ' · ' + task.source : ''}`;
}

function updateCloudflaredProgress(task) {
  state.visitorInstallTask = task || {};
  const box = $('#cloudflaredInstallProgress');
  if (!box) return;
  box.style.display = 'block';
  const pct = Math.max(0, Math.min(100, Number(task.percent || 0)));
  $('#cloudflaredInstallLabel').textContent = formatCloudflaredTaskLabel(task);
  $('#cloudflaredInstallPct').textContent = `${pct.toFixed(1)}%`;
  $('#cloudflaredInstallBar').style.width = `${pct}%`;
  const log = $('#cloudflaredInstallLog');
  if (log) {
    log.textContent = (task.logs || []).slice(-80).join('\n') || '等待安装任务输出...';
    log.scrollTop = log.scrollHeight;
  }
}

async function pollCloudflaredInstall(taskId) {
  if (state.visitorInstallPolling) return;
  state.visitorInstallPolling = true;
  for (;;) {
    const res = await apiGet(`/api/visitor/cloudflared/install/progress?task_id=${encodeURIComponent(taskId)}`);
    if (!res.ok) {
      state.visitorInstallPolling = false;
      return showToast(res.error || '读取安装进度失败。', true);
    }
    const task = res.task || {};
    updateCloudflaredProgress(task);
    if (task.status === 'done') {
      state.visitorInstallPolling = false;
      await loadVisitor();
      renderVisitor();
      showToast('cloudflared 已安装并验证可用，可以生成临时地址。');
      return;
    }
    if (task.status === 'error') {
      state.visitorInstallPolling = false;
      showToast(task.error_hint || task.error || '自动安装失败，请按提示手动安装。', true);
      return;
    }
    if (task.status === 'cancelled') {
      state.visitorInstallPolling = false;
      showToast('cloudflared 安装已取消。', true);
      return;
    }
    await new Promise(resolve => setTimeout(resolve, 500));
  }
}

async function refreshCloudflaredInstall() {
  const taskId = (state.visitorInstallTask || {}).task_id || '';
  const url = taskId ? `/api/visitor/cloudflared/install/progress?task_id=${encodeURIComponent(taskId)}` : '/api/visitor/cloudflared/install/progress';
  const res = await apiGet(url);
  if (!res.ok) return showToast(res.error || '暂无下载任务状态。', true);
  const task = res.task || {};
  updateCloudflaredProgress(task);
  if (isCloudflaredInstallBusy(task) && task.task_id) {
    showToast('下载任务仍在运行，继续刷新进度。');
    await pollCloudflaredInstall(task.task_id);
  } else {
    showToast(task.status === 'error' || task.status === 'cancelled' ? (task.error_hint || '下载任务未完成。') : '下载状态已刷新。', task.status === 'error' || task.status === 'cancelled');
  }
}

async function cancelCloudflaredInstall() {

  state.visitorInstallPolling = false;
  updateCloudflaredProgress(res.task || {});

  showToast('cloudflared 安装已取消。', true);
}

function checkRangeOverlap() {
  const ranges = state.signInTexts.luck_ranges || [];
  let hasOverlap = false;
  const els = $$('.signin-range');
  els.forEach(el => el.classList.remove('danger-pulse'));
  for (let i = 0; i < ranges.length; i++) {
    for (let j = i + 1; j < ranges.length; j++) {
      const r1 = ranges[i]; const r2 = ranges[j];
      if (Math.max(r1.min, r2.min) <= Math.min(r1.max, r2.max)) {
        hasOverlap = true;
        if (els[i]) els[i].classList.add('danger-pulse');
        if (els[j]) els[j].classList.add('danger-pulse');
      }
    }
  }
  return hasOverlap;
}
function setRange(i, key, value) { 
  state.signInTexts.luck_ranges[i][key] = value;
  if (key === 'min' || key === 'max') checkRangeOverlap();
}
function setRangeComments(i, value) { state.signInTexts.luck_ranges[i].comments = value.split(/\r?\n/).map(v => v.trim()).filter(Boolean); }
function collectSigninRangesFromDom() {
  const ranges = (state.signInTexts.luck_ranges || []).map(r => ({ ...r, comments: Array.isArray(r.comments) ? [...r.comments] : [] }));
  $$('[data-range-index][data-range-field]').forEach(el => {
    const index = Number(el.dataset.rangeIndex);
    const field = el.dataset.rangeField;
    if (!Number.isInteger(index) || !ranges[index]) return;
    if (field === 'comments') {
      ranges[index].comments = String(el.value || '').split(/\r?\n/).map(v => v.trim()).filter(Boolean);
    } else if (['min', 'max', 'gold_delta'].includes(field)) {
      ranges[index][field] = Number(el.value || 0);
    } else {
      ranges[index][field] = el.value;
    }
  });
  state.signInTexts.luck_ranges = ranges;
}
async function previewSignin() {
  collectSigninRangesFromDom();
  if (checkRangeOverlap()) return showToast('运势区间存在重叠，请修正变红的区间！', true);
  const ranges = state.signInTexts.luck_ranges || [];
  if (!ranges.length) return showToast('请先配置运势区间。', true);
  const range = ranges[Math.floor(Math.random() * ranges.length)];
  const comment = (range.comments || [])[Math.floor(Math.random() * (range.comments?.length || 1))] || '今日无额外批注。';
  const good = (state.signInTexts.good_things || [])[Math.floor(Math.random() * Math.max(1, state.signInTexts.good_things.length))] || '暂无宜项';
  const bad = (state.signInTexts.bad_things || [])[Math.floor(Math.random() * Math.max(1, state.signInTexts.bad_things.length))] || '暂无忌项';
  const score = Math.floor(Math.random() * Math.max(1, (range.max ?? 100) - (range.min ?? 1) + 1)) + (range.min ?? 1);
  
  let extraLines = [];
  if (state.signInTexts.enable_draw_prob) {
    extraLines.push(`今日爆率｜+${Math.floor(Math.random() * 5)}%`);
  }
  if (state.signInTexts.enable_quote) {
    let quote = '';
    if (state.signInTexts.use_custom_quote) {
      const quotes = state.signInTexts.custom_quotes || [];
      quote = quotes.length ? quotes[Math.floor(Math.random() * quotes.length)] : '（暂无自定义名言）';
    } else {
      try {
        $('#signinPreview').textContent = '正在连线 Hitokoto 获取一言...';
        const res = await fetch('https://v1.hitokoto.cn?c=a&c=b&c=c&c=d&c=i');
        const data = await res.json();
        quote = data.hitokoto + (data.from ? ` —— ${data.from}` : '');
      } catch (e) {
        quote = '（获取网络一言失败）';
      }
    }
    extraLines.push(`\n${quote}`);
  }

  $('#signinPreview').textContent = [
    `今日运势｜${range.label || '未知'}`,
    `数值｜${score}`,
    `金币修正｜${range.gold_delta || 0}`,
    `点评｜${comment}`,
    `宜｜${good}`,
    `忌｜${bad}`,
    ...extraLines
  ].join('\n');
}

function deriveFuncTypeFromTags(type, tags = []) {
  const normalized = (tags || []).map(tag => String(tag || '').trim());
  if (normalized.some(tag => tag.startsWith('aoe_damage:'))) return 'attack';
  if (normalized.some(tag => tag.startsWith('aoe_heal:') || tag.startsWith('aoe_cleanse:'))) return 'heal';
  if (normalized.some(tag => tag.startsWith('lucky_roulette:'))) return 'heal';
  return String(type || 'attack').trim() || 'attack';
}

function validateLuckyRouletteEffect(effect) {
  const rawMin = parseStrictInt(effect?.params?.[0]);
  const rawMax = parseStrictInt(effect?.params?.[1]);
  if (rawMin === null || rawMax === null) return '幸运转盘的最小值和最大值都必须是整数。';
  if (rawMin < 1) return '幸运转盘的最小值至少要从 1 开始。';
  if (rawMax < rawMin) return '幸运转盘的最大值不能小于最小值。';

  const occupiedNumbers = new Map();
  let configuredRuleCount = 0;
  for (const [index, rule] of (effect.luckyRules || []).entries()) {
    const rawNumbers = String(rule?.numbers || '').trim();
    const rawValue = String(rule?.value ?? '').trim();
    const effectType = String(rule?.effect || '').trim();
    const hasAnyInput = rawNumbers || rawValue || effectType;
    if (!hasAnyInput) continue;
    if (!rawNumbers) return `幸运转盘第 ${index + 1} 条号码规则还没有填写命中号码。`;
    const parsed = parseLuckyRouletteNumbers(rawNumbers);
    if (!parsed.length) return `幸运转盘号码规则「${rawNumbers}」无效，请用逗号分隔整数。`;
    const outOfRange = parsed.find(num => num < rawMin || num > rawMax);
    if (outOfRange !== undefined) return `幸运转盘号码 ${outOfRange} 不在 ${rawMin}-${rawMax} 范围内。`;
    const valueInt = parseStrictInt(rawValue === '' ? null : rawValue);
    if (valueInt === null || valueInt < 0) return `幸运转盘第 ${index + 1} 条号码规则的数值必须是大于等于 0 的整数。`;
    for (const num of parsed) {
      if (occupiedNumbers.has(num)) return `幸运转盘号码 ${num} 被重复配置了，请保证每个号码只对应一条规则。`;
      occupiedNumbers.set(num, index);
    }
    configuredRuleCount += 1;
  }
  if (configuredRuleCount <= 0) return '幸运转盘至少需要配置 1 条号码规则。';
  return '';
}

async function executeLazyBatch(kind) {
  const btn = event.currentTarget;
  btn.disabled = true;
  btn.innerHTML = '生成中，请耐心等待...';
  
  const rawCount = Number($('#lazyCount')?.value || 1);
  const count = Number.isFinite(rawCount) ? Math.max(1, Math.min(100, Math.floor(rawCount))) : 1;
  const image_mode = $('#lazyImageMode')?.value || 'none';
  const gen_text = $('#lazyGenText')?.checked;

  if ($('#lazyCount')) $('#lazyCount').value = String(count);

  let payload = { count, image_mode, gen_text };
  let endpoint = '';

  if (kind === 'fate') {
    endpoint = '/api/lazy/batch_fate';
    payload.gold_min = Number($('#lazyGoldMin')?.value || -20);
    payload.gold_max = Number($('#lazyGoldMax')?.value || 100);
  } else {
    endpoint = '/api/lazy/batch_func';
    payload.max_rarity = Number($('#lazyMaxRarity')?.value || 5);
    payload.max_tags = Number($('#lazyMaxTags')?.value || 2);
    const types = Array.from(document.querySelectorAll('.lazy-type-check:checked')).map(el => el.value);
    payload.allowed_types = types.length ? types : ['attack', 'heal', 'defense'];
  }

  try {
    startLazyProgress(kind, count, image_mode);
    const res = await apiPost(endpoint, payload);
    if (!res.ok) throw new Error(res.error || '生成失败');
    
    // 放入草稿数组，不再直接塞入主池
    if (kind === 'fate') {
      state.draftFateCards = (state.draftFateCards || []).concat(res.cards);
      renderFate();
    } else {
      state.draftFuncCards = (state.draftFuncCards || []).concat(res.cards);
      renderCards();
    }
    closeDialog();
    finishLazyProgress(true);
    showToast(`成功生成 ${res.cards.length} 张草稿，请在页面顶端审核应用！`);
  } catch(e) {
    finishLazyProgress(false);
    showToast(e.message, true);
    btn.disabled = false;
    btn.innerHTML = '重试';
  }
}

async function bootstrapWebUi() {
  if (bootstrapWebUi.started) return;
  bootstrapWebUi.started = true;
  restoreUiPrefs();
  state.homeStage = 'intro';
  state.homeAccessVerified = false;
  state.homePasswordVisible = false;
  ensureLazyProgressHud();
  bindEvents();
  try {
    await syncHomeAccessStatus();
    setTopView(state.homeAccessVerified ? (state.topView || 'config') : 'home');
  } finally {
    document.body.classList.add('ui-ready');
  }
}

window.__startWebUi = bootstrapWebUi;

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootstrapWebUi, { once: true });
} else {
  bootstrapWebUi();
}
