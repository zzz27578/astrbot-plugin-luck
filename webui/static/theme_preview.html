<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Theme Preview - 精修预览版</title>
<style>
:root {--bg: #030508;
--neon: #00e5ff;
--neon-dim: rgba(0, 229, 255, 0.7);
--card-bg: rgba(10, 15, 25,0.15);
--text: #e0e6ed;
}
body,html {
margin: 0; padding: 0; height: 100%;
background: var(--bg); color: var(--text);
font-family: 'Segoe UI', system-ui, sans-serif;
overflow: hidden;
}
.geo-wrapper {
position: fixed; top: 50%; left: 50%; width: 0; height: 0;
perspective: 1800px;
perspective-origin: 50% 50%;
transform-style: preserve-3d;
z-index: 0; pointer-events: none;}
.core {
position: absolute;
transform-style: preserve-3d;
transition: transform 1.8s cubic-bezier(0.16, 1, 0.3, 1);
animation: slowSpin 35s linear infinite;
}
.core.is-entering-metrics {
animation-play-state: paused;
}
.core.is-entering-metrics .face {
transition: opacity 0.22s ease, filter 0.22s ease, background 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
opacity: 0.14 !important;
filter: brightness(0.25) saturate(0.55) drop-shadow(0 0 6px rgba(0, 0, 0, 0.18));
}
.core.is-entering-metrics .face::before,
.core.is-entering-metrics .face::after {
opacity: 0.08 !important;
filter: brightness(0.2) saturate(0.5);
}
.core.is-entering-metrics .view-orbit-cube,
.core.is-entering-metrics .lock-layer,
.core.is-entering-metrics .gyro-layer {
opacity: 0 !important;
}
.face {
position: absolute;
width: 340px; height:340px;
margin-left: -170px; margin-top: -170px;
box-sizing: border-box;
overflow: visible;
transform-origin: center center;
transform-style: preserve-3d;
backface-visibility: visible;
-webkit-backface-visibility: visible;
will-change: transform;
border: 7px solid rgba(0, 229, 255, 0.58);
background: linear-gradient(145deg, rgba(0, 229, 255, 0.085), rgba(0, 229,255, 0.03) 58%, rgba(255, 255, 255, 0.018));
box-shadow:
  inset 0 0 24px rgba(0, 229, 255, 0.075),
  inset 0 052px rgba(255, 255, 255, 0.016),
  0 0 12px rgba(0, 229, 255, 0.09);
outline: 1px solid rgba(255, 255, 255, 0.03);
filter: drop-shadow(0 0 7px rgba(0, 229, 255, 0.07));
  transition:
  transform 1.2s cubic-bezier(0.16, 1, 0.3, 1),
  border-color 0.8s ease,
  border-width 0.8s ease,
  background 0.8s ease,
  box-shadow 0.8s ease,
  border-radius 0.8s ease,
  clip-path 0.8s ease,
  opacity 0.8s ease,
  filter 0.8s ease;
}
.face.aux {
opacity: 0 !important;
pointer-events: none;
}

--metrics-sweep-outer-b: rgba(255, 255, 255, 0.38);

--metrics-sweep-mid-b: rgba(255, 255, 255, 0.30);

--metrics-sweep-outer-a: rgba(176, 228, 255, 0.22);

--metrics-sweep-mid-b: rgba(240, 250, 255, 0.38);
--metrics-sweep-inner-a: rgba(130, 194, 255, 0.16);
--metrics-sweep-inner-b: rgba(228, 246, 255, 0.30);

#geometry[data-metrics-theme="cyan"] {
--metrics-border: rgba(64, 255, 208, 0.96);
--metrics-outline: rgba(255, 255, 255, 0.06);
--metrics-inner-glow: rgba(102, 255, 228, 0.22);
--metrics-outer-glow: rgba(32, 226, 182, 0.34);
--metrics-drop: rgba(20, 174, 138, 0.30);

--metrics-metal-b: rgba(82, 255, 220, 0.16);
--metrics-metal-c: rgba(8, 52, 46, 0.44);
--metrics-metal-d: rgba(255, 255, 255, 0.10);
--metrics-sweep-outer-a: rgba(176, 255, 236, 0.22);
--metrics-sweep-outer-b: rgba(255, 255, 255, 0.46);
--metrics-sweep-mid-a: rgba(150, 255, 226, 0.19);
--metrics-sweep-mid-b: rgba(238, 255, 250, 0.38);
--metrics-sweep-inner-a: rgba(126, 246, 214, 0.16);
--metrics-sweep-inner-b: rgba(226, 255, 244, 0.30);
}
.lock-layer,
.gyro-layer {
position: absolute;
left: 0;
top: 0;
width: 0;
height: 0;
transform-style: preserve-3d;
pointer-events: none;
opacity: 0;
transition: opacity 0.45s ease, filter 0.45s ease;
}
.lock-layer {
filter:
  drop-shadow(0 0 18px rgba(214, 170, 96, 0.14))
  drop-shadow(0 0 34px rgba(214, 170, 96, 0.08));
}
.lock-bar {
position: absolute;
left: 0;
top: 0;
transform-style: preserve-3d;
transform-origin: center center;
--w: 420px;
--h: 92px;
--d: 92px;
--hw: 210px;
--hh: 46px;
--hd: 46px;
--nhw: -210px;
--nhh: -46px;
--nhd: -46px;
}
.lock-bar .lock-surface {
position: absolute;
left: 0;
top: 0;
box-sizing: border-box;
transform-style: preserve-3d;
backface-visibility: visible;
-webkit-backface-visibility: visible;
}
.lock-bar .front,
.lock-bar .back {
width: var(--w);
height: var(--h);
margin-left: var(--nhw);
margin-top: var(--nhh);
border: 5px solid rgba(236, 194, 112, 0.90);
border-radius: 10px;
background:
  linear-gradient(180deg, rgba(255, 245, 214, 0.055), rgba(255, 255, 255, 0.008) 18%, rgba(0, 0, 0, 0.01) 100%),
  linear-gradient(90deg, rgba(238, 198, 122, 0.028), rgba(108, 72, 22, 0.018));
box-shadow:
  inset 0 0 10px rgba(255, 236, 188, 0.035),
  inset 0 0 22px rgba(236, 194, 112, 0.028),
  0 0 10px rgba(236, 194, 112, 0.10);
}
.lock-bar .front {
transform: translateZ(var(--hd));
opacity: 0.96;
}
.lock-bar .back {
transform: rotateY(180deg) translateZ(var(--hd));
opacity: 0.38;
}
.lock-bar .right,
.lock-bar .left {
width: var(--d);
height: var(--h);
margin-left: var(--nhd);
margin-top: var(--nhh);
border: 4px solid rgba(220, 176, 98, 0.62);
border-radius: 8px;
background: linear-gradient(180deg, rgba(255, 232, 184, 0.018), rgba(84, 56, 16, 0.010));
box-shadow:
  inset 0 0 8px rgba(236, 194, 112, 0.020),
  0 0 8px rgba(236, 194, 112, 0.06);
opacity: 0.72;
}
.lock-bar .right {
transform: rotateY(90deg) translateZ(var(--hw));
}
.lock-bar .left {
transform: rotateY(-90deg) translateZ(var(--hw));
}
.lock-bar .top,
.lock-bar .bottom {
width: var(--w);
height: var(--d);
margin-left: var(--nhw);
margin-top: var(--nhd);
border: 4px solid rgba(228, 184, 106, 0.68);
border-radius: 8px;
background: linear-gradient(180deg, rgba(255, 238, 196, 0.020), rgba(96, 64, 20, 0.010));
box-shadow:
  inset 0 0 8px rgba(236, 194, 112, 0.022),
  0 0 8px rgba(236, 194, 112, 0.06);
opacity: 0.78;
}
.lock-bar .top {
transform: rotateX(90deg) translateZ(var(--hh));
}
.lock-bar .bottom {
transform: rotateX(-90deg) translateZ(var(--hh));
}
.lock-bar.bar-x {
transform: translate3d(0, 0, 92px) rotateY(16deg) rotateX(-10deg);
}
.lock-bar.bar-y {
transform: translate3d(92px, 0, 0) rotateZ(90deg) rotateY(-16deg) rotateX(8deg);
}
.lock-bar.bar-z {
transform: translate3d(0, -92px, 0) rotateY(90deg) rotateZ(14deg) rotateX(10deg);
}
.gyro-layer {
filter: drop-shadow(0 0 18px rgba(206, 170, 255, 0.2));
animation: gyroBody 34s linear infinite;
}
.gyro-ring {
position: absolute;
left: 0;
top: 0;
width: 0;
height: 0;
transform-style: preserve-3d;
}
.gyro-ring::before,
.gyro-ring::after {
content: '';
position: absolute;
left: calc(var(--size) * -0.5);
top: calc(var(--size) * -0.5);
width: var(--size);
height: var(--size);
border-radius: 50%;
box-sizing: border-box;
}
.gyro-ring::before {
border: var(--line) solid rgba(206, 170, 255, 0.42);
box-shadow: inset 0 0 18px rgba(206, 170, 255, 0.08), 0 0 18px rgba(206, 170, 255, 0.1);
opacity: 0.96;
}
.gyro-ring::after {
background: conic-gradient(
  from 0deg,
  rgba(255, 255, 255, 0) 0deg,
  rgba(255, 255, 255, 0.03) 150deg,
  rgba(255, 255, 255, 0.98) 270deg,
  rgba(255, 255, 255, 0.16) 334deg,
  rgba(255, 255, 255, 0) 360deg
);
-webkit-mask: radial-gradient(circle, transparent calc(50% - var(--line)), #000 calc(50% - var(--line) + 1px) calc(50% - 1px), transparent 50%);
mask: radial-gradient(circle, transparent calc(50% - var(--line)), #000 calc(50% - var(--line) + 1px) calc(50% - 1px), transparent 50%);
filter: blur(0.7px);
opacity: 0.98;
}
.gyro-ring.ring-a {
--size: 640px;
--line: 16px;
}
.gyro-ring.ring-b {
--size: 520px;
--line: 14px;
}
.gyro-ring.ring-c {
--size: 392px;
--line: 12px;
}

.view-cube {
position: absolute;
left: 0;
top: 0;
width: 0;
height: 0;
transform-style: preserve-3d;
opacity: 1;
transition: transform 0.72s cubic-bezier(0.2, 0.9, 0.24, 1), opacity 0.32s ease;
}
.view-cube-face {
position: absolute;
left: 0;
top: 0;
width: 340px;
height: 340px;
margin-left: -170px;
margin-top: -170px;
box-sizing: border-box;
overflow: visible;
transform-origin: center center;
transform-style: preserve-3d;
backface-visibility: visible;
-webkit-backface-visibility: visible;
will-change: transform;
border: 7px solid rgba(84, 138, 255, 0.58);
border-radius: 10px;
background: linear-gradient(145deg, rgba(84, 138, 255, 0.085), rgba(84, 138, 255, 0.03) 58%, rgba(255, 255, 255, 0.018));
box-shadow:
  inset 0 0 24px rgba(84, 138, 255, 0.075),
  inset 0 0 52px rgba(255, 255, 255, 0.016),
  0 0 12px rgba(84, 138, 255, 0.09);
outline: 1px solid rgba(255, 255, 255, 0.03);
filter: drop-shadow(0 0 7px rgba(84, 138, 255, 0.07));
transition:
  transform 0.72s cubic-bezier(0.2, 0.9, 0.24, 1),
  border-color 0.45s ease,
  border-width 0.45s ease,
  background 0.45s ease,
  box-shadow 0.45s ease,
  border-radius 0.45s ease,
  clip-path 0.3s ease,
  opacity 0.22s ease,
  filter 0.45s ease;
}
.view-cube-face::before,
.view-cube-face::after {
content: '';
position: absolute;
inset: 0;
pointer-events: none;
box-sizing: border-box;
border-radius: inherit;
transition:
  transform 0.72s cubic-bezier(0.2, 0.9, 0.24, 1),
  background 0.45s ease,
  opacity 0.45s ease,
  border-radius 0.45s ease,
  clip-path 0.3s ease,
  box-shadow 0.45s ease;
}
.view-cube-face::before {
transform: translateZ(8px);
background: linear-gradient(145deg, rgba(255, 255, 255, 0.038), transparent 44%, rgba(84, 138, 255, 0.014));
opacity: 0.72;
}
.view-cube-face::after {
transform: translateZ(-8px);
background: linear-gradient(160deg, rgba(6, 16, 42, 0.09), rgba(0, 0, 0, 0.018));
box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
opacity: 0.42;
}
.view-cube-face.front { transform: translateZ(170px); }
.view-cube-face.back { transform: rotateY(180deg) translateZ(170px); opacity: 0.42; }
.view-cube-face.right { transform: rotateY(90deg) translateZ(170px); }
.view-cube-face.left { transform: rotateY(-90deg) translateZ(170px); opacity: 0.84; }
.view-cube-face.top { transform: rotateX(90deg) translateZ(170px); }
.view-cube-face.bottom { transform: rotateX(-90deg) translateZ(170px); opacity: 0.84; }
.view-cube.center { transform: translate3d(0, 0, 0) scale(0.01); opacity: 0; }
.view-cube.pos-z { transform: translate3d(0, 0, 128px) scale(0.25); }
.view-cube.neg-z { transform: translate3d(0, 0, -128px) scale(0.25); }
.view-cube.pos-x { transform: translate3d(128px, 0, 0) scale(0.25); }
.view-cube.neg-x { transform: translate3d(-128px, 0, 0) scale(0.25); }
.view-cube.pos-y { transform: translate3d(0, -128px, 0) scale(0.25); }
.view-cube.neg-y { transform: translate3d(0, 128px, 0) scale(0.25); }
.face::before,
.face::after {
content: '';
position: absolute;
inset: 0;
pointer-events: none;
box-sizing: border-box;
border-radius: inherit;
clip-path: inherit;
transition:
  transform 1.2s cubic-bezier(0.16, 1, 0.3,1),
 background 0.6s ease,
  opacity 0.6s ease,
  border-radius 0.6s ease,
  clip-path 0.6s ease,
  box-shadow 0.6s ease,
  filter 0.6s ease;
}
.face::before {
transform: translateZ(8px);
background: linear-gradient(145deg, rgba(255, 255, 255, 0.038), transparent 44%, rgba(0, 229, 255, 0.014));
opacity: 0.72;
}
.face::after {
transform: translateZ(-8px);
background: linear-gradient(160deg, rgba(0, 24, 30, 0.09), rgba(0, 0, 0, 0.018));
box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
opacity: 0.42;
}

/* 形态一：规整立方 (隐忍) */
.core.state-idle .face:nth-child(1) { transform: translateZ(170px); }
.core.state-idle .face:nth-child(2) { transform: rotateY(180deg) translateZ(170px); }
.core.state-idle .face:nth-child(3) { transform: rotateY(90deg) translateZ(170px); }
.core.state-idle .face:nth-child(4) { transform: rotateY(-90deg) translateZ(170px); }
.core.state-idle .face:nth-child(5) { transform: rotateX(90deg) translateZ(170px); }
.core.state-idle .face:nth-child(6) { transform: rotateX(-90deg) translateZ(170px); }
.core.state-idle .face:nth-child(7) { transform: rotateY(90deg) translateZ(170px); }
.core.state-idle .face:nth-child(8) { transform: rotateX(90deg) translateZ(170px); }
/* 形态二：锐利棱锥 (攻击) */
.core.state-pyramid .face {
border-width: 5px;
border-color: rgba(255, 92, 112, 0.72);
border-radius: 10px;
clip-path: polygon(12% 0%, 88% 0%, 100% 12%, 100% 88%, 88% 100%, 12% 100%, 0% 88%, 0% 12%);
background: linear-gradient(145deg, rgba(255, 92, 112, 0.11), rgba(255, 92, 112, 0.032) 58%, rgba(255, 255, 255, 0.016));
box-shadow: inset 0 0 22px rgba(255, 92, 112, 0.08), 0 0 16px rgba(255, 92, 112, 0.12);
filter: drop-shadow(0 0 10px rgba(255, 92, 112, 0.09));
}
.core.state-pyramid .face::before {
background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), transparent 42%, rgba(255, 92, 112, 0.018));
}
.core.state-pyramid .face::after {
background: linear-gradient(160deg, rgba(38, 4, 10, 0.11), rgba(18, 4, 6, 0.024));
}
.core.state-pyramid .face:nth-child(1) { transform: translateZ(154px) rotateZ(42deg); }
.core.state-pyramid .face:nth-child(2) { transform: rotateY(180deg) translateZ(154px) rotateZ(-42deg); }
.core.state-pyramid .face:nth-child(3) { transform: rotateY(90deg) translateZ(154px) rotateZ(42deg); }
.core.state-pyramid .face:nth-child(4) { transform: rotateY(-90deg) translateZ(154px) rotateZ(-42deg); }
.core.state-pyramid .face:nth-child(5) { transform: rotateX(90deg) translateZ(154px) rotateZ(42deg); }
.core.state-pyramid .face:nth-child(6) { transform: rotateX(-90deg) translateZ(154px) rotateZ(-42deg); }
.core.state-pyramid .face:nth-child(7) { transform: rotateY(90deg) translateZ(170px); }
.core.state-pyramid .face:nth-child(8) { transform: rotateX(90deg) translateZ(170px); }
/* 形态三：金色散架构建态 (创造) */
.core.state-create {
animation: slowSpin 35s linear infinite;
transform-style: preserve-3d;
}
.core.state-create .lock-layer,
.core.state-create .gyro-layer {
opacity: 0;
}
.core.state-create .face {
width: 340px;
height: 340px;
margin-left: -170px;
margin-top: -170px;
border-width: 6px;
border-color: rgba(236, 194, 112, 0.76);
border-radius: 10px;
clip-path: none;
background: linear-gradient(145deg, rgba(236, 194, 112, 0.09), rgba(236, 194, 112, 0.03) 58%, rgba(255, 255, 255, 0.016));
box-shadow: inset 0 0 22px rgba(236, 194, 112, 0.08), 0 0 14px rgba(236, 194, 112, 0.11);
filter: drop-shadow(0 0 8px rgba(236, 194, 112, 0.08));
opacity: 0.94;
}
.core.state-create .face::before {
background: linear-gradient(145deg, rgba(255, 250, 232, 0.046), transparent 42%, rgba(236, 194, 112, 0.018));
opacity: 0.74;
}
.core.state-create .face::after {
background: linear-gradient(160deg, rgba(58, 34, 6, 0.09), rgba(0, 0, 0, 0.02));
opacity: 0.38;
}
.core.state-create .face:nth-child(1) { transform: translateZ(308px) scale(0.92); opacity: 0.98; }
.core.state-create .face:nth-child(2) { transform: rotateY(180deg) translateZ(308px) scale(0.92); opacity: 0.54; }
.core.state-create .face:nth-child(3) { transform: rotateY(90deg) translateZ(308px) scale(0.92); opacity: 0.90; }
.core.state-create .face:nth-child(4) { transform: rotateY(-90deg) translateZ(308px) scale(0.92); opacity: 0.82; }
.core.state-create .face:nth-child(5) { transform: rotateX(90deg) translateZ(308px) scale(0.92); opacity: 0.92; }
.core.state-create .face:nth-child(6) { transform: rotateX(-90deg) translateZ(308px) scale(0.92); opacity: 0.82; }
.core.state-create .face:nth-child(7) { transform: rotateY(90deg) translateZ(308px) scale(0.92); opacity: 0; }
.core.state-create .face:nth-child(8) { transform: rotateX(90deg) translateZ(308px) scale(0.92); opacity: 0; }
/* 形态四：深蓝复制立方阵列态 (查看) */
.core.state-view {
transform-style: preserve-3d;
}


.core.state-view .lock-layer,
.core.state-view .gyro-layer {
opacity: 0;
}

height: 340px;
margin-left: -170px;
margin-top: -170px;

filter: drop-shadow(0 0 12px rgba(10, 40, 104, 0.2));
opacity: 0.98;
}











.core.state-view .face::before {
background: none;
opacity: 0;
}







.core.state-view .face::after {
background: linear-gradient(180deg, rgba(4, 10, 24, 0.00), rgba(4, 10, 24, 0.18));
opacity: 0.20;


}





.core.state-view .face:nth-child(1) { transform: translateZ(85px) scale(0.5); opacity: 0.98; border-color: rgba(78, 148, 255, 0.92); }
.core.state-view .face:nth-child(2) { transform: rotateY(180deg) translateZ(85px) scale(0.5); opacity: 0.26; border-color: rgba(32, 72, 138, 0.38); }

.core.state-view .face:nth-child(4) { transform: rotateY(-90deg) translateZ(85px) scale(0.5); opacity: 0.78; border-color: rgba(50, 106, 204, 0.58); }
.core.state-view .face:nth-child(5) { transform: rotateX(90deg) translateZ(85px) scale(0.5); opacity: 0.84; border-color: rgba(54, 114, 216, 0.64); }
.core.state-view .face:nth-child(6) { transform: rotateX(-90deg) translateZ(85px) scale(0.5); opacity: 0.72; border-color: rgba(44, 96, 188, 0.52); }







.core.state-view .face:nth-child(7) { transform: rotateY(90deg) translateZ(85px) scale(0.5); opacity: 0 !important; }
.core.state-view .face:nth-child(8) { transform: rotateX(90deg) translateZ(85px) scale(0.5); opacity: 0 !important; }
.view-orbit-cube {
  position: absolute;
  left: 0; top: 0; width: 0; height: 0;
  transform-style: preserve-3d;
  pointer-events: none;
  opacity: 0;
  transform: translate3d(0, 0, 0) scale(0.18);
  transition: opacity 0.6s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  will-change: transform, opacity;
}
.view-orbit-cube.pos-z { transform: translateZ(85px) scale(0.18); }
.view-orbit-cube.neg-z { transform: rotateY(180deg) translateZ(85px) scale(0.18); }
.view-orbit-cube.pos-x { transform: rotateY(90deg) translateZ(85px) scale(0.18); }
.view-orbit-cube.neg-x { transform: rotateY(-90deg) translateZ(85px) scale(0.18); }
.view-orbit-cube.pos-y { transform: rotateX(90deg) translateZ(85px) scale(0.18); }
.view-orbit-cube.neg-y { transform: rotateX(-90deg) translateZ(85px) scale(0.18); }

/* 轨道立方体：单面基础样式 */
.orbit-face {
  position: absolute;
  width: 170px;
  height: 170px;
  margin-left: -85px;
  margin-top: -85px;
  box-sizing: border-box;
  transform-style: preserve-3d;
  backface-visibility: visible;
  -webkit-backface-visibility: visible;
  border: 2px solid rgba(60, 118, 214, 0.85);
  border-radius: 2px;
  background: linear-gradient(180deg, rgba(20, 45, 100, 0.94), rgba(10, 25, 60, 0.98));
  /* 使用 box-shadow 代替 filter 以防止 3D 拍扁效应 */
  box-shadow: 
    inset 0 0 12px rgba(56, 112, 208, 0.2), 
    0 0 15px rgba(18, 66, 154, 0.2);
  opacity: 0.92;
  transition: opacity 0.8s ease;
}

/* 延迟步进：确保分步展开感 */
.core.state-view .view-orbit-cube.pos-z { transition-delay: 0.1s; }
.core.state-view .view-orbit-cube.neg-z { transition-delay: 0.2s; }
.core.state-view .view-orbit-cube.pos-x { transition-delay: 0.3s; }
.core.state-view .view-orbit-cube.neg-x { transition-delay: 0.4s; }
.core.state-view .view-orbit-cube.pos-y { transition-delay: 0.5s; }
.core.state-view .view-orbit-cube.neg-y { transition-delay: 0.6s; }

/* 轨道立方体：6面空间定位 (强制 3D) */
.orbit-face:nth-child(1) { transform: translateZ(85px) !important; }
.orbit-face:nth-child(2) { transform: rotateY(180deg) translateZ(85px) !important; }
.orbit-face:nth-child(3) { transform: rotateY(90deg) translateZ(85px) !important; }
.orbit-face:nth-child(4) { transform: rotateY(-90deg) translateZ(85px) !important; }
.orbit-face:nth-child(5) { transform: rotateX(90deg) translateZ(85px) !important; }
.orbit-face:nth-child(6) { transform: rotateX(-90deg) translateZ(85px) !important; }

.orbit-face::before,
.orbit-face::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  box-sizing: border-box;
  border-radius: inherit;
  transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
}
.orbit-face::before {
  transform: translateZ(8px);
  background: none;
  opacity: 0;
}
.orbit-face::after {
  transform: translateZ(-8px);
  background: linear-gradient(180deg, rgba(4, 10, 24, 0.00), rgba(4, 10, 24, 0.14));
  opacity: 0.14;
}

<div class="orbit-face"></div><div class="orbit-face"></div><div class="orbit-face"></div><div class="orbit-face"></div><div class="orbit-face"></div><div class="orbit-face"></div>
</div>
<div class="view-orbit-cube neg-y">
<div class="orbit-face"></div><div class="orbit-face"></div><div class="orbit-face"></div><div class="orbit-face"></div><div class="orbit-face"></div><div class="orbit-face"></div>
</div>

<div class="ui-layer">
<div class="sidebar glass-panel">
<div class="title">控制中枢</div>
<div style="font-size: 12px; color: #888; margin-bottom: 30px; line-height: 1.6;">蓝色中枢 / 红色警戒 / 金色创造 / 冰蓝查看 / 紫色统计 / 绿爆回收</div>
<button class="btn active" data-state="idle" onclick="switchState('idle', this)">1. 规整立方 (隐忍 / 默认)</button>
<button class="btn" data-state="pyramid" onclick="switchState('pyramid', this)">2. 赤红棱锥 (删除 / 危险)</button>
<div style="margin-top: 6px; margin-bottom: 4px; font-size: 12px; color: #666; font-weight: bold;">[ 页面背景库 ]</div>
<button class="btn" data-state="create" onclick="switchState('create', this)">3. 金色散架构建态 (创造)</button>
<button class="btn" data-state="view" onclick="switchState('view', this)">4. 深蓝真复制立方态 (查看)</button>
<button class="btn" data-state="metrics" onclick="switchState('metrics', this)">5. 紫色圆环 (统计)</button>
<div style="margin-top: 8px; margin-bottom: 4px; font-size: 12px; color: #666; font-weight: bold;">[ 圆环风格 ]</div>
<div style="display: grid; grid-template-columns: 1fr; gap: 8px;">
<button class="btn active" data-metrics-theme="violet" style="padding: 10px 12px; font-size: 12px; border-color: rgba(170, 106, 255, 0.78);" onclick="setMetricsTheme('violet', this)">紫环</button>
</div>
<div style="margin-top: auto;"></div>
<button class="btn" style="border-color: rgba(0, 255, 170, 0.6); width: 100%;" onclick="triggerSave()">执行：保存设定 (绿色爆发)</button>
</div>
<div class="main-content"></div></div>
<script>
function getStateName(geometry) {
  return (Array.from(geometry.classList).find(name => name.startsWith('state-')) || 'state-idle').replace('state-', '');
}

function applyTransitionState(geometry, nextState, duration = 1200) {
  if (!geometry) return;
  const currentStateClass = Array.from(geometry.classList).find(name => name.startsWith('state-')) || 'state-idle';
  const currentState = currentStateClass.replace('state-', '');
  const targetState = geometry.dataset.targetState || currentState;
  const normalizedCurrentState = currentState === 'metrics-enter' || currentState === 'metrics-exit' ? 'metrics' : currentState;

  if ((normalizedCurrentState === nextState && !geometry.classList.contains('is-transitioning')) || targetState === nextState) {
    return;
  }

  geometry.dataset.targetState = nextState;
  if (geometry._transitionTimer) clearTimeout(geometry._transitionTimer);
  if (geometry._phaseTimer) clearTimeout(geometry._phaseTimer);
  if (geometry._viewEnterTimer) {
    clearTimeout(geometry._viewEnterTimer);
    geometry._viewEnterTimer = null;
  }

  const enterMetrics = nextState === 'metrics' && normalizedCurrentState !== 'metrics';
  const exitMetrics = normalizedCurrentState === 'metrics' && nextState !== 'metrics';
  const metricsBridgeDuration = 180;

  if (enterMetrics) {
    geometry.className = `core ${currentStateClass} is-entering-metrics`;
    geometry._phaseTimer = setTimeout(() => {
      requestAnimationFrame(() => {
        geometry.className = `core state-metrics is-transitioning`;
        geometry._transitionTimer = setTimeout(() => {
          geometry.className = `core state-metrics`;
          geometry.dataset.targetState = nextState;
          geometry._transitionTimer = null;
          geometry._phaseTimer = null;
        }, Math.max(280, duration - metricsBridgeDuration));
      });
    }, metricsBridgeDuration);
    return;
  }

  if (exitMetrics) {
    geometry.className = `core state-metrics-exit is-transitioning`;
    geometry._phaseTimer = setTimeout(() => {
      requestAnimationFrame(() => {
        geometry.className = `core state-${nextState} is-transitioning`;
        geometry._transitionTimer = setTimeout(() => {
          geometry.className = `core state-${nextState}`;
          geometry.dataset.targetState = nextState;
          geometry._transitionTimer = null;
          geometry._phaseTimer = null;
        }, Math.max(0, duration - metricsBridgeDuration));
      });
    }, metricsBridgeDuration);
    return;
  }

  geometry.className = `core ${currentStateClass} is-transitioning`;
  requestAnimationFrame(() => {
    geometry.className = `core state-${nextState} is-transitioning`;
    geometry._transitionTimer = setTimeout(() => {
      geometry.className = `core state-${nextState}`;
      geometry.dataset.targetState = nextState;
      // 动画完全结束后再解锁，降低切换闪烁
      geometry._transitionTimer = null;
    }, duration);
  });
}

function switchState(state, btn) {
  const geometry = document.getElementById('geometry');
  if (!geometry || geometry.dataset.saving === '1') return;

  const activeState = geometry.dataset.targetState || getStateName(geometry);
  if (activeState === state) return;

  const transitionDuration = state === 'metrics' ? 620 : 1200;

  // 极致性能：移除冗余的 JS 中间态，由 CSS 硬件加速自动处理平滑的补间动画，彻底杜绝闪烁。
  applyTransitionState(geometry, state, transitionDuration); 


  document.querySelectorAll('.sidebar .btn[data-state]').forEach(button => button.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function setMetricsTheme(theme, btn) {
  const geometry = document.getElementById('geometry');
  if (!geometry) return;

  geometry.dataset.metricsTheme = theme;
  document.querySelectorAll('.sidebar .btn[data-metrics-theme]').forEach(button => button.classList.remove('active'));
  if (btn) btn.classList.add('active');

  if (geometry.dataset.saving === '1') return;
  const activeState = geometry.dataset.targetState || getStateName(geometry);
  if (activeState !== 'metrics') {
    const metricsBtn = document.querySelector('.sidebar .btn[data-state="metrics"]');
    switchState('metrics', metricsBtn);
  }
}

function triggerSave() {
  const geometry = document.getElementById('geometry');
  if (!geometry || geometry.dataset.saving === '1') return;

  const previousState = geometry.dataset.targetState || getStateName(geometry);
  if (previousState === 'save') return;

  geometry.dataset.saving = '1';
  applyTransitionState(geometry, 'save', 110);

  if (geometry._saveReturnTimer) clearTimeout(geometry._saveReturnTimer);
  if (geometry._saveUnlockTimer) clearTimeout(geometry._saveUnlockTimer);

  geometry._saveReturnTimer = setTimeout(() => {
    applyTransitionState(geometry, previousState, 110);
    geometry._saveUnlockTimer = setTimeout(() => {
      geometry.dataset.saving = '0';
      geometry._saveReturnTimer = null;
      geometry._saveUnlockTimer = null;
    }, 180);
  }, 2350);
}
</script>
