<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>罗德岛档案中枢</title>
  <style>
    :root {
      --bg: #090909;
      --bg2: #111111;
      --panel: #151515;
      --panel2: #1a1a1a;
      --line: rgba(255,255,255,.12);
      --line-strong: rgba(255,255,255,.24);
      --text: #efefef;
      --muted: rgba(255,255,255,.68);
      --dim: rgba(255,255,255,.38);
      --cold: #d8d8d8;
      --steel: #9a9a9a;
      --orange: #c98a54;
      --red: #cf6e6e;
      --green: #90b07f;
      --ease: cubic-bezier(.25,1,.5,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Source Han Sans SC", sans-serif;
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
      background-size: 24px 24px, 24px 24px, auto;
      color: var(--text);
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .06;
      background-image: radial-gradient(rgba(255,255,255,.8) .5px, transparent .7px);
      background-size: 5px 5px;
      mix-blend-mode: screen;
    }
    button, input, textarea, select { font: inherit; color: inherit; border-radius: 0; }
    ::placeholder { color: rgba(255,255,255,.22); }
    .app { min-height: 100vh; display: grid; grid-template-columns: 232px minmax(0,1fr); }
    .side {
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.008));
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
    }
    .block, .hero, .panel, .dialog-card {
      position: relative;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.022), rgba(255,255,255,.01));
    }
    .block::before, .panel::before, .hero::before, .dialog-card::before {
      content: "";
      position: absolute;
      left: -4px;
      top: -4px;
      width: 7px;
      height: 7px;
      border: 1px solid var(--line-strong);
      background: #060606;
    }
    .block::after, .panel::after, .hero::after, .dialog-card::after {
      content: "";
      position: absolute;
      right: -4px;
      bottom: -4px;
      width: 7px;
      height: 7px;
      border: 1px solid var(--line-strong);
      background: #060606;
    }
    .brand { padding: 16px 12px 16px 18px; }
    .brand .mini { font-size: 9px; letter-spacing: 1.2px; color: var(--dim); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand .big-wrap { display: grid; grid-template-columns: 6px minmax(0,1fr); gap: 12px; align-items: start; margin-bottom: 14px; }
    .brand .bar { width: 4px; height: 100%; min-height: 112px; background: rgba(255,255,255,.84); }
    .brand .big {
      font-size: 52px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: 6px;
      margin-bottom: 0;
      text-align: left;
    }
    .brand .row { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      border: 1px solid var(--line);
      padding: 3px 6px;
      font-size: 10px;
      color: var(--muted);
      background: rgba(255,255,255,.02);
    }
    .nav { padding: 10px; }
    .nav-title, .tiny, .subtle-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--dim);
      margin-bottom: 8px;
    }
    .nav-list { display: grid; gap: 8px; }
    .nav-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.02);
      color: var(--cold);
      text-align: left;
      padding: 11px 12px;
      cursor: pointer;
      transition: .18s var(--ease);
      font-size: 12px;
      letter-spacing: 1px;
    }
    .nav-btn small { display: block; font-size: 9px; color: var(--dim); margin-top: 3px; }
    .nav-btn:hover, .nav-btn.active {
      background: rgba(255,255,255,.10);
      color: #f6f6f6;
      border-color: rgba(255,255,255,.28);
      transform: translateX(4px);
    }
    .current { padding: 14px; align-self: end; }
    .current .name { font-size: 18px; font-weight: 900; color: #f2f2f2; margin: 6px 0; }
    .main { padding: 14px; display: grid; gap: 14px; }
    .hero {
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0,1fr) 420px;
      gap: 16px;
      align-items: stretch;
    }
    .hero-side {
      display: grid;
      grid-template-columns: minmax(0,1fr) 64px;
      gap: 10px;
      align-items: stretch;
    }
    .hero .kicker { font-size: 10px; letter-spacing: 2px; color: rgba(201,138,84,.9); margin-bottom: 8px; }
    .hero h1 {
      font-size: clamp(46px, 8vw, 92px);
      line-height: .88;
      font-weight: 900;
      letter-spacing: 1px;
      text-align: left;
    }
    .hero p { margin-top: 4px; font-size: 12px; color: var(--muted); max-width: 760px; line-height: 1.8; }
    .quick-box {
      border: 1px solid var(--line-strong);
      padding: 16px 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      background: rgba(255,255,255,.02);
      min-height: 116px;
      align-content: center;
    }
    .quick-box > div { display: grid; place-items: center; text-align: center; gap: 6px; }
    .quick-box b { display: block; font-size: 32px; line-height: 1; color: #fff; }
    .quick-box span { font-size: 11px; line-height: 1.2; color: var(--dim); }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 0;
      justify-content: stretch;
      align-items: stretch;
      justify-items: start;
    }
    .reload-tower {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 116px;
      width: 44px;
      letter-spacing: 2px;
      font-size: 11px;
      padding: 8px 0;
    }
    .btn, .btn-strong, .btn-danger, .btn-mini, .mode-btn {
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,.025);
      color: var(--text);
      padding: 9px 12px;
      cursor: pointer;
      transition: .18s var(--ease);
      letter-spacing: 1px;
      font-size: 11px;
    }
    .btn:hover, .btn-mini:hover, .mode-btn:hover {
      background: rgba(255,255,255,.11);
      color: #fafafa;
      border-color: rgba(255,255,255,.3);
      transform: translateY(-2px);
    }
    .btn-strong {
      background: rgba(255,255,255,.13);
      color: #f6f6f6;
      border-color: rgba(255,255,255,.3);
      font-weight: 800;
    }
    .btn-strong:hover { background: rgba(201,138,84,.22); border-color: rgba(201,138,84,.45); color: #fff; }
    .btn-danger { color: var(--red); border-color: rgba(255,102,102,.5); }
    .btn-danger:hover { background: var(--red); color: #050505; border-color: var(--red); }
    .btn-mini { padding: 6px 8px; font-size: 10px; }
    .pages { display: grid; gap: 14px; }
    .page { display: none; gap: 14px; }
    .page.active { display: grid; }
    .grid { display: grid; grid-template-columns: repeat(12, minmax(0,1fr)); gap: 14px; }
    .col-12 { grid-column: span 12; }
    .col-8 { grid-column: span 8; }
    .col-7 { grid-column: span 7; }
    .col-6 { grid-column: span 6; }
    .col-5 { grid-column: span 5; }
    .col-4 { grid-column: span 4; }
    .panel { padding: 14px; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .panel-title { font-size: 18px; font-weight: 900; letter-spacing: 1px; }
    .panel-note { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.7; }
    .stack, .profile-list, .card-list, .asset-list, .event-list, .stats-list { display: grid; gap: 10px; }
    .profile-list { grid-template-columns: 1fr; align-items: start; justify-items: stretch; }
    .profile-card {
      display: block;
      align-items: start;
      gap: 8px;
      overflow: visible;
      position: relative;
      transition: .24s var(--ease);
      width: 100%;
      max-width: 100%;
      padding: 6px 34px 6px 10px;
    }
    .profile-main {
      position: relative;
      z-index: 2;
      min-width: 0;
      width: 100%;
      display: grid;
      gap: 4px;
    }
    .profile-main::after {
      content: "";
      position: absolute;
      left: -10px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,.2), transparent);
      opacity: .35;
    }
    .profile-switch-slot {
      position: absolute;
      right: 10px;
      top: 6px;
      bottom: 6px;
      border: 1px solid rgba(194,86,86,.34);
      background: linear-gradient(180deg, rgba(194,86,86,.08), rgba(194,86,86,.02));
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      min-height: 0;
      overflow: hidden;
      transition: .24s var(--ease);
    }
    .profile-switch-btn {
      width: 100%;
      height: 100%;
      min-height: 100%;
      border: none;
      background: transparent;
      color: rgba(255,210,210,.9);
      font-weight: 900;
      letter-spacing: 0;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      cursor: pointer;
      transition: .22s var(--ease);
      font-size: 8px;
      padding: 2px 0;
    }
    .profile-switch-btn:hover { color: #fff; background: rgba(255,255,255,.03); }
    .profile-card.active {
      border-color: rgba(140,255,160,.42);
      box-shadow: inset 0 0 0 1px rgba(140,255,160,.1), 0 0 18px rgba(110,255,160,.1);
      transform: translateX(5px);
    }
    .profile-card.active::before {
      content: "当前使用";
      position: absolute;
      left: -14px;
      top: 16px;
      padding: 6px 10px;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(220,255,226,.92);
      background: linear-gradient(90deg, rgba(80,255,150,.22), rgba(80,255,150,.04));
      box-shadow: 0 0 18px rgba(80,255,150,.14);
      z-index: 3;
    }
    .profile-card.active::after {
      content: "";
      position: absolute;
      left: -22px;
      top: 0;
      bottom: 0;
      width: 24px;
      background: linear-gradient(90deg, rgba(80,255,150,.22), rgba(80,255,150,.06), transparent);
      filter: blur(10px);
      opacity: .85;
      pointer-events: none;
    }
    .profile-card.active .profile-switch-slot {
      width: 4px;
      right: 10px;
      border-color: rgba(140,255,160,.42);
      background: linear-gradient(180deg, rgba(140,255,160,.12), rgba(140,255,160,.03));
      box-shadow: inset 4px 0 10px rgba(110,255,160,.16);
    }
    .profile-card.active .profile-switch-btn { opacity: 0; pointer-events: none; }
    .profile-card.leave { transform: translateX(0); }
    .input, .textarea, .select {
      width: 100%;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,.02);
      color: #fff;
      padding: 10px 12px;
      outline: none;
    }
    .textarea { min-height: 100px; resize: vertical; }
    .input:focus, .textarea:focus, .select:focus { border-color: rgba(255,255,255,.28); box-shadow: inset 0 0 0 1px rgba(255,255,255,.06); }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 10px; letter-spacing: 1px; color: var(--dim); }
    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .field-grid.three { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .field-grid.four { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .profile-card, .card-item, .asset-item, .event-item, .stat-item, .effect-row {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.018);
      padding: 12px;
    }
    .profile-card { padding: 8px 10px; }
    .profile-card h3, .card-item h3 { font-size: 18px; line-height: 1.05; margin-bottom: 2px; }
    .profile-inline { gap: 6px; align-items: center; }
    .meta, .helper, .card-desc { font-size: 11px; color: var(--muted); line-height: 1.28; }
    .row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .profile-card .btn, .profile-card .btn-mini { padding: 5px 8px; }
    .profile-card .badge { padding: 3px 7px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line-strong);
      background: #101010;
      color: #fff;
      padding: 4px 8px;
      font-size: 10px;
    }
    .badge.light { background: rgba(255,255,255,.16); color: #f2f2f2; border-color: rgba(255,255,255,.22); }
    .badge.orange { background: rgba(201,138,84,.18); color: #f3d5bc; border-color: rgba(201,138,84,.32); }
    .switch-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .mode-btn { min-width: 108px; text-align: center; }
    .mode-btn.active { background: rgba(255,255,255,.12); color: #f3f3f3; border-color: rgba(255,255,255,.28); }
    .mode-btn.black.active { background: rgba(207,110,110,.16); color: #ffd8d8; border-color: rgba(207,110,110,.36); }
    .mode-btn.white.active { background: rgba(201,138,84,.18); color: #f7dbc3; border-color: rgba(201,138,84,.34); }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.018);
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .toggle-box {
      width: 52px;
      height: 22px;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,.03);
      position: relative;
      cursor: pointer;
    }
    .toggle-box::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 16px;
      height: 16px;
      background: rgba(255,255,255,.78);
      transition: transform .16s steps(2);
    }
    .toggle-box.on { background: rgba(255,255,255,.14); }
    .toggle-box.on::before { transform: translateX(30px); background: #0e0e0e; }
    .thumb {
      width: 88px;
      height: 88px;
      border: 1px solid var(--line-strong);
      background: linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.02));
      flex: 0 0 88px;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
      display: grid;
      place-items: center;
      color: var(--dim);
      font-size: 10px;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-layout { display: grid; grid-template-columns: 88px minmax(0,1fr); gap: 12px; }
    .asset-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; }
    .asset-item .thumb { width: 100%; height: 120px; }
    .event-item {
      display: grid;
      grid-template-columns: 28px minmax(0,1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .event-check { width: 18px; height: 18px; accent-color: #fff; }
    .stat-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; }
    .stat-item b { display: block; font-size: 30px; color: #fff; margin-bottom: 8px; }
    .effect-builder { display: grid; gap: 10px; }
    .effect-row { display: grid; grid-template-columns: 160px 180px minmax(0,1fr) auto; gap: 10px; align-items: end; }
    .tag-preview {
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,.018);
      padding: 10px 12px;
      min-height: 42px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.8;
    }
    .empty {
      border: 1px dashed var(--line-strong);
      padding: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
    .mono { font-family: Consolas, monospace; }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      min-width: 260px;
      max-width: 420px;
      padding: 12px 14px;
      border: 1px solid var(--line-strong);
      background: rgba(0,0,0,.96);
      color: #fff;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: .18s var(--ease);
      z-index: 20;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .dialog {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 30;
    }
    .dialog.show { display: flex; }
    .dialog-card {
      width: min(1100px, 100%);
      max-height: 90vh;
      overflow-x: hidden;
      overflow-y: auto;
      background: #090909;
      padding: 14px;
    }
    .dialog-card.create-mode {
      width: min(860px, 100%);
      max-height: none;
      overflow: hidden;
    }
    .dialog-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .dialog-title { font-size: 22px; font-weight: 900; }
    .split { display: grid; grid-template-columns: minmax(0,1fr) 340px; gap: 14px; }
    .create-split { display: grid; grid-template-columns: minmax(0,1fr) 280px; gap: 14px; }
    .select, select option { background: #101010; color: #f2f2f2; }
    @media (max-width: 1260px) {
      .hero { grid-template-columns: 1fr; }
      .col-8, .col-7, .col-6, .col-5, .col-4 { grid-column: span 12; }
      .asset-grid, .field-grid.four, .stat-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .split { grid-template-columns: 1fr; }
      .effect-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .side { border-right: none; border-bottom: 1px solid var(--line); }
      .field-grid, .field-grid.three, .field-grid.four, .asset-grid, .stat-grid { grid-template-columns: 1fr; }
      .card-layout { grid-template-columns: 1fr; }
      .event-item { grid-template-columns: 24px minmax(0,1fr); }
      .event-item .btn-danger { grid-column: 2; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <section class="block brand">
        <div class="mini">[ ROD ISLAND INTERNAL FILE ]</div>
        <div class="big-wrap">
          <span class="bar"></span>
          <div class="big">档案<br>中枢</div>
        </div>
        <div class="row">
          <span class="chip">Ver. 5.4.0</span>
          <span class="chip">[ 插件核心 ]</span>
        </div>
      </section>

      <section class="block nav">
        <div class="nav-title">[ 页面索引 ]</div>
        <div class="nav-list">
          <button class="nav-btn active" data-page="overview">总览与方案<small>方案管理 / 访问控制</small></button>
          <button class="nav-btn" data-page="runtime">运行配置<small>系统开关 / 概率 / 稀有度</small></button>
          <button class="nav-btn" data-page="signin">签到配置<small>事件池 / 运势区间 / 预览</small></button>
          <button class="nav-btn" data-page="fate">命运牌档案<small>命运池 / 图像库</small></button>
          <button class="nav-btn" data-page="cards">功能牌档案<small>引导式标签编辑</small></button>
          <button class="nav-btn" data-page="stats">数据统计<small>方案切换 / 群组 / 持牌排行</small></button>
        </div>
      </section>

      <section class="block current">
        <div class="subtle-label">[ 当前方案 ]</div>
        <div class="name" id="currentProfileName">默认配置</div>
        <div class="helper">所有数据请求都会自动跟随当前方案。切换后会同步刷新牌池、签到配置、资源目录与统计。</div>
      </section>
    </aside>

    <main class="main">
      <section class="hero">
        <div>
          <div class="kicker">[ TERRA WEB UI / ARCHIVE CONTROL ]</div>
          <h1 id="heroTitle">总览与方案</h1>
          <p id="heroDesc">把方案管理、访问控制与主要操作直接压进主界面，不做无意义留白，不做软绵绵的按钮</p>
        </div>
        <div class="hero-side">
          <div class="quick-box">
            <div><b id="quickProfileCount">0</b><span>方案数量</span></div>
            <div><b id="quickGroupCount">0</b><span>群组总量</span></div>
            <div><b id="quickUserCount">0</b><span>用户总量</span></div>
          </div>
          <div class="toolbar">
            <button class="btn-strong reload-tower" id="reloadBtn">载入 / 刷新</button>
          </div>
        </div>
      </section>

      <section class="pages">
        <div class="page active" id="page-overview"></div>
        <div class="page" id="page-runtime"></div>
        <div class="page" id="page-signin"></div>
        <div class="page" id="page-fate"></div>
        <div class="page" id="page-cards"></div>
        <div class="page" id="page-stats"></div>
      </section>
    </main>
  </div>

  <div class="dialog" id="dialog">
    <div class="dialog-card">
      <div class="dialog-head">
        <div>
          <div class="tiny">[ 档案编辑器 ]</div>
          <div class="dialog-title" id="dialogTitle">编辑器</div>
        </div>
        <button class="btn" id="closeDialogBtn">[ 关闭 ]</button>
      </div>
      <div id="dialogBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      currentProfile: 'default',
      activePage: 'overview',
      profiles: [],
      runtimeConfig: {},
      groupAccess: { mode: 'off', blacklist: [], whitelist: [] },
      signInTexts: { good_things: [], bad_things: [], luck_ranges: [] },
      fateCards: [],
      fateImages: [],
      funcCards: [],
      images: [],
      missingImages: [],
      stats: { total_groups: 0, total_users: 0, card_holders: {}, groups: [] },
      goodSelected: [],
      badSelected: [],
      editingFuncIndex: -1,
      editingFuncEffects: [],
      editingFateIndex: -1,
    };

    const $ = (s, root = document) => root.querySelector(s);
    const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));
    const esc = (v) => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

    const pageMeta = {
      overview: ['总览与方案', '方案管理和访问控制直接放在主界面里，减少无效跳转。'],
      runtime: ['运行配置', '高对比参数面板，稀有度统一使用 普通 / 稀有 / 史诗 / 传说 / 神话。'],
      signin: ['签到配置', '事件池逐条编辑、批量删除、批量增加，并提供签到预览。'],
      fate: ['命运牌档案', '命运牌列表、图像库与编辑器。'],
      cards: ['功能牌档案', '用中文引导生成效果标签，让人看得懂、配得出来。'],
      stats: ['数据统计', '支持直接切换不同方案查看统计。'],
    };

    const rarityLabelMap = {1:'普通',2:'稀有',3:'史诗',4:'传说',5:'神话'};
    const typeLabelMap = {attack:'攻击',heal:'辅助',defense:'防御'};
    const effectCatalog = {
      attack: [
        { key:'steal', name:'偷取金币', params:['数值'] },
        { key:'freeze', name:'冻结', params:['小时'] },
        { key:'silence', name:'沉默', params:['小时'] },
        { key:'seal_draw_all', name:'封锁抽牌', params:['小时'] },
        { key:'luck_drain', name:'抽取爆率', params:['小时','百分比'] },
        { key:'steal_fate', name:'偷取命运收益', params:[] },
        { key:'borrow_blade', name:'借刀伤害', params:['最小值','最大值'] },
        { key:'bounty_mark', name:'悬赏印记', params:['小时','追加金币'] },
        { key:'strip_buff_gain', name:'夺取增益并加爆率', params:['百分比','小时'] },
        { key:'aoe_damage', name:'群体攻击', params:['最小值','最大值','人数'] },
        { key:'dice_rule', name:'骰子规则', params:['规则键'] },
        { key:'dice_duel', name:'对赌', params:['底注'] }
      ],
      heal: [
        { key:'cleanse', name:'净化', params:[] },
        { key:'aoe_heal', name:'群体回复', params:['最小值','最大值','人数'] },
        { key:'luck_bless', name:'好运加护', params:['小时','百分比'] },
        { key:'fate_roulette', name:'命运转盘', params:[] },
        { key:'dice_reroll_lowest_once', name:'最低点重投一次', params:[] }
      ],
      defense: [
        { key:'add_shield', name:'护盾', params:[] },
        { key:'thorn_armor', name:'反甲', params:['小时','反伤比例'] },
        { key:'cleanse', name:'净化', params:[] }
      ]
    };

    function effectToTag(effect) {
      const p = effect.params || [];
      switch (effect.key) {
        case 'steal': return `steal:${p[0] || 0}`;
        case 'freeze': return `freeze:${p[0] || 0}`;
        case 'silence': return `silence:${p[0] || 0}`;
        case 'seal_draw_all': return `seal_draw_all:${p[0] || 0}`;
        case 'luck_drain': return `luck_drain:${p[0] || 0}:${p[1] || 0}`;
        case 'steal_fate': return 'steal_fate';
        case 'borrow_blade': return `borrow_blade:${p[0] || 0}:${p[1] || 0}`;
        case 'bounty_mark': return `bounty_mark:${p[0] || 0}:${p[1] || 0}`;
        case 'strip_buff_gain': return `strip_buff_gain:${p[0] || 0}:${p[1] || 0}`;
        case 'aoe_damage': return `aoe_damage:${p[0] || 0}:${p[1] || 0}:${p[2] || 0}`;
        case 'dice_rule': return `dice_rule:${p[0] || 'all_in_raid_v1'}`;
        case 'dice_duel': return `dice_duel:${p[0] || 20}`;
        case 'cleanse': return 'cleanse';
        case 'aoe_heal': return `aoe_heal:${p[0] || 0}:${p[1] || 0}:${p[2] || 0}`;
        case 'luck_bless': return `luck_bless:${p[0] || 0}:${p[1] || 0}`;
        case 'fate_roulette': return 'fate_roulette';
        case 'dice_reroll_lowest_once': return 'dice_reroll_lowest_once';
        case 'add_shield': return 'add_shield';
        case 'thorn_armor': return `thorn_armor:${p[0] || 0}:${p[1] || 0}`;
        default: return '';
      }
    }

    function tagToEffect(tag) {
      const raw = String(tag || '');
      if (!raw) return null;
      const [key, ...rest] = raw.split(':');
      if (key === 'steal') return { key, params:[rest[0] || ''] };
      if (key === 'freeze') return { key, params:[rest[0] || ''] };
      if (key === 'silence') return { key, params:[rest[0] || ''] };
      if (key === 'seal_draw_all') return { key, params:[rest[0] || ''] };
      if (key === 'luck_drain') return { key, params:[rest[0] || '', rest[1] || ''] };
      if (key === 'steal_fate') return { key, params:[] };
      if (key === 'borrow_blade') return { key, params:[rest[0] || '', rest[1] || ''] };
      if (key === 'bounty_mark') return { key, params:[rest[0] || '', rest[1] || ''] };
      if (key === 'strip_buff_gain') return { key, params:[rest[0] || '', rest[1] || ''] };
      if (key === 'aoe_damage') return { key, params:[rest[0] || '', rest[1] || '', rest[2] || ''] };
      if (key === 'dice_rule') return { key, params:[rest.join(':') || 'all_in_raid_v1'] };
      if (key === 'dice_duel') return { key, params:[rest[0] || '20'] };
      if (key === 'cleanse') return { key, params:[] };
      if (key === 'aoe_heal') return { key, params:[rest[0] || '', rest[1] || '', rest[2] || ''] };
      if (key === 'luck_bless') return { key, params:[rest[0] || '', rest[1] || ''] };
      if (key === 'fate_roulette') return { key, params:[] };
      if (key === 'dice_reroll_lowest_once') return { key, params:[] };
      if (key === 'add_shield') return { key, params:[] };
      if (key === 'thorn_armor') return { key, params:[rest[0] || '', rest[1] || ''] };
      return { key: 'raw', raw };
    }

    function effectLabel(effect) {
      if (!effect) return '未识别效果';
      if (effect.key === 'raw') return `原始标签：${effect.raw}`;
      const dict = [...effectCatalog.attack, ...effectCatalog.heal, ...effectCatalog.defense].find(x => x.key === effect.key);
      return dict?.name || effect.key;
    }

    function humanizeTag(tag) {
      const effect = tagToEffect(tag);
      if (!effect) return '未设定';
      const p = effect.params || [];
      switch (effect.key) {
        case 'steal': return `偷取目标 ${p[0]} 金币`;
        case 'freeze': return `冻结 ${p[0]} 小时`;
        case 'silence': return `沉默 ${p[0]} 小时`;
        case 'seal_draw_all': return `封锁抽牌 ${p[0]} 小时`;
        case 'luck_drain': return `抽取 ${p[1]}% 爆率，持续 ${p[0]} 小时`;
        case 'steal_fate': return '偷取命运收益';
        case 'borrow_blade': return `借刀造成 ${p[0]}-${p[1]} 伤害`;
        case 'bounty_mark': return `悬赏 ${p[0]} 小时，每次追加 ${p[1]} 金币`;
        case 'strip_buff_gain': return `夺取增益并获得 ${p[0]}% 爆率 ${p[1]} 小时`;
        case 'aoe_damage': return `群攻 ${p[0]}-${p[1]}，最多 ${p[2]} 人`;
        case 'dice_rule': return `骰子规则 ${p[0]}`;
        case 'dice_duel': return `对赌底注 ${p[0]}`;
        case 'cleanse': return '净化负面状态';
        case 'aoe_heal': return `群体回复 ${p[0]}-${p[1]}，最多 ${p[2]} 人`;
        case 'luck_bless': return `${p[0]} 小时内爆率 +${p[1]}%`;
        case 'fate_roulette': return '命运转盘';
        case 'dice_reroll_lowest_once': return '最低点自动重投一次';
        case 'add_shield': return '挂载护盾';
        case 'thorn_armor': return `反甲 ${p[0]} 小时，反伤 ${p[1]}%`;
        case 'raw': return `原始标签：${effect.raw}`;
        default: return tag;
      }
    }

    function showToast(text, bad = false) {
      const el = $('#toast');
      el.textContent = text;
      el.className = `toast show${bad ? ' bad' : ''}`;
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => el.className = 'toast', 2200);
    }

    function apiUrl(path) {
      return `${path}${path.includes('?') ? '&' : '?'}profile=${encodeURIComponent(state.currentProfile || 'default')}`;
    }
    async function apiGet(path) { return await (await fetch(apiUrl(path))).json(); }
    async function apiPost(path, body) {
      return await (await fetch(apiUrl(path), { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })).json();
    }
    async function apiDeleteProfileById(profileId) {
      const res = await fetch(apiUrl('/api/profile_delete'), {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ profile_id: profileId })
      });
      const text = await res.text();
      try { return JSON.parse(text); }
      catch { return { ok:false, error:`HTTP ${res.status}: ${text.slice(0,120)}` }; }
    }

    function setPage(page) {
      state.activePage = page;
      const meta = pageMeta[page];
      $('#heroTitle').textContent = meta[0];
      $('#heroDesc').textContent = meta[1];
      $$('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.page === page));
      $$('.page').forEach(el => el.classList.toggle('active', el.id === `page-${page}`));
    }

    function getProfileName(id = state.currentProfile) {
      return state.profiles.find(p => p.profile_id === id)?.display_name || id;
    }

    function ensureRuntime() {
      const c = state.runtimeConfig || {};
      c.webui_settings ||= { enable:true, port:4399 };
      c.fate_cards_settings ||= { enable:true, daily_draw_limit:3 };
      c.func_cards_settings ||= {
        enable:true,
        enable_dice_cards:true,
        enable_public_duel_mode:false,
        public_duel_daily_limit:3,
        public_duel_min_stake:10,
        public_duel_max_stake:200,
        enable_rarity_dedup:true,
        rarity_mode:'default',
        custom_rarity_weights:{ rarity_1:30, rarity_2:30, rarity_3:28, rarity_4:11, rarity_5:1 },
        economy_settings:{ draw_probability:5, free_daily_draw:1, draw_cost:20, pity_threshold:10 }
      };
      c.func_cards_settings.custom_rarity_weights ||= { rarity_1:30, rarity_2:30, rarity_3:28, rarity_4:11, rarity_5:1 };
      c.func_cards_settings.economy_settings ||= { draw_probability:5, free_daily_draw:1, draw_cost:20, pity_threshold:10 };
      state.runtimeConfig = c;
    }

    function setDeep(obj, path, value) {
      const keys = path.split('.');
      let t = obj;
      for (let i = 0; i < keys.length - 1; i++) { t[keys[i]] ||= {}; t = t[keys[i]]; }
      t[keys[keys.length - 1]] = value;
    }
    function getDeep(obj, path) { return path.split('.').reduce((a, k) => a?.[k], obj); }

    async function loadProfiles() {
      const res = await apiGet('/api/profile_overview');
      if (res.ok) state.profiles = res.profiles || [];
      if (!state.profiles.some(p => p.profile_id === state.currentProfile) && state.profiles[0]) state.currentProfile = state.profiles[0].profile_id;
    }
    async function loadRuntime() { const res = await apiGet('/api/runtime_config'); if (res.ok) state.runtimeConfig = res.config || {}; ensureRuntime(); }
    async function loadGroupAccess() { const res = await apiGet('/api/group_access'); if (res.ok) state.groupAccess = res.config || { mode:'off', blacklist:[], whitelist:[] }; }
    async function loadSignin() {
      const res = await apiGet('/api/sign_in_texts');
      if (res.ok) state.signInTexts = res.texts || {};
      state.signInTexts.good_things ||= [];
      state.signInTexts.bad_things ||= [];
      state.signInTexts.luck_ranges ||= [];
    }
    async function loadFate() {
      const [a,b] = await Promise.all([apiGet('/api/fate_cards'), apiGet('/api/fate_images')]);
      if (a.ok) state.fateCards = a.cards || [];
      if (b.ok) state.fateImages = b.images || [];
    }
    async function loadCards() {
      const [a,b,c] = await Promise.all([apiGet('/api/func_cards'), apiGet('/api/images'), apiGet('/api/check_missing_images')]);
      if (a.ok) state.funcCards = a.cards || [];
      if (b.ok) state.images = b.files || [];
      if (c.ok) state.missingImages = c.missing || [];
    }
    async function loadStats() { const res = await apiGet('/api/user_stats'); if (res.ok) state.stats = res.stats || { total_groups:0, total_users:0, card_holders:{}, groups:[] }; }

    async function loadAll(showMessage = false) {
      try {
        await loadProfiles();
        await Promise.all([loadRuntime(), loadGroupAccess(), loadSignin(), loadFate(), loadCards(), loadStats()]);
        renderAll();
        if (showMessage) showToast('载入成功');
      } catch (e) {
        console.error(e);
        showToast('载入失败，请检查后端接口。', true);
      }
    }

    function updateTop() {
      $('#currentProfileName').textContent = getProfileName();
      $('#quickProfileCount').textContent = String(state.profiles.length || 0);
      $('#quickGroupCount').textContent = String(state.stats.total_groups || 0);
      $('#quickUserCount').textContent = String(state.stats.total_users || 0);
    }

    function renderOverview() {
      const page = $('#page-overview');
      page.innerHTML = `
        <div class="grid">
          <section class="panel col-8">
            <div class="panel-head">
              <div>
                <div class="panel-title">方案管理</div>
                <div class="panel-note">直接放在主界面。切换、重命名、绑定群号都在这里完成。</div>
              </div>
              <button class="btn-strong" onclick="openCreateProfileDialog()">[ 新建方案 ]</button>
            </div>
            <div class="profile-list">
              ${state.profiles.map(p => {
                return `
                <article class="profile-card ${p.profile_id === state.currentProfile ? 'active' : ''}">
                  <div class="profile-main">
                      <h3>${esc(p.display_name || p.profile_id)}</h3>
                    <div class="row" style="margin-bottom:4px;">
                      ${p.is_default ? '<span class="badge light">默认方案</span>' : ''}
                      <span class="badge">绑定群组 ${(p.group_count || 0)}</span>
                    </div>
                    <div class="meta">用户 ${p.user_count || 0} ｜ 功能牌 ${p.func_card_count || 0} ｜ 命运牌 ${p.fate_card_count || 0}</div>
                    <div class="row" style="margin:4px 0;">
                      ${(p.groups || []).slice(0,3).map(g => `<span class="badge">群 ${esc(g)}</span>`).join('') || '<span class="helper">暂无绑定群组</span>'}
                    </div>
                    <div class="row">
                      <button class="btn" onclick="editProfile('${esc(p.profile_id)}')">[ 编辑 ]</button>
                      <button class="btn" onclick="bindGroupPrompt('${esc(p.profile_id)}')">[ 绑定群号 ]</button>
                    </div>
                    ${(p.groups || []).slice(0,3).length ? `<div class="row" style="margin-top:4px;">${(p.groups || []).slice(0,3).map(g => `<button class="btn-mini" onclick="unbindGroup('${esc(p.profile_id)}','${esc(g)}')">解绑 ${esc(g)}</button>`).join('')}</div>` : ''}
                  </div>
                  <div class="profile-switch-slot">
                    <button class="profile-switch-btn" onclick="useProfile('${esc(p.profile_id)}')">切换</button>
                  </div>
                </article>`;
              }).join('')}
            </div>
          </section>

          <section class="panel col-4">
            <div class="panel-head">
              <div>
                <div class="panel-title">访问控制</div>
                <div class="panel-note">黑名单与白名单互斥，只能有一种模式处于启用状态。</div>
              </div>
            </div>
            <div class="switch-group" style="margin-bottom:12px;">
              <button class="mode-btn ${state.groupAccess.mode === 'off' ? 'active' : ''}" onclick="setAccessMode('off')">关闭限制</button>
              <button class="mode-btn black ${state.groupAccess.mode === 'blacklist' ? 'active' : ''}" onclick="setAccessMode('blacklist')">黑名单模式</button>
              <button class="mode-btn white ${state.groupAccess.mode === 'whitelist' ? 'active' : ''}" onclick="setAccessMode('whitelist')">白名单模式</button>
            </div>
            ${state.groupAccess.mode === 'blacklist' ? `
            <div class="field" style="margin-bottom:10px;">
              <label>黑名单群号（每行一个）</label>
              <textarea class="textarea" id="blacklistInput">${esc((state.groupAccess.blacklist || []).join('\n'))}</textarea>
            </div>` : ''}
            ${state.groupAccess.mode === 'whitelist' ? `
            <div class="field">
              <label>白名单群号（每行一个）</label>
              <textarea class="textarea" id="whitelistInput">${esc((state.groupAccess.whitelist || []).join('\n'))}</textarea>
            </div>` : ''}
            <div class="row" style="margin-top:10px;">
              <button class="btn-strong" onclick="saveGroupAccess()">[ 保存访问控制 ]</button>
            </div>
          </section>
        </div>`;
    }

    function renderRuntime() {
      ensureRuntime();
      const c = state.runtimeConfig;
      const f = c.func_cards_settings;
      const e = f.economy_settings;
      const w = f.custom_rarity_weights;
      $('#page-runtime').innerHTML = `
        <div class="grid">
          <section class="panel col-4">
            <div class="panel-head"><div><div class="panel-title">模块开关</div><div class="panel-note">按钮和边框全部强化对比。</div></div></div>
            ${toggleBox('网页控制台', 'webui_settings.enable', c.webui_settings.enable)}
            ${toggleBox('命运牌系统', 'fate_cards_settings.enable', c.fate_cards_settings.enable)}
            ${toggleBox('功能牌系统', 'func_cards_settings.enable', f.enable)}
            ${toggleBox('骰子牌系统', 'func_cards_settings.enable_dice_cards', f.enable_dice_cards)}
            ${toggleBox('公开对赌模式', 'func_cards_settings.enable_public_duel_mode', f.enable_public_duel_mode)}
            ${toggleBox('同档去重', 'func_cards_settings.enable_rarity_dedup', f.enable_rarity_dedup)}
          </section>

          <section class="panel col-8">
            <div class="panel-head">
              <div>
                <div class="panel-title">参数配置</div>
                <div class="panel-note">稀有度名称已改为：普通 / 稀有 / 史诗 / 传说 / 神话。</div>
              </div>
              <button class="btn-strong" onclick="saveRuntime()">[ 保存运行配置 ]</button>
            </div>
            <div class="field-grid three">
              ${numField('网页端口','webui_settings.port',c.webui_settings.port)}
              ${numField('命运牌每日上限','fate_cards_settings.daily_draw_limit',c.fate_cards_settings.daily_draw_limit)}
              ${selectField('稀有度模式','func_cards_settings.rarity_mode',f.rarity_mode,[['default','默认'],['custom','自定义']])}
              ${numField('对赌每日次数','func_cards_settings.public_duel_daily_limit',f.public_duel_daily_limit)}
              ${numField('最小赌注','func_cards_settings.public_duel_min_stake',f.public_duel_min_stake)}
              ${numField('最大赌注','func_cards_settings.public_duel_max_stake',f.public_duel_max_stake)}
            </div>
            <div class="panel-head" style="margin-top:14px;"><div><div class="panel-title">抽卡经济</div></div></div>
            <div class="field-grid four">
              ${numField('基础掉率','func_cards_settings.economy_settings.draw_probability',e.draw_probability)}
              ${numField('每日免费抽取','func_cards_settings.economy_settings.free_daily_draw',e.free_daily_draw)}
              ${numField('额外抽取消耗','func_cards_settings.economy_settings.draw_cost',e.draw_cost)}
              ${numField('保底次数','func_cards_settings.economy_settings.pity_threshold',e.pity_threshold)}
            </div>
            <div class="panel-head" style="margin-top:14px;"><div><div class="panel-title">稀有度权重</div></div></div>
            <div class="field-grid five">
              ${numField('普通','func_cards_settings.custom_rarity_weights.rarity_1',w.rarity_1)}
              ${numField('稀有','func_cards_settings.custom_rarity_weights.rarity_2',w.rarity_2)}
              ${numField('史诗','func_cards_settings.custom_rarity_weights.rarity_3',w.rarity_3)}
              ${numField('传说','func_cards_settings.custom_rarity_weights.rarity_4',w.rarity_4)}
              ${numField('神话','func_cards_settings.custom_rarity_weights.rarity_5',w.rarity_5)}
            </div>
          </section>
        </div>`;
    }

    function toggleBox(label, path, on) {
      return `<div class="toggle-row"><div><div>${label}</div><div class="helper mono">${path}</div></div><div class="toggle-box ${on ? 'on' : ''}" onclick="toggleRuntime('${path}', this)"></div></div>`;
    }
    function numField(label, path, value) {

    async function editProfile(id) {
      const current = state.profiles.find(p => p.profile_id === id);
      state.newProfileCover = current?.cover_image || '';
      state.editingProfileId = id;
      openDialog('编辑方案', `
        <div>
          <div>
            <div class="field">
              <label>方案名称</label><input class="input" id="newProfileName" value="${esc(current?.display_name || '')}">
            </div>

            <div class="row" style="margin-top:12px;"><button class="btn-strong" onclick="saveProfileEdit()">[ 保存方案 ]</button><button class="btn-danger" onclick="deleteProfileConfirm()">[ 删除方案 ]</button></div>
          </div>
        </div>`, 'create');
    }

    async function renameProfile(id) {
      return editProfile(id);
    }

    async function saveProfileEdit() {
      const id = state.editingProfileId;
      const current = state.profiles.find(p => p.profile_id === id);
      const name = $('#newProfileName')?.value?.trim();
      const groupLines = ($('#editProfileGroups')?.value || '').split(/\r?\n/).map(v => v.trim()).filter(Boolean);
      if (!id || !name) return showToast('方案名称不能为空。', true);
      const res = await apiPost('/api/profile_meta', { profile_id:id, display_name:name, cover_image: '' });
      if (!res.ok) return showToast(res.error || '保存失败。', true);
      const before = new Set(current?.groups || []);
      const after = new Set(groupLines);
      for (const gid of before) {
        if (!after.has(gid)) await apiPost('/api/profile_unbind_group', { profile_id:id, group_id:gid });
      }
      for (const gid of after) {
        if (!before.has(gid)) await apiPost('/api/profile_bind_group', { profile_id:id, group_id:gid });
      }
      closeDialog();
      await loadProfiles();
      await loadStats();
      renderAll();
      showToast('方案编辑已保存。');
    }

    async function deleteProfileConfirm() {
      const id = state.editingProfileId;
      const current = state.profiles.find(p => p.profile_id === id);
      if (!id) return;
      if (current?.is_default) return showToast('默认方案不能删除。', true);
      if (!confirm(`确认删除方案「${current?.display_name || id}」吗？\n绑定到该方案的群组会自动切回默认方案。`)) return;
      try {
        const res = await apiDeleteProfileById(id);
        if (!res.ok) return showToast(`删除失败：${res.error || 'unknown error'}`, true);
        closeDialog();
        state.currentProfile = res.fallback_profile || 'default';
        state.profiles = state.profiles.filter(p => p.profile_id !== id);
        await loadProfiles();
        await Promise.all([loadRuntime(), loadGroupAccess(), loadSignin(), loadFate(), loadCards(), loadStats()]);
        renderAll();
        showToast('方案已删除。');
      } catch (e) {
        console.error(e);
        showToast(`删除失败：${e?.message || e}`, true);
      }
    }

      const gid = prompt('请输入群号');

      if (!/^\d+$/.test(gid)) return showToast('群号格式无效。', true);
      const res = await apiPost('/api/profile_bind_group', { profile_id:id, group_id:gid });
      if (res.ok) { await loadProfiles(); await loadStats(); renderAll(); showToast('群号绑定成功。'); }
      else showToast(res.error || '绑定失败。', true);
    }

      if (res.ok) { await loadProfiles(); await loadStats(); renderAll(); showToast('群号已解绑。'); }

    function toggleRuntime(path, el) {
      const next = !getDeep(state.runtimeConfig, path);
      setDeep(state.runtimeConfig, path, next);
      el.classList.toggle('on', next);
    }
    function setRuntimeValue(path, value) {
      const finalVal = value === '' ? '' : (isNaN(value) ? value : Number(value));
      setDeep(state.runtimeConfig, path, finalVal);
    }
    async function saveRuntime() {
      const res = await apiPost('/api/runtime_config', { config: state.runtimeConfig });
      if (res.ok) showToast('运行配置已保存。');
      else showToast(res.error || '保存失败。', true);
    }

    function toggleEventSelect(kind, idx, checked) {
      const target = kind === 'good' ? state.goodSelected : state.badSelected;
      if (checked && !target.includes(idx)) target.push(idx);
      if (!checked) {
        const pos = target.indexOf(idx);
        if (pos >= 0) target.splice(pos, 1);
      }
    }
    function removeEvent(kind, idx) {
      const arr = kind === 'good' ? state.signInTexts.good_things : state.signInTexts.bad_things;
      arr.splice(idx, 1);
      if (kind === 'good') state.goodSelected = []; else state.badSelected = [];
      renderSignin();
    }
    function deleteSelectedEvents(kind) {
      const arr = kind === 'good' ? state.signInTexts.good_things : state.signInTexts.bad_things;
      const selected = new Set(kind === 'good' ? state.goodSelected : state.badSelected);
      if (!selected.size) return showToast('请先勾选要删除的条目。', true);
      const remain = arr.filter((_, i) => !selected.has(i));
      if (kind === 'good') { state.signInTexts.good_things = remain; state.goodSelected = []; }
      else { state.signInTexts.bad_things = remain; state.badSelected = []; }
      renderSignin();
    }
    function addSingleEvent(kind) {
      const val = prompt(`请输入要加入${kind === 'good' ? '好事' : '坏事'}列表的文案`);
      if (!val) return;
      (kind === 'good' ? state.signInTexts.good_things : state.signInTexts.bad_things).push(val);
      renderSignin();
    }
    function batchAddEvents(kind) {
      const raw = prompt(`每行一条，批量增加${kind === 'good' ? '好事' : '坏事'}文案`);
      if (!raw) return;
      raw.split(/\r?\n/).map(v => v.trim()).filter(Boolean).forEach(v => (kind === 'good' ? state.signInTexts.good_things : state.signInTexts.bad_things).push(v));
      renderSignin();
    }
    function addRange() {
      state.signInTexts.luck_ranges.push({ label:'新区间', min:1, max:100, gold_delta:0, comments:[] });
      renderSignin();
    }
    function removeRange(i) {
      state.signInTexts.luck_ranges.splice(i, 1);
      renderSignin();
    }
    function setRange(i, key, value) { state.signInTexts.luck_ranges[i][key] = value; }
    function setRangeComments(i, value) { state.signInTexts.luck_ranges[i].comments = value.split(/\r?\n/).map(v => v.trim()).filter(Boolean); }
    function previewSignin() {
      const ranges = state.signInTexts.luck_ranges || [];
      if (!ranges.length) return showToast('请先配置运势区间。', true);
      const range = ranges[Math.floor(Math.random() * ranges.length)];
      const comment = (range.comments || [])[Math.floor(Math.random() * (range.comments?.length || 1))] || '今日无额外批注。';
      const good = (state.signInTexts.good_things || [])[Math.floor(Math.random() * Math.max(1, state.signInTexts.good_things.length))] || '暂无好事';
      const bad = (state.signInTexts.bad_things || [])[Math.floor(Math.random() * Math.max(1, state.signInTexts.bad_things.length))] || '暂无坏事';
      const score = Math.floor(Math.random() * Math.max(1, (range.max ?? 100) - (range.min ?? 1) + 1)) + (range.min ?? 1);
      $('#signinPreview').textContent = `今日运势【${range.label || '未知'}】｜数值 ${score}｜金币修正 ${range.gold_delta || 0}｜点评：${comment}｜宜：${good}｜忌：${bad}`;
    }
    async function saveSignin() {
      const res = await apiPost('/api/sign_in_texts', { texts: state.signInTexts });
      if (res.ok) showToast('签到配置已保存。');
      else showToast(res.error || '保存失败。', true);
    }

    function openFateEditor(index) {
      state.editingFateIndex = index;
      const card = index >= 0 ? JSON.parse(JSON.stringify(state.fateCards[index])) : { text:'', gold:0, filename:'' };
      openDialog(index >= 0 ? '编辑命运牌' : '新增命运牌', `
        <div class="split">
          <div>
            <div class="field-grid">
              <div class="field"><label>文案</label><input class="input" id="fateText" value="${esc(card.text || '')}"></div>
              <div class="field"><label>金币值</label><input class="input" type="number" id="fateGold" value="${esc(card.gold ?? card.value ?? 0)}"></div>
            </div>
            <div class="field" style="margin-top:12px;"><label>图片文件名</label><input class="input" id="fateFilename" value="${esc(card.filename || '')}"></div>
            <div class="row" style="margin-top:12px;"><button class="btn-strong" onclick="saveFateEditor()">[ 写入命运牌 ]</button></div>
          </div>
          <div>
            <div class="panel-title" style="font-size:14px;margin-bottom:10px;">可用图片</div>
            <div class="asset-grid">${state.fateImages.map(file => `<div class="asset-item"><div class="thumb"><img src="/fate_assets/${encodeURIComponent(file)}?profile=${encodeURIComponent(state.currentProfile)}"></div><div class="helper" style="margin:8px 0;word-break:break-all;">${esc(file)}</div><button class="btn-mini" onclick="pickFile('fateFilename','${esc(file)}')">选用</button></div>`).join('') || '<div class="empty">暂无图片</div>'}</div>
          </div>
        </div>`);
    }
    function pickFile(id, value) { const el = document.getElementById(id); if (el) el.value = value; }
    async function saveFateEditor() {
      const payload = { text: $('#fateText')?.value?.trim() || '未命名命运牌', gold: Number($('#fateGold')?.value || 0), filename: $('#fateFilename')?.value?.trim() || '' };
      if (state.editingFateIndex >= 0) state.fateCards[state.editingFateIndex] = payload; else state.fateCards.push(payload);
      closeDialog();
      renderFate();
      await saveFateCards(false);
    }
    async function saveFateCards(show = true) {
      const res = await apiPost('/api/fate_cards', { cards: state.fateCards });
      if (res.ok) { if (show) showToast('命运牌已保存。'); }
      else showToast(res.error || '保存失败。', true);
    }
    async function deleteFateCard(i) {
      if (!confirm('确认删除该命运牌吗？')) return;
      state.fateCards.splice(i, 1);
      renderFate();
      await saveFateCards(false);
      showToast('命运牌已删除。');
    }
    async function uploadFateImages() {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*'; input.multiple = true;
      input.onchange = async () => {
        const fd = new FormData(); [...input.files].forEach(f => fd.append('files', f));
        const res = await fetch(`/api/upload_fate_image?profile=${encodeURIComponent(state.currentProfile)}`, { method:'POST', body:fd });
        const data = await res.json();
        if (data.ok) { await loadFate(); renderFate(); showToast('命运牌图片上传完成。'); }
        else showToast(data.error || '上传失败。', true);
      };
      input.click();
    }

    function normalizeEffectsForCard(card) {
      const tags = card?.tags || [];
      const parsed = tags.map(tagToEffect).filter(Boolean);
      return parsed.length ? parsed : [{ key: card?.type === 'defense' ? 'add_shield' : card?.type === 'heal' ? 'cleanse' : 'steal', params:[] }];
    }

    function renderEffectRows(type) {
      const list = state.editingFuncEffects || [];
      return list.map((effect, idx) => {
        const options = effectCatalog[type] || [];
        const chosen = options.find(o => o.key === effect.key) || options[0] || { key:'', params:[] };
        const params = chosen.params || [];
        return `
          <div class="effect-row">
            <div class="field"><label>效果类别</label><select class="select" onchange="setEffectKey(${idx}, this.value)">${options.map(o => `<option value="${esc(o.key)}" ${o.key === effect.key ? 'selected' : ''}>${esc(o.name)}</option>`).join('')}</select></div>
            <div class="field"><label>效果摘要</label><div class="tag-preview">${esc(effectLabel(effect))}</div></div>
            <div class="field"><label>参数</label><div class="field-grid ${params.length >= 3 ? 'three' : params.length === 2 ? '' : ''}">${params.map((name, pi) => `<input class="input" placeholder="${esc(name)}" value="${esc(effect.params?.[pi] || '')}" onchange="setEffectParam(${idx}, ${pi}, this.value)">`).join('') || '<div class="helper">此效果无额外参数</div>'}</div></div>
            <div class="field"><label>操作</label><button class="btn-danger" onclick="removeEffectRow(${idx})">[ 删除效果 ]</button></div>
          </div>`;
      }).join('');
    }

    function effectPreviewHtml() {
      const tags = state.editingFuncEffects.map(effectToTag).filter(Boolean);
      return tags.length ? tags.map(tag => `<span class="badge">${esc(humanizeTag(tag))}</span>`).join('') : '<span class="helper">尚未生成任何效果。</span>';
    }

    function openFuncEditor(index) {
      state.editingFuncIndex = index;
      const card = index >= 0 ? JSON.parse(JSON.stringify(state.funcCards[index])) : { card_name:'', type:'attack', rarity:1, filename:'', description:'', tags:[] };
      state.editingFuncEffects = normalizeEffectsForCard(card);
      const type = card.type || 'attack';
      openDialog(index >= 0 ? '编辑功能牌' : '新增功能牌', funcEditorHtml(card, type));
    }

    function funcEditorHtml(card, type) {
      return `
        <div class="split">
          <div>
            <div class="field-grid">
              <div class="field"><label>卡牌名称</label><input class="input" id="funcName" value="${esc(card.card_name || '')}"></div>
              <div class="field"><label>稀有度</label><select class="select" id="funcRarity">${Object.entries(rarityLabelMap).map(([v,t]) => `<option value="${v}" ${Number(card.rarity) === Number(v) ? 'selected' : ''}>${esc(t)}</option>`).join('')}</select></div>
            </div>
            <div class="field-grid" style="margin-top:12px;">
              <div class="field"><label>大类</label><select class="select" id="funcType" onchange="changeFuncType(this.value)">${Object.entries(typeLabelMap).map(([v,t]) => `<option value="${v}" ${type === v ? 'selected' : ''}>${esc(t)}</option>`).join('')}</select></div>
              <div class="field"><label>图片文件名</label><input class="input" id="funcFilename" value="${esc(card.filename || '')}"></div>
            </div>
            <div class="field" style="margin-top:12px;"><label>描述</label><textarea class="textarea" id="funcDesc">${esc(card.description || '')}</textarea></div>
            <div class="panel-head" style="margin-top:14px;"><div><div class="panel-title">效果引导</div><div class="panel-note">先选大类，再选效果，再填参数。会自动转成标签，但展示给你的都是中文。</div></div><button class="btn" onclick="addEffectRow()">[ 新增效果 ]</button></div>
            <div class="effect-builder" id="effectBuilder">${renderEffectRows(type)}</div>
            <div class="field" style="margin-top:12px;"><label>标签预览</label><div class="tag-preview" id="effectPreview">${effectPreviewHtml()}</div></div>
            <div class="row" style="margin-top:12px;"><button class="btn-strong" onclick="saveFuncEditor()">[ 写入功能牌 ]</button></div>
          </div>
          <div>
            <div class="panel-title" style="font-size:14px;margin-bottom:10px;">图像库</div>
            <div class="asset-grid">${state.images.map(file => `<div class="asset-item"><div class="thumb"><img src="/assets/${encodeURIComponent(file)}?profile=${encodeURIComponent(state.currentProfile)}"></div><div class="helper" style="margin:8px 0;word-break:break-all;">${esc(file)}</div><button class="btn-mini" onclick="pickFile('funcFilename','${esc(file)}')">选用</button></div>`).join('') || '<div class="empty">暂无图片</div>'}</div>
          </div>
        </div>`;
    }

    function changeFuncType(type) {
      const options = effectCatalog[type] || [];
      state.editingFuncEffects = [{ key: options[0]?.key || '', params: [] }];
      const name = $('#funcName')?.value || '';
      const rarity = $('#funcRarity')?.value || 1;
      const filename = $('#funcFilename')?.value || '';
      const description = $('#funcDesc')?.value || '';
      $('#dialogBody').innerHTML = funcEditorHtml({ card_name:name, rarity:Number(rarity), filename, description }, type);
    }
    function addEffectRow() {
      const type = $('#funcType')?.value || 'attack';
      const key = effectCatalog[type]?.[0]?.key || '';
      state.editingFuncEffects.push({ key, params: [] });
      changeFuncType(type);
      state.editingFuncEffects[state.editingFuncEffects.length - 1] = { key, params: [] };
      $('#effectBuilder').innerHTML = renderEffectRows(type);
      $('#effectPreview').innerHTML = effectPreviewHtml();
    }
    function removeEffectRow(idx) {
      state.editingFuncEffects.splice(idx, 1);
      const type = $('#funcType')?.value || 'attack';
      if (!state.editingFuncEffects.length) state.editingFuncEffects.push({ key: effectCatalog[type][0].key, params: [] });
      $('#effectBuilder').innerHTML = renderEffectRows(type);
      $('#effectPreview').innerHTML = effectPreviewHtml();
    }
    function setEffectKey(idx, key) {
      state.editingFuncEffects[idx] = { key, params: [] };
      const type = $('#funcType')?.value || 'attack';
      $('#effectBuilder').innerHTML = renderEffectRows(type);
      $('#effectPreview').innerHTML = effectPreviewHtml();
    }
    function setEffectParam(idx, pidx, val) {
      state.editingFuncEffects[idx].params ||= [];
      state.editingFuncEffects[idx].params[pidx] = val;
      $('#effectPreview').innerHTML = effectPreviewHtml();
    }
    async function saveFuncEditor() {
      const payload = {
        card_name: $('#funcName')?.value?.trim() || '未命名功能牌',
        type: $('#funcType')?.value || 'attack',
        rarity: Number($('#funcRarity')?.value || 1),
        filename: $('#funcFilename')?.value?.trim() || '',
        description: $('#funcDesc')?.value?.trim() || '',
        tags: state.editingFuncEffects.map(effectToTag).filter(Boolean)
      };
      if (state.editingFuncIndex >= 0) state.funcCards[state.editingFuncIndex] = payload;
      else state.funcCards.push(payload);
      closeDialog();
      renderCards();
      await saveFuncCards(false);
      await refreshCardAssets(false);
      renderCards();
      showToast('功能牌已写入。');
    }
    async function saveFuncCards(show = true) {
      const res = await apiPost('/api/func_cards', { cards: state.funcCards });
      if (res.ok) { if (show) showToast('功能牌已保存。'); }
      else showToast(res.error || '保存失败。', true);
    }
    async function deleteFuncCard(i) {
      if (!confirm('确认删除该功能牌吗？')) return;
      state.funcCards.splice(i, 1);
      renderCards();
      await saveFuncCards(false);
      await refreshCardAssets(false);
      renderCards();
      showToast('功能牌已删除。');
    }
    async function batchAddCards() {
      const raw = prompt('每行格式：卡牌名,大类(attack/heal/defense),稀有度');
      if (!raw) return;
      raw.split(/\r?\n/).map(v => v.trim()).filter(Boolean).forEach(line => {
        const [name, type, rarity] = line.split(',').map(s => s?.trim() || '');
        if (!name) return;
        state.funcCards.push({ card_name:name, type:type || 'attack', rarity:Number(rarity || 1), filename:'', description:'', tags:[] });
      });
      renderCards();
      await saveFuncCards(false);
      showToast('批量添加完成。');
    }
    async function uploadFuncImages() {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*'; input.multiple = true;
      input.onchange = async () => {
        const fd = new FormData(); [...input.files].forEach(f => fd.append('files', f));
        const res = await fetch(`/api/upload_image?profile=${encodeURIComponent(state.currentProfile)}`, { method:'POST', body:fd });
        const data = await res.json();
        if (data.ok) { await loadCards(); renderCards(); showToast('功能牌图片上传完成。'); }
        else showToast(data.error || '上传失败。', true);
      };
      input.click();
    }
    async function deleteFuncImage(file) {
      if (!confirm(`确认删除图片 ${file} 吗？`)) return;
      const res = await apiDelete(`/api/images/${encodeURIComponent(file)}`);
      if (res.ok) { await loadCards(); renderCards(); showToast('图片已删除。'); }
      else showToast(res.error || '删除失败。', true);
    }
    async function refreshCardAssets(show = true) {
      await loadCards();
      if (show) showToast('资源扫描完成。');
    }

    function bindEvents() {
      $$('.nav-btn').forEach(btn => btn.addEventListener('click', () => setPage(btn.dataset.page)));
      $('#reloadBtn').addEventListener('click', () => loadAll(true));
      $('#closeDialogBtn').addEventListener('click', closeDialog);
      $('#dialog').addEventListener('click', (e) => { if (e.target.id === 'dialog') closeDialog(); });
    }

    window.useProfile = useProfile;
    window.renameProfile = renameProfile;
    window.bindGroupPrompt = bindGroupPrompt;
    window.unbindGroup = unbindGroup;
    window.openCreateProfileDialog = openCreateProfileDialog;
    window.createProfileConfirm = createProfileConfirm;
    window.setAccessMode = setAccessMode;
    window.saveGroupAccess = saveGroupAccess;
    window.toggleRuntime = toggleRuntime;
    window.setRuntimeValue = setRuntimeValue;
    window.saveRuntime = saveRuntime;
    window.toggleEventSelect = toggleEventSelect;
    window.removeEvent = removeEvent;
    window.deleteSelectedEvents = deleteSelectedEvents;
    window.addSingleEvent = addSingleEvent;
    window.batchAddEvents = batchAddEvents;
    window.addRange = addRange;
    window.removeRange = removeRange;
    window.setRange = setRange;
    window.setRangeComments = setRangeComments;
    window.previewSignin = previewSignin;
    window.saveSignin = saveSignin;
    window.openFateEditor = openFateEditor;
    window.saveFateEditor = saveFateEditor;
    window.saveFateCards = saveFateCards;
    window.deleteFateCard = deleteFateCard;
    window.uploadFateImages = uploadFateImages;
    window.pickFile = pickFile;
    window.openFuncEditor = openFuncEditor;
    window.changeFuncType = changeFuncType;
    window.addEffectRow = addEffectRow;
    window.removeEffectRow = removeEffectRow;
    window.setEffectKey = setEffectKey;
    window.setEffectParam = setEffectParam;
    window.saveFuncEditor = saveFuncEditor;
    window.saveFuncCards = saveFuncCards;
    window.deleteFuncCard = deleteFuncCard;
    window.batchAddCards = batchAddCards;
    window.uploadFuncImages = uploadFuncImages;
    window.deleteFuncImage = deleteFuncImage;
    window.refreshCardAssets = refreshCardAssets;

    window.editProfile = editProfile;
    window.saveProfileEdit = saveProfileEdit;
    window.deleteProfileConfirm = deleteProfileConfirm;
    window.handleNewProfileCover = handleNewProfileCover;

    document.addEventListener('DOMContentLoaded', async () => {
      bindEvents();
      await loadAll();
    });
  </script>
</body>
</html>
