<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泰拉控制台 | LUCK_RANK</title>
<style>
:root{--bg:#0a0a0a;--panel:#111;--text:#fff;--muted:#666;--line:1px solid rgba(112,112,112,0.4);--accent:#5fb8c9;--orange:#ff6b35;--red:#ff5f57;--green:#8de25d;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Microsoft YaHei",sans-serif;min-height:100vh;}
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
.sidebar{background:var(--panel);border-right:var(--line);padding:16px;display:flex;flex-direction:column;}
.brand{border:var(--line);padding:16px;margin-bottom:16px;position:relative;}
.brand h1{font-size:28px;font-weight:900;letter-spacing:2px;margin:0;}
.brand .ver{font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:1px;}
.nav-group{margin-bottom:8px;}
.nav-title{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;}
.nav-btn{width:100%;background:transparent;border:var(--line);color:var(--text);padding:10px 12px;text-align:left;cursor:pointer;font-size:12px;letter-spacing:1px;transition:all 0.1s;}
.nav-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
.nav-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
.nav-btn.sub{font-size:11px;padding:8px 12px;margin-left:8px;}
.current-profile{margin-top:auto;border:var(--line);padding:12px;}
.current-profile .label{font-size:10px;color:var(--muted);margin-bottom:4px;}
.current-profile .name{font-size:12px;color:var(--accent);}
.main{padding:16px;}
.topbar{border:var(--line);padding:20px;margin-bottom:16px;position:relative;}
.topbar h2{font-size:36px;font-weight:900;letter-spacing:2px;margin:0;text-transform:uppercase;}
.topbar .desc{color:var(--muted);font-size:12px;margin-top:8px;}
.page{display:none;}
.page.active{display:block;}
.panel{border:var(--line);padding:16px;margin-bottom:16px;}
.panel-title{font-size:14px;font-weight:700;letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:var(--line);}
.btn{background:transparent;border:var(--line);color:var(--text);padding:8px 16px;cursor:pointer;font-size:12px;letter-spacing:1px;transition:all 0.1s;}
.btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);}
.btn-danger{border-color:var(--red);color:var(--red);}
.btn-danger:hover{background:var(--red);color:#000;}
.btn-sm{padding:4px 8px;font-size:11px;}
.input{background:transparent;border:var(--line);color:var(--text);padding:8px 12px;font-size:12px;width:100%;}
.input:focus{outline:none;border-color:var(--accent);}
.select{background:var(--panel);border:var(--line);color:var(--text);padding:8px 12px;font-size:12px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.profile-card{border:var(--line);padding:16px;margin-bottom:12px;}
.profile-card.active{border-color:var(--accent);}
.profile-card h4{font-size:14px;margin-bottom:8px;}
.profile-card p{color:var(--muted);font-size:11px;}
.badge{display:inline-block;padding:2px 6px;font-size:10px;border:var(--line);margin-right:4px;}
.badge-accent{background:var(--accent);color:#000;border-color:var(--accent);}
.card-item{border:var(--line);padding:12px;margin-bottom:8px;display:grid;grid-template-columns:60px 1fr auto;gap:12px;align-items:center;}
.card-item img{width:60px;height:60px;object-fit:cover;border:var(--line);}
.card-item .info h4{font-size:12px;margin:0 0 4px;}
.card-item .info p{font-size:10px;color:var(--muted);margin:0;}
.tag{display:inline-block;padding:1px 4px;font-size:9px;border:var(--line);margin-right:2px;margin-bottom:2px;}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="brand">
<h1>LUCK_RANK</h1>
<div class="ver">Ver.5.4.0-Pro // [ 泰拉控制台 ]</div>
</div>
<div class="nav-group">
<div class="nav-title">[ 导航 ]</div>
<button class="nav-btn active" data-page="profile">配置管理</button>
</div>
<div class="nav-group">
<div class="nav-title">[ 配置项 ]</div>
<button class="nav-btn sub" data-page="config">运行配置</button>
<button class="nav-btn sub" data-page="signin">签到配置</button>
<button class="nav-btn sub" data-page="fate">命运牌</button>
<button class="nav-btn sub" data-page="cards">功能牌</button>
<button class="nav-btn sub" data-page="stats">方案统计</button>
</div>
<div class="current-profile">
<div class="label">当前方案</div>
<div class="name" id="current-profile-name">[ 默认配置 ]</div>
</div>
</aside>
<main class="main">
<div class="topbar">
<h2 id="page-title">泰拉控制台</h2>
<div class="desc" id="page-desc">罗德岛工程图纸 // 泰拉世界内部档案</div>
</div>
<section class="page active" id="page-profile"></section>
<section class="page" id="page-config"></section>
<section class="page" id="page-signin"></section>
<section class="page" id="page-fate"></section>
<section class="page" id="page-cards"></section>
<section class="page" id="page-stats"></section>
</main>
</div>
<script>
const state={currentProfile:"default",profiles:[],runtimeConfig:{},funcCards:[],fateCards:[],signInTexts:{},images:[],fateImages:[],stats:{}};
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const esc=s=>String(s).replace(/[&<>"'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
function apiUrl(p){return p+"?profile="+encodeURIComponent(state.currentProfile||"default");}
async function apiGet(p){return(await fetch(apiUrl(p))).json();}
async function apiPost(p,b){return(await fetch(apiUrl(p),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)})).json();}
const pageTitles={profile:["配置管理","创建与管理配置方案，绑定QQ群"],config:["运行配置","调整系统运行参数"],signin:["签到配置","编辑签到文案与运势区间"],fate:["命运牌","管理命运牌池"],cards:["功能牌","管理功能牌池"],stats:["方案统计","查看用户数据统计"]};
function switchPage(id){
$$(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.page===id));
$$(".page").forEach(p=>p.classList.toggle("active",p.id==="page-"+id));
if(pageTitles[id]){$("#page-title").textContent=pageTitles[id][0];$("#page-desc").textContent=pageTitles[id][1];}
}
function renderProfilePage(){
const el=$("#page-profile");
if(!state.profiles.length){el.innerHTML="<div class=\"panel\"><p style=\"color:var(--muted)\">正在加载配置方案...</p></div>";return;}
let html="<div class=\"panel\"><div class=\"panel-title\">[ 配置方案列表 ]</div><div class=\"grid-2\">";
state.profiles.forEach(p=>{
html+=`<div class=\"profile-card ${p.profile_id===state.currentProfile?"active":"\"}"}>
<h4>${esc(p.display_name||p.profile_id)} ${p.is_default?"<span class=\"badge badge-accent\">默认</span>":""}</h4>
<p>群组: ${p.group_count||0} | 用户: ${p.user_count||0}</p>
<div style=\"margin-top:8px\">
<button class=\"btn btn-sm\" onclick=\"useProfile('${esc(p.profile_id)}')\">[ 切换 ]</button>
</div>
</div>`;
});
html+="</div></div>";
el.innerHTML=html;
}
async function useProfile(id){state.currentProfile=id;$("#current-profile-name").textContent="[ "+(state.profiles.find(p=>p.profile_id===id)?.display_name||id)+" ]";await loadAll();}
async function loadProfiles(){try{const r=await apiGet("/api/profile_overview");if(r.ok){state.profiles=r.profiles||[];renderProfilePage();}}catch(e){console.error(e);}}
async function loadAll(){await Promise.all([loadProfiles()]);}
function init(){$$(".nav-btn").forEach(b=>b.addEventListener("click",()=>switchPage(b.dataset.page)));loadAll();}
window.useProfile=useProfile;
document.addEventListener("DOMContentLoaded",init);
// 运行配置页面
async function renderConfigPage(){
const el=$("#page-config");
try{const r=await apiGet("/api/runtime_config");if(r.ok)state.runtimeConfig=r.config||{};}catch(e){}
let html="<div class='panel'><div class='panel-title'>[ 系统开关 ]</div>";
const fc=state.runtimeConfig.func_cards_settings||{};
const fcs=state.runtimeConfig.fate_cards_settings||{};
html+="<div class='toggle'><span>命运牌系统</span><div class='toggle-switch "+(fcs.enable?"on":"")+"' onclick='toggleConfig("fate_cards_settings.enable",this)'></div></div>";
html+="<div class='toggle'><span>功能牌系统</span><div class='toggle-switch "+(fc.enable?"on":"")+"' onclick='toggleConfig("func_cards_settings.enable",this)'></div></div>";
html+="</div><div class='panel'><div class='panel-title'>[ 经济参数 ]</div>";
const ec=fc.economy_settings||{};
html+="<div style='margin-top:8px'>免费抽取: <input class='input' style='width:60px' value='"+(ec.free_daily_draw||1)+"' onchange='saveConfigValue(\"func_cards_settings.economy_settings.free_daily_draw\",this.value)'/></div>";
html+="<div style='margin-top:8px'>抽取消耗: <input class='input' style='width:60px' value='"+(ec.draw_cost||20)+"' onchange='saveConfigValue(\"func_cards_settings.economy_settings.draw_cost\",this.value)'/></div>";
html+="<div style='margin-top:8px'>保底次数: <input class='input' style='width:60px' value='"+(ec.pity_threshold||10)+"' onchange='saveConfigValue(\"func_cards_settings.economy_settings.pity_threshold\",this.value)'/></div>";
html+="<div style='margin-top:12px'><button class='btn btn-primary' onclick='saveAllConfig()'>[ 保存配置 ]</button></div>";
html+="</div>";
el.innerHTML=html;
}
window.toggleConfig=async function(key,el){const keys=key.split(".");let obj=state.runtimeConfig;for(let i=0;i<keys.length-1;i++)obj=obj[keys[i]]||{};const k=keys[keys.length-1];obj[k]=!obj[k];el.classList.toggle("on");await apiPost("/api/runtime_config",{config:state.runtimeConfig});};
window.saveConfigValue=async function(key,val){const keys=key.split(".");let obj=state.runtimeConfig;for(let i=0;i<keys.length-1;i++)obj=obj[keys[i]]||{};obj[keys[keys.length-1]]=isNaN(val)?val:Number(val);};
// 功能牌页面
async function renderCardsPage(){
const el=$("#page-cards");
try{const r=await apiGet("/api/func_cards");if(r.ok)state.funcCards=r.cards||[];const ri=await apiGet("/api/images");if(ri.ok)state.images=ri.files||[];}catch(e){}
let html="<div class='panel'><div class='panel-title'>[ 功能牌列表 ] <button class='btn btn-sm' onclick='addCard()'>[ 新增 ]</button> <button class='btn btn-sm' onclick='batchAddCards()'>[ 批量添加 ]</button> <button class='btn btn-sm' onclick='uploadCardImage()'>[ 上传图片 ]</button> <button class='btn btn-sm' onclick='saveAllCards()'>[ 保存全部 ]</button></div>";
state.funcCards.forEach((c,i)=>{
html+="<div class='card-item'>";
if(c.filename&&state.images.includes(c.filename)){html+="<img src='/assets/"+esc(c.filename)+"?profile="+encodeURIComponent(state.currentProfile)+"'/>";}
else{html+="<div style='width:60px;height:60px;border:var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)'>无图</div>";}
html+="<div class='info'><h4>"+esc(c.card_name||"未命名")+"</h4><p>稀有度: "+(c.rarity||1)+" | 标签: "+(c.tags||[]).join(", ")+"</p></div>";
html+="<div><button class='btn btn-sm' onclick='editCardDetail("+i+")'>[ 编辑 ]</button> <button class='btn btn-sm btn-danger' onclick='deleteCard("+i+")'>[ 删除 ]</button></div>";
html+="</div>";
});
html+="</div>";
el.innerHTML=html;
}
window.addCard=function(){state.funcCards.push({card_name:"新功能牌",rarity:1,tags:[],filename:""});renderCardsPage();};
window.deleteCard=async function(i){if(!confirm("确定删除?"))return;state.funcCards.splice(i,1);await apiPost("/api/func_cards",{cards:state.funcCards});renderCardsPage();};
window.editCard=function(i){const c=state.funcCards[i];const name=prompt("卡牌名称",c.card_name||"");if(name!==null){c.card_name=name;apiPost("/api/func_cards",{cards:state.funcCards});renderCardsPage();}};
// 命运牌页面
async function renderFatePage(){
const el=$("#page-fate");
try{const r=await apiGet("/api/fate_cards");if(r.ok)state.fateCards=r.cards||[];const ri=await apiGet("/api/fate_images");if(ri.ok)state.fateImages=ri.images||[];}catch(e){}
let html="<div class='panel'><div class='panel-title'>[ 命运牌列表 ] <button class='btn btn-sm' onclick='addFateCard()'>[ 新增 ]</button> <button class='btn btn-sm' onclick='uploadFateImage()'>[ 上传图片 ]</button> <button class='btn btn-sm' onclick='saveAllFateCards()'>[ 保存全部 ]</button></div>";
state.fateCards.forEach((c,i)=>{
html+="<div class='card-item'>";
if(c.filename&&state.fateImages.includes(c.filename)){html+="<img src='/fate_assets/"+esc(c.filename)+"?profile="+encodeURIComponent(state.currentProfile)+"'/>";}
else{html+="<div style='width:60px;height:60px;border:var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)'>无图</div>";}
html+="<div class='info'><h4>"+esc(c.text||"未命名")+"</h4><p>金币: "+(c.gold||0)+"</p></div>";
html+="<div><button class='btn btn-sm' onclick='editFateCard("+i+")'>[ 编辑 ]</button> <button class='btn btn-sm btn-danger' onclick='deleteFateCard("+i+")'>[ 删除 ]</button></div>";
html+="</div>";
});
html+="</div>";
el.innerHTML=html;
}
window.addFateCard=function(){state.fateCards.push({text:"新命运牌",gold:0,filename:""});renderFatePage();};
window.deleteFateCard=async function(i){if(!confirm("确定删除?"))return;state.fateCards.splice(i,1);await apiPost("/api/fate_cards",{cards:state.fateCards});renderFatePage();};
window.editFateCard=function(i){const c=state.fateCards[i];const text=prompt("文案",c.text||"");if(text!==null){c.text=text;const gold=prompt("金币数量",c.gold||0);if(gold!==null){c.gold=Number(gold);apiPost("/api/fate_cards",{cards:state.fateCards});renderFatePage();}}};
// 签到配置页面
async function renderSigninPage(){
const el=$("#page-signin");
try{const r=await apiGet("/api/sign_in_texts");if(r.ok)state.signInTexts=r.texts||{};}catch(e){}
let html="<div class='panel'><div class='panel-title'>[ 运势区间 ]</div>";
const ranges=state.signInTexts.luck_ranges||[];
ranges.forEach((rng,i)=>{
html+="<div style='margin-bottom:8px'><b>"+esc(rng.label)+"</b> ("+rng.min+"-"+rng.max+")</div>";
});
html+="</div><div class='panel'><div class='panel-title'>[ 好事列表 ]</div>";
const goods=state.signInTexts.good_things||[];
html+="<p style='color:var(--muted);font-size:11px'>"+goods.slice(0,5).join(" / ")+" ...共"+goods.length+"条</p>";
html+="</div><div class='panel'><div class='panel-title'>[ 坏事列表 ]</div>";
const bads=state.signInTexts.bad_things||[];
html+="<p style='color:var(--muted);font-size:11px'>"+bads.slice(0,5).join(" / ")+" ...共"+bads.length+"条</p>";
html+="</div>";
html+="<div style='margin-top:12px'><button class='btn btn-primary' onclick='saveSignInTexts()'>[ 保存签到配置 ]</button></div>";
el.innerHTML=html;
}
window.saveSignInTexts=async function(){const r=await apiPost("/api/sign_in_texts",{texts:state.signInTexts});alert(r.ok?"保存成功":r.error||"保存失败");};
// 统计页面
async function renderStatsPage(){
const el=$("#page-stats");
try{const r=await apiGet("/api/user_stats");if(r.ok)state.stats=r.stats||{};}catch(e){}
let html="<div class='panel'><div class='panel-title'>[ 数据统计 ]</div>";
html+="<div class='grid-2'>";
html+="<div class='profile-card'><h4>群组数量</h4><p style='font-size:24px;color:var(--accent)'>"+(state.stats.total_groups||0)+"</p></div>";
html+="<div class='profile-card'><h4>用户数量</h4><p style='font-size:24px;color:var(--accent)'>"+(state.stats.total_users||0)+"</p></div>";
html+="</div></div>";
html+="<div class='panel'><div class='panel-title'>[ 持牌统计 ]</div>";
const holders=state.stats.card_holders||{};
const sorted=Object.entries(holders).sort((a,b)=>b[1]-a[1]).slice(0,10);
sorted.forEach(([name,count])=>{
html+="<div style='margin-bottom:4px'><span>"+esc(name)+"</span> <span style='color:var(--muted)'>- "+count+"人持有</span></div>";
});
html+="</div>";
el.innerHTML=html;
}
// 页面切换时渲染
const origSwitchPage=switchPage;
switchPage=function(id){
origSwitchPage(id);
if(id==="profile")renderProfilePageFull();
if(id==="config")renderConfigPage();
if(id==="cards")renderCardsPage();
if(id==="fate")renderFatePage();
if(id==="signin")renderSigninPage();
if(id==="stats")renderStatsPage();
};
// 配置管理页面增强
async function renderProfilePageFull(){
const el=$("#page-profile");
if(!state.profiles.length){el.innerHTML="<div class='panel'><p style='color:var(--muted)'>正在加载...</p></div>";return;}
let html="<div class='panel'><div class='panel-title'>[ 配置方案 ] <button class='btn btn-sm btn-primary' onclick='createProfile()'>[ 新建方案 ]</button></div>";
html+="<div class='grid-2'>";
state.profiles.forEach(p=>{
html+="<div class='profile-card "+(p.profile_id===state.currentProfile?"active":"")+"'>";
html+="<h4>"+esc(p.display_name||p.profile_id)+" "+(p.is_default?"<span class='badge badge-accent'>默认</span>":"")+"</h4>";
html+="<p>群组: "+(p.group_count||0)+" | 用户: "+(p.user_count||0)+" | 功能牌: "+(p.func_card_count||0)+" | 命运牌: "+(p.fate_card_count||0)+"</p>";
html+="<div style='margin-top:8px'>";
html+="<button class='btn btn-sm' onclick='useProfile(\""+esc(p.profile_id)+"\")'>[ 切换 ]</button> ";
html+="<button class='btn btn-sm' onclick='editProfileName(\""+esc(p.profile_id)+"\")'>[ 重命名 ]</button>";
html+="</div>";
html+="<div style='margin-top:8px'>";
html+="<input class='input' style='width:120px' placeholder='群号' id='bind-input-"+esc(p.profile_id)+"'/> ";
html+="<button class='btn btn-sm' onclick='bindGroup(\""+esc(p.profile_id)+"\")'>[ 绑定 ]</button>";
html+="</div>";
if(p.groups&&p.groups.length){html+="<div style='margin-top:8px'>已绑定: ";p.groups.slice(0,3).forEach(g=>{html+="<span class='badge'>"+g+" <a style='cursor:pointer' onclick='unbindGroup(\""+esc(p.profile_id)+"\",\""+esc(g)+"\")'>×</a></span> ";});if(p.groups.length>3)html+="...";html+="</div>";}
html+="</div>";
});
html+="</div></div>";
el.innerHTML=html;
}
window.createProfile=async function(){const name=prompt("新方案名称");if(!name)return;const r=await apiPost("/api/profiles",{name:name,profile_id:name.toLowerCase().replace(/[^a-z0-9_-]/g,"_")});if(r.ok){await loadProfiles();renderProfilePageFull();}else alert(r.error||"创建失败");};
window.editProfileName=async function(id){const p=state.profiles.find(x=>x.profile_id===id);const name=prompt("新名称",p?.display_name||id);if(!name)return;const r=await apiPost("/api/profile_meta",{profile_id:id,display_name:name});if(r.ok){await loadProfiles();renderProfilePageFull();}else alert(r.error||"修改失败");};
window.bindGroup=async function(id){const inp=$("#bind-input-"+id);const gid=inp?.value?.trim();if(!gid||!/^\d+$/.test(gid)){alert("请输入有效群号");return;}
const r=await apiPost("/api/profile_bind_group",{profile_id:id,group_id:gid});if(r.ok){await loadProfiles();renderProfilePageFull();}else alert(r.error||"绑定失败");};
window.unbindGroup=async function(pid,gid){const r=await apiPost("/api/profile_unbind_group",{profile_id:pid,group_id:gid});if(r.ok){await loadProfiles();renderProfilePageFull();}else alert(r.error||"解绑失败");};
// 功能牌详细编辑
window.editCardDetail=async function(i){
const c=state.funcCards[i];
const name=prompt("卡牌名称",c.card_name||"");if(name===null)return;c.card_name=name;
const rarity=prompt("稀有度(1-5)",c.rarity||1);if(rarity!==null)c.rarity=Number(rarity)||1;
const tags=prompt("标签(逗号分隔)",(c.tags||[]).join(","));if(tags!==null)c.tags=tags.split(",").map(t=>t.trim()).filter(t=>t);
const filename=prompt("图片文件名",c.filename||"");if(filename!==null)c.filename=filename;
const desc=prompt("描述",c.description||"");if(desc!==null)c.description=desc;
await apiPost("/api/func_cards",{cards:state.funcCards});
renderCardsPage();
};
// 批量操作
window.batchAddCards=function(){const input=prompt("批量添加(格式: 卡牌名,稀有度,标签1|标签2 每行一张)");if(!input)return;
const lines=input.split("\n").filter(l=>l.trim());
lines.forEach(line=>{
const parts=line.split(",").map(p=>p.trim());
if(parts[0]){
state.funcCards.push({card_name:parts[0],rarity:Number(parts[1])||1,tags:(parts[2]||"").split("|").map(t=>t.trim()).filter(t=>t),filename:""});
}});
apiPost("/api/func_cards",{cards:state.funcCards});
renderCardsPage();
};
// 图片上传
window.uploadCardImage=async function(){
const input=document.createElement("input");
input.type="file";
input.accept="image/*";
input.multiple=true;
input.onchange=async()=>{
const fd=new FormData();
[...input.files].forEach(f=>fd.append("files",f));
const r=await fetch("/api/upload_image?profile="+encodeURIComponent(state.currentProfile),{method:"POST",body:fd});
const data=await r.json();
if(data.ok){alert("上传成功: "+data.uploaded.join(", "));const ri=await apiGet("/api/images");if(ri.ok)state.images=ri.files||[];renderCardsPage();}
else alert(data.error||"上传失败");
};
input.click();
};
